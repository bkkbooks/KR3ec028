body:
  text: 本草易讀卷七丁香二百七十九辛溫無毒入手太陰足少陰陽明溫脾胃而止霍亂辟邪惡而殺蟲𧈟消痃癖而除奔豚暖腰膝而療腹痛發灰白之痘瘡除虛寒之嘔噦虛寒嘔逆者急服之有實火者忌服生東海及崑崙二三月花開紫白色七月成實小者為公丁香大者為母丁香云小兒吐乳同陳皮煎服驗方第一小兒吐瀉同上第二一切嘔逆虛寒同陳皮煎服第三雞舌香即母丁香辛溫無毒除風水毒腫止霍亂心痛吹鼻孔而殺腦疳入香品而香肌膚降真香二百八十止血定痛消腫生肌燒之闢天行時氣宅舍怪異小兒帶之闢一切邪惡氣生南海兩廣雲南諸處似蘇方木燒之初不甚香得諸香和之最良以紫而潤者為良白檀香二百八十一辛溫無毒入手太陰足少陰消風熱腫毒除噎膈吐食止心腹腰腎之痛殺鬼惡蟲蠱之邪能退霍亂亦消面皯紫檀香敷猝腫塗惡毒治金瘡療淋瀝生南海廣東雲南諸處今嶺南諸處皆有之樹葉皆似荔枝有數種皮實而色黃者為黃檀皮潔而色白者為白檀皮腐而色紫者為紫檀其木堅重淡香白者尤良近市人所貨並無香氣乃江淮河溯所生之檀耳烏藥二百八十二辛溫無毒入足陽明少陰一切冷氣疝瘕除諸般氣痛攻衝止吐嘔而停瀉痢消宿食而解疫瘴除霍亂而平癰癤殺蟲蠱而解白濁消腫脹之喘急止便尿之頻數生嶺南江南諸處今台州雷州衡州皆有之以天台者為勝木似茶高丈餘一葉三丫五月開細花白花六月結實一切氣痛同茴香青皮良薑為末酒下驗方第一小腸疝氣烏藥一兩升麻八錢水煎服第二血痢燒末丸服米湯下第三心腹氣痛磨汁入陳皮蘇葉煎服第四烏香散香附烏藥等分為末每服二錢男婦疝痛茴香湯下産後心脾痛童便下飲食不進薑棗湯下瘧疾乾薑白鹽湯下腹中有蟲檳榔湯下婦人冷氣米湯下諸方第一白膠香二百八十三辛苦平無毒止痛生肌活血解毒治一切癰瘡金瘡療諸般浮腫風癢吐衄最良齒痛亦效所在大山皆有之今南方及關陝最多木甚高大似白楊葉圓而作歧有三角而香二月有花白色霜後葉丹可愛昔漢宮殿多植之一切惡瘡白膠香松香各一兩香油黃蠟各三錢同熔化入水扯千遍攤貼驗方第一諸瘡不合同輕粉豬脂合敷第二惡瘡疼痛同輕粉為末漿水洗淨貼之第三乳香二百八十四煅去油用或生用同燈草研之則易細矣薰陸香辛溫無毒入手少陰經活血定痛舒筋長肉祛風下氣補腎催生消癰癤而平折瘍止霍亂而除邪惡出南番諸國其木類松以斤斫樹脂溢於外結而成香有自流出者以圓大如乳頭透明者為勝口目歪斜燒煙燻之驗方第一冷心痛同胡椒為末薑水下第二沒藥二百八十五煅去油用辛苦無毒散血消腫定痛生肌療諸瘡金瘡杖瘡破癥瘕宿血瘀血平産後血刺兼墜胎孕除目中障翳亦解痔漏生波斯國今南海及廣州咸有之樹大如松採時掘樹下為坎用斧伐其皮脂流於坎旬余方取之亦有自流出者其塊大小不定黑色似安息香婦女腹痛酒服一錢驗方第一月經作禽獸形用棉塞住陰戶沒藥末一兩用白湯下第二點舌丹乳香沒藥硼砂明雄黃熊膽真血竭葶藶真沉香梅片各一錢麝香硃砂牛黃珍珠各二分共為末另用蟾酥二錢以人乳化開丸緑豆大金箔為衣每用一丸入蔥白內打碎酒送服取汗外敷亦可治一切紅腫熱毒初起疔瘡並實火牙痛喉痛口舌諸瘡及小兒驚風若慢驚及一切虛症不治諸方第一血竭二百八十六凡使勿用海母血真相似只是味鹹並有腥氣耳麒麟竭朱力甘咸無毒手足厥陰藥也與走血多止血散瘀生肉除痛敷一切惡瘡平諸般折傷南番諸國及廣州皆有之木高數丈婆娑可愛葉似櫻桃而有三角其脂液從木中流出久而堅硬乃成竭赤色如血採無時亦或斫伐其皮使流出欲驗真偽嚼之不爛如蠟者為上又云以透指甲者為真又云燒之有赤汁滴出久而灰不變本色者為真也安息香二百八十七辛苦平無毒燒之通神闢一切邪魅燒之聚鼠者為真出西戎狀如松脂而兼黑色作塊或曰生南海波斯國樹中脂也狀如桃膠秋月採之其樹長二三丈皮黑黃色葉有四角經寒不凋開黃色花不結實刻其樹皮其膠如飴蘇合香二百八十八達諸竅通神明除鬼惡蠱蟲一切邪寐出蘇合國因以名之又曰出中臺川穀今從西域及崑崙來者紫赤色與紫檀相似極芳香惟重如石燒之灰白者良今廣州亦有但類蘇木無香氣又曰大秦國人採得蘇合香先煎其汁以為膏乃賣其渣與諸國是以來中國者不大香也俗傳蘇合香是獅子屎則謬矣其膏名蘇合油蘇合香丸蘇合油一兩安息香二兩白朮香附青木香白檀香沉香丁香蓽茇訶子麝香硃砂犀角各二兩冰片乳香各二兩以香膏加煉蜜丸之治傳尸骨蒸疰忤鬼氣猝心痛暴痢霍亂瘀血月閉痃癖疔腫驚癇客忤中風中氣狐貍等病諸方第一片腦二百八十九冰片梅片龍腦香辛苦無毒聰耳明目鎮心祕精通竅催生散瘀除邪祛目赤浮翳內外障眼治三蟲五痔骨痛腸脫解喉痹而止腦痛除鼻息而療齒痛傷寒舌出最良小兒痘陷亦效出婆律國樹形似杉木今惟南海番舶賈客貨之南海山中亦有之木高七八丈大可六七圍葉圓而背白結實如豆蔻皮有甲錯香即木中脂也今人多以樟腦升打亂之不可不知目生浮翳真龍腦日點三五度驗方第一舌出過寸梅片為末摻之第二冰硼散冰片五分硼砂五錢硃砂六分為極細末治咽喉一切腫痛與口舌諸瘡諸方第一樟腦二百九十即樟樹脂也一名潮腦辛熱無毒通塞利滯除中惡邪氣平霍亂腹痛祛瘡癬之風瘙消腳氣之腫滿最解寒濕兼殺蟲蠹出潮州漳州狀似龍腦白色如雪每用一兩用二碗合住濕紙糊口文武火灼之半時許取出冷定即俗所謂潮片亦名樟冰可入風熱眼藥人多以亂片腦不可不知阿魏二百九十一辛平無毒破症消肉闢瘟治瘧去臭氣下惡氣除邪鬼蠱毒治風邪鬼疰傳尸冷氣霍亂腹痛生西域及崑崙有二種有草生者出西域似白芷搗根汁煎作餅者為上截根暴乾者次之木生者出南番取其脂汁凝之然性極臭而能止臭亦奇物也或類蒜頭偽充者以半錢放熟銅器上一宿至明沾魏處白如銀者真也尸氣入腹此尸疰也阿魏三兩每用二錢用麵包作餛飩十餘枚煮熟食之日三驗方第一腹痛莫忍此惡疰也為末酒下二錢立止第二痞塊積聚阿魏五錢靈脂炒黑五錢以雄黃狗膽汁作丸粟米大空心唾津下三十丸第三蘆薈二百九十二苦寒無毒足厥陰藥也消風退熱明目鎮心治小兒諸般驚癇五種疳熱解腦疳而除鼻癢敷𧈟齒而治濕癬最殺三蟲且愈瘡瘻生波斯國狀似黑餳乃樹脂也今惟廣州有來者苦如膽者為真也小兒脾疳同使君子末米湯同下驗方第一胡桐淚二百九十三咸苦寒無毒解大毒熱軟諸硬物療風牙蟲牙殺火毒面毒吐心腹之煩滿掃咽喉之熱痛愈骨槽之風勞治𧈟齒之風疳出肅州以西平澤及山谷中形似黃礬而堅實有夾爛木者云是胡桐樹脂淪入土石鹼鹵地者其樹高大皮葉似白楊青桐桑輩以黃土色者為上又有木淚石淚之殊木淚乃樹脂流出者狀如膏油石淚乃脂入土石間者其狀成塊以其得鹼斥之氣故入藥又以石淚為勝黃柏二百九十四蜜炙用惡乾漆伏硫黃苦寒無毒入足厥陰少陰太陰經補腎壯水瀉火治瘡卻腰腳之痿痹除骨蒸之勞熱理黃疸之腹滿住痢疾之血下乃治口瘡仙劑為救癱瘓良藥生漢中川穀今處處有之以蜀出肉厚色深者為佳一種小柏一名子柏亦名山石榴其皮黃而苦又有一種多刺皮亦黃並主口瘡斂瘡生肌為末麵糊合敷驗方第一中自死畜肉毒為末水下第二凍瘡痛裂為末乳汁合敷第三小兒下血同赤芍丸服米湯下第四小兒熱瀉米湯丸下第五夢遺有熱黃柏一兩冰片一錢蜜丸服第六消渴多尿黃柏代茶飲之第七目昏眩每旦含黃柏一片吐津洗之第八猝喉痹痛黃柏片含之又以酒煎半斤空心飲第九口舌生瘡口含之良又同乾薑末摻之第十口疳臭爛同銅緑摻之十一鼻生瘡同檳榔豬脂合敷之十二唇瘡痛裂黃柏末以薔薇根汁合敷立效十三囟腫為末敷足心十四手足腫痛欲斷黃柏五斤水煎漬之十五癰疽乳發初起以黃柏末雞子白合敷十六膿瘡不幹遍身為末入枯礬少許摻之十七男子陰瘡煎洗之蜜塗之十八臁瘡熱瘡蜜炙末搽之十九尿閉腹脹睛凸滲利不效黃柏知母稍加肉桂水煎服立通二十大補丸黃柏水丸治陰火為病血虛四物湯下氣虛四君子湯下諸方第一厚朴二百九十五薑炙用乾薑為使惡澤瀉硝石寒水石忌豆色紫味辛者乃真也去粗皮用溫苦無毒健脾溫胃厚腸和中除煩化痰止嘔消脹破宿血而化水穀導宿食而開水結定霍亂而止喘咳除反胃而療吐酸解風熱之頭痛卻膨滿之腹痛泄痢淋露之疾寒熱驚悸之疴能泄五臟諸氣兼安胎産諸病生交趾冤句三九十月採皮洛陽陝西湖南江淮蜀川山谷中往往有之木高三四丈四季不凋紅花而青實皮極鱗皺肉厚色紫而味辛者為勝今伊陽及商州亦有之但薄而色淡不如梓州者厚而紫色有油也近世一種其貌頗似之全失氣味未知何木皮也杜仲二百九十六鹽水炒去絲用惡元參蛇皮甘溫辛平無毒補中益精堅筋潤肝除腰膝痛重療陰下濕癢小便之餘瀝腳中之痠痛生上虞山谷及上黨漢中二五六九月採皮商州成州峽州大山中亦有之木高數丈葉似辛夷其皮折之有白絲相連川産者良椿樗白皮二百九十七苦溫無毒除一切下血血崩血痢腸風臟毒殺諸般疳蟲蛔蟲疥蟲鬼疰傳尸赤白帶濁之疾精尿遺泄之疴二木南北皆有之椿木皮粗而木赤其葉香甘可茹樗木皮細而木白其葉臭惡不可食利清血腹痛椿根白皮醋酒丸豆大米湯下三十丸驗方第一下痢赤白椿木皮為末每米湯下一錢第二臟毒下血椿皮酒丸服第三積年下血樗白皮煎丸俱可第四白帶椿木皮南滑為末丸服又同黑薑為末黑芍黑柏諸味以丸服之第五男子白濁同上第六腸風純血樗莢半生半燒末服第七白帶椿白皮白雞冠白棕子灰共為末用白糖沸水沖服之第八下痢赤白樗根白皮兩茶葉兩紅白糖各兩胡桃二個大棗七個去核水煎第九乾漆二百九十八炒熟用或燒存性半夏為使畏雞子忌油脂辛平有小毒止嗽消瘀通經殺蟲削年深堅結之積滯破日久凝結之瘀血生漢中山谷夏至採干之梁州廣州峽襄歙州皆有之近世人多種之春分前移栽易成其身如柿其葉如椿金州者為佳以斧斫其皮開以竹管承之滴汁則成漆也極黑者良塗於干竹上蔭之速乾者佳今人多以桐油亂之不可不知也女人經閉繞臍疝痛乾漆一兩炒煙盡為末牛膝末一兩以地黃汁煎熬成丸丸如豆大每二丸不通加之以紹興酒下之驗方第一苦楝子二百九十九酒蒸去皮核金鈴子即楝樹實也苦寒有小毒除大熱狂煩利小便水道止心腹疝痛退疥瘍蟲患根皮苦微寒微毒殺蛔利腸洗小兒壯熱塗一身疥癬風熱風疹惡瘡疥癩燒末敷之或脂合敷生荊山山谷今處處有之以蜀川者為佳木高數丈葉密如槐而長三四月開花紅紫色芬香滿庭實如彈丸十二月採實楝實丸川楝子四十九個取肉分七處用小茴防風黑醜食鹽萊蔔子巴豆斑蝥七味每二錢五分各同炒楝子肉七個去萊蔔子巴豆斑蝥三味入青木香廣木香肉桂各二錢五分酒丸豆大每鹽湯下三十丸治外腎腫大麻木痛破及奔豚疝氣諸方第一金鈴丸木香乳香沒藥附子小茴元胡楝子臺參湯丸俱可治疝氣外腎痛腫或兼小腹痛即偏墜也第二槐角子三百銅器捶碎牛乳蒸熟用苦寒無毒祛風退熱明目益氣涼中潤肝墮胎催生治五痔瘡瘻療陰瘡濕癢消娣科之乳瘕止子臟之急痛解眩暈之如倒療湯火之暴傷除涎唾而殺蟲消風熱而除煩目熱昏眩同黃連蜜丸服驗方第一大熱心悶燒末酒下第二槐角丸槐角一兩炒地榆當歸防風黃芩枳殼各半兩酒丸豆大每米湯下三十丸治五種痔瘡外痔糞前血內痔糞後血穀道四周弩肉曰痔瘡瘡頭有孔曰瘻瘡瘡內有蟲曰蟲痔也諸方第一槐米三百零一苦平無毒治五種痔瘡解一切血症腸風瀉血吐衄崩漏療失音而除喉痹止心痛而去目赤退皮膚之風熱殺腹臟之蟲蠱舌衄出血為末敷之驗方第一咯血吐血炒末每糯米水下三錢仰臥第二尿血同鬱金炒末湯下立效第三大便下血同荊穗為末酒下又同柏葉煎服第四酒毒下血同山梔末新水下第五婦人漏血燒末酒下第六血崩不止同黃芩末酒下第七中風失音炒末三更仰臥嚼咽第八白帶不止同蠣末粉每酒下三錢第九外痔長寸煎洗兼服之第十一切癰發疔毒焮痛者皆治酒煎汗之未成已成俱效十一牙根腫痛欲成骨槽風槐米三錢焙苦參三錢焙蛇皮半條焙共為末蜜一兩丸三粒每服一丸用老鼠枕頭根每七枚煎水送下十二槐白皮三百零二苦平無毒淋陰囊墜腫漱口齒疳𧈟除皮膚麻木浴陰下癢痛一切惡瘡五般痔瘻喉痹亦治湯火悉療煎膏除痛生肉消腫止血根皮尤良槐枝性同槐白皮洗陰下濕癢解赤白崩漏煅黑揩牙燒瀝塗癬釀酒療風燒灰沐發洗瘡最良浴痔亦效槐蛾辛平無毒治五痔脫肛下血療婦人陰下生瘡止心痛而破血益氣力而去風風熱牙痛槐枝燒熱烙之驗方第一九種心痛當太陽取新槐一把去兩頭水煎服第二赤白崩中槐枝燒灰酒下第三胎動催生取槐枝東引者令産母把之即易生第四陰瘡濕癢取槐枝北面者煎洗頻易第五陰下濕癢槐白皮炒煎水日洗第六痔瘡作癢或出膿血有蟲者取槐白皮水煎先熏後洗又為末綿包納下部第七破傷中風背陰槐白皮旋刻一片艾灸百壯不痛至痛痛至不痛第八中風身直不得屈伸取槐白皮酒水煮徐服第九腸痔下血槐蛾為末水飲服第十崩中下血槐蛾為末酒下十一産後血痛欲死同上十二蛔蟲心痛同上水服若不止服熱水至一升則蟲立出十三月水不斷人黃瘦者槐蛾燒黃赤石脂各一兩為末每熱酒服二錢十四臟毒下血槐蛾同乾漆燒末酒下十五秦皮三百零三惡苦瓠防葵吳茱萸大戟為之使苦寒無毒足厥陰少陽經藥也明目除熱益精止帶治熱痢下重祛赤目腫痛退驚痛之風熱解痹木之風濕生廬江川穀及冤句水邊二八月採皮陝西及河陽亦有之其木似檀枝幹皆青緑色葉如匙頭許大而不光並無花實根似槐根俗呼為白樳樹皂角三百零四捶碎去子弦蜜炙酥炙或絞汁或燒灰各依方用忌鐵器柏仁為使惡麥冬畏空青人參苦參即皂莢辛咸溫有小毒入手太陰陽明祛風化痰消腫通竅破症殺蟲通腸墜胎療脹滿而消穀除咳嗽而定喘開中風之噤口熏久痢之脫肛起風痹之死肌解喉痹之塞滿取精汁熬膏貼一切腫毒合蒼朮燒煙闢諸般瘟疫確有明目益精之能操治癩平疥之權生雍州山谷今在處處有之其樹有極高大者葉如槐葉瘦長而尖枝間多刺夏開細黃花結實有三種一種小如豬牙一種長而肥厚多脂而黏一種長而瘦薄枯燥不黏以多脂者為佳有不結實者樹鑿一孔入生鐵數斤泥封之即結莢矣中風噤口痰壅炙黃為末每酒下一錢驗方第一口喎為末酒下左喎敷右右敷左第二中暑不省燒末同甘草末以水煎灌之第三魘死為末吹鼻第四縊死同上第五水溺死為末布包納下部第六骨哽咽為末吹鼻第七積年疥瘡皂角入豬肚煮熟去皂角食肚第八大風諸癩炙去皮子丸服第九足瘡癢甚炙熟烙之第十便毒癰疽醋熬膏敷之十一腳氣腫痛同赤小豆末酒醋合敷十二身面猝腫炙黃去皮酒煎服十三二便不通燒末飲下立通十四痰喘咳嗽皂角三條去皮子一條入巴豆十粒香油制一條入杏仁十粒薑汁製一條入半夏十粒蜜制入一處火炙黃色為末每用一字安手心臥時薑汁調下神效也十五咳逆上氣唾濁不臥皂角去皮子為末蜜丸豆大每三丸棗膏湯下十六一切痰氣皂莢燒末萊蔔子炒末入薑汁蜜丸豆大每十丸湯下十七妊婦一乳或兩乳腫痛作寒熱內吹皂角一條燒枯存性為末酒下立消十八皂角子煮熟用銅刀去皮去內黃取白肉用辛溫無毒和血潤腸祛風退熱瘰癧腫毒瘡癬皂刺三百零五即皂角針也辛溫無毒治癰腫妒乳療風癢惡瘡下胎衣而殺蟲潰瘡癰而塗癬大風惡疾目昏眉落鼻崩皂刺三斤燒灰蒸一時久曬乾為末大黃湯下十日當全愈驗方第一胎衣不下燒末酒下第二小兒重舌燒灰入朴硝摻之涎出自消第三痢因傷風傷風不已而下痢膿血同枳殼槐米蜜丸豆大每三十丸第四訶子三百零六酒煮去皮核用苦酸澀溫無毒消痰下氣開胃化食生津除煩斂肺澀腸消心腹脹滿破胸膈結氣止嘔吐霍亂除崩帶瀉痢最利久嗽兼止諸痛生交州愛州嶺南而廣州最盛花白色七月子成似梔子青黃色皮肉相著下氣消食訶子一枚為末水煎入少鹽食之驗方第一氣嗽日久生訶子一枚含之咽汁病後不知味並檳榔服之第二一切滑痢末服湯服丸服皆可第三柳枝三百零七苦寒無毒祛風止痛消腫療瘡煎湯洗風腫瘙癢小兒寒熱煎服治黃疸白濁痰熱淋疾酒煮尉一切痛腫風蟲齒牙柳葉苦寒無毒煎洗除惡疥漆瘡作膏能續筋長肉天行熱病傳尸骨蒸心腹血瘀湯火傷灼下水氣而解腹熱療白濁而平丹毒最止疼痛亦治疔瘡柳絮柳花柳實柳子苦寒無毒柳絮治風水黃疸頭面黑熱痂疥惡瘡金瘡出血柳花療肢攣膝痛止血除痹實逐膿血子能消渴黃疸初起柳枝煎汁服驗方第一一塊猝腫酒煎柳白皮尉之第二一塊急痛同上第三走注痛急同上第四齒根腫痛柳枝槐白皮桑白皮白楊白皮水煎漱之第五風蟲牙痛柳白皮卷如指大含咀之以其汁漬牙根間第六乳癰初起柳根白皮堅紫者搗爛火溫白布包尉之冷再易第七反花惡瘡柳枝葉煎如餳日三塗之第八赤丹從背起柳木炭水合敷第九小便白濁清明柳葉煎湯代茶第十小兒丹毒柳葉一斤煮汁拓洗日七次十一眉毛脫落柳葉為末薑汁夜夜調敷十二猝得惡瘡人不識者柳葉煮汁入少鹽頻洗之白皮亦可十三面上惡瘡同上十四痘爛生蛆嫩柳葉鋪席上臥之蛆盡出十五吐咯血柳葉焙末米湯下一錢十六金瘡出血柳絮封之即止十七面上膿瘡柳絮輕粉為末燈中油合敷十八白楊白皮三百零八性酸冷無毒去風痹宿血治撲損折傷除腳氣腫滿療四肢緩弱退皮膚之風癢開痰痹之堅硬作膏可續筋骨煎湯能止妊痢漱齒口之疼痛消項下之癭瘰青楊苦辛無毒金瘡乳癰諸腫痘瘡枝葉治久痢赤白妊娠下痢白楊白皮一斤水煎分服之驗方第一口吻爛瘡白楊嫩枝鐵上燒炭和脂合敷之第二腹滿堅癖如石白楊東引枝數斤去粗皮切細熬黃以酒淋訖用絹袋盛渣還納酒中密封再宿服之第三榆白皮三百零九甘平滑利無毒通二便而利水道滑胎孕而解齁喘治頭瘡而敷癬瘡消乳腫而退癰腫通經利竅滲濕除熱最行津液善治淋瀝齁喘不止煎如膠日二服驗方第一五淋澀痛同上第二渴而尿多同上第三臨月易産同上臨月頻頻服之第四下死胎生胎水煎服第五小兒瘰癧搗封之頻易第六蘇木三百一十切細蒸用甘咸無毒破血消腫行瘀止痛開症癖而除惡露止霍亂而解嘔逆自南海崑崙來而交州愛州亦有之葉似榆葉而無澀抽條長丈許花黃子青熟黑産後氣喘因惡露不行水煎沖參末服棕皮灰三百十一苦澀平無毒止吐衄崩帶解赤白痢下生肌止血破症通尿最治金瘡亦療疥癬筍及子花治同生嶺南西川今江南亦有之木高一二丈無枝條葉大而圓有如車輪萃於樹杪其下有皮重疊裹之每皮一匝為一節每歲必兩三剝之剝則後生否則樹死或不長也血崩不止淡酒下驗方第一鼻衄吹鼻即止第二血淋不止水沖服第三水穀痢下同上第四巴豆三百十二芫花為使畏大黃黃連蘆筍藜蘆冷水反牽牛有用仁用殼用油麩炒酣煮燒末之異布包壓去油謂之巴霜新者佳用之去皮及心辛溫有毒破癥瘕結聚痰癖留飲除鬼毒蠱瘻平惡瘡息肉消十種水氣宣一切壅滯蕩滌五臟掃清六腑通利關竅消除生冷瀉痢驚癇之疾喉痹牙痛之疴通經墜胎破血排膿祛風導氣消腫殺蟲解寒熱之溫瘧止心腹之急痛乃斬關奪門之將有健脾開胃之能生巴郡山谷八月採實嘉州眉州戎州皆有之木高一二丈葉如櫻桃而厚大花發成穗五六月結實作房似大楓子殼而脆薄子及仁似海松子一切積滯巴豆一兩蛤粉二兩黃柏二兩丸緑豆大每五丸水下驗方第一食瘧積瘧巴豆去心二錢皂角二錢丸豆大每冷水下一丸第二積滯瀉痢腹痛裡急巴豆杏仁各四十九粒去皮心燒末熔蠟丸約緑豆大每次三錢用大黃湯下之可也第三下血不止以雞子開孔巴豆一粒入煨熟去豆分食之第四夏日水瀉不止巴豆一粒針頭燒末化蠟作一丸倒流水下第五小兒痰喘巴豆一粒杵爛綿包塞鼻男左女右痰即下第六點除黑痣巴豆石灰人言等分糯米少許炒研點之第七癰疽惡肉炒焦研膏點之第八大楓子三百十三去殼辛熱有毒攻蚊殺蟲除風癬疥癩楊梅瘡毒生海南諸番國掃除疥瘡為末同水銀拭之驗方第一桑根白皮三百十四木皮亦可焙末用忌鐵器出土上勿用續斷桂心麻子為使甘平無毒手太陰肺藥也瀉肺下氣消痰止渴開胃化食利水殺蟲消水腫腹脹解肺氣喘滿止霍亂吐瀉除虛勞客熱利二腸而散血敷鵝口而息崩肺虛及小便利者忌用小兒重舌煎汁乳上飲之驗方第一小兒流涎脾熱也取自然汁敷胸上立止第二小兒鵝口取汁敷之第三小兒唇腫同上第四潤髮同柏葉煎汁沐之第五産後下血水煎服第六瘦腳息痛桑白皮四錢朴硝五錢乳香二錢水煎洗足第七瀉白散桑皮炒骨皮炒各一兩甘草炒五錢為末每服二錢治肺熱嗽喘面腫身熱諸方第一桑葉三百十五家桑經霜者良苦寒有小毒家桑葉無毒濃汁服治腳氣水腫尤利二腸水煎服治霍亂腹痛更住吐下蒸搗罯撲損瘀血並敷風痛研汁塗小兒吻瘡兼療金瘡炙熟煎飲代茶止渴熬膏點服去風行瘀除寒熱而止汗治勞熱而除嗽利五臟而通關退諸風而下氣最能明目長髮尤解蜈咬蛇傷赤目澀痛為末紙卷燒熏鼻驗方第一令發速長同麻葉煎汁沐之七次可長尺余第二手足麻木霜桑葉煎水頻洗之第三湯火傷瘡燒末油合敷三日愈第四瘡口不斂為末敷之第五穿掌腫毒新桑葉研爛函盦之即愈第六霍亂轉筋入腹水煎服第七渴疾煎熟代茶第八風眼下淚臘後不落桑葉煎水洗之第九青盲洗法青桑葉焙乾燒存性水煎澄清水洗至百度神效逐月按日正月初八二月初八三月初六四月初四五月初六六月初二七月初七八月二十九九月十二十月十三十一月初二十二月三十日第十桑枝苦平無毒祛風除濕消食利水聰耳明目澤顏止渴洗風癢乾燥療水氣腳氣除四肢拘攣解肺氣咳嗽水氣腳氣炒香煎服驗方第一風熱臂痛同上第二遍身風癢水煎洗之第三四肢拘攣內服外洗第四桑蛾甘平有小毒止崩中帶下衄血瀉血開痃癖癥瘕月閉血凝桑寄生益血安胎止崩下乳平癰腫而治金瘡強筋骨而療腰痛枳實三百十六麩炒陳久者良苦酸微寒無毒入足陽明經下氣消食開積破結除胸脅痰癖療心腹痞滿退皮內之風癢除胃中之濕熱止瀉痢而平喘嗽通停水而散敗血長肌肉而利臟腑除陰痿而止脅痛逐痰飲消痞食有沖牆破壁之力也生河內川穀洛西江湖皆有之以商州者為佳木如橘而小高五七尺葉如橙多刺春生白花秋成實七八月採者為實皮厚而小九十月採為殼完大而薄猝胸痹痛末服驗方第一小兒久痢同上第二婦人陰腫堅痛炒碎包尉之冷則另易第三奔豚氣痛炒末服第四小兒頭瘡燒灰豬脂合敷第五枳朮散枳實白朮散服治心下堅硬如盤症脈實者諸方第一枳薤桂枝湯枳實厚朴栝蔞薤白桂枝治心胸結滿脅下搶心第二枳實芍藥散枳實白芍為末治産後腹痛第三枳殼三百十七麩炒陳久者良苦酸微寒無毒治泄痢裡急後重余治同枳實但力稍緩耳風疹作癢水煎內服外敷驗方第一産後腸出水煎浸之第二一切氣積枳殼三斤去穰每個入巴豆仁一粒合定水煮一日湯減再加熱湯怕入冷水汁盡去巴豆曬乾為末丸豆大每三十丸第三胎胞欲瘦同甘草末服或同白朮丸服第四枳殼丸枳殼四兩分四分子服蒼朮一兩與枳殼一兩同煮乾炒黃去朮萊蔔子一兩小茴一兩乾漆一兩各配枳殼一兩同煮如前再用香附二兩檳榔一兩元胡一兩三稜二兩莪朮一兩上二味童便浸巴豆仁三十粒同煮乾去豆炒黃丸豆大每五七十丸白湯下治氣鼓第五山梔子三百十八炒則不吐苦寒無毒入心肺肝脾膀胱經降心火而通小便利五淋而瀉三焦止吐衄淋痢諸血清肺胃頭目諸熱煩惱懊憹之疾損傷血瘀之疴善吐胸膈濁瘀最退皮膚熏黃生南陽川穀九月採實今處處有之木高七八尺葉似李而厚硬二三月白花六出甚香夏秋結實痢下鮮血燒灰水下驗方第一酒毒下血同上第二衄血燒灰水下第三血淋澀痛生末南滑末蔥湯下第四霍亂轉筋脹滿未得吐下燒末酒下立愈第五冷熱腹痛同川烏丸服薑水下痛在下而熱在上是也第六心下熱痛炒七枚為末薑水下立效第七折傷腫痛同白麵搗敷甚效第八水腫兼熱炒末每米湯下二錢第九沖發心脅刺痛纏綿無時五尸疰病也燒末水下第十湯燙火燒同雞子白掃之十一酒皶鼻炒末黃蠟丸彈大每茶下一丸忌煎炙物忌酒十二梔子豉湯山梔香豉水煎取吐治胸中窒煩熱又治虛煩不眠懊憹諸方第一酸棗仁三百十九睡多生用不睡炒用酸辛無毒足厥陰少陽手足少陰藥也溫膽益肝止汗解渴除虛煩不眠開寒熱結氣助筋骨堅強止手足痠痛祛濕痹而息久泄輔陰氣而補中宮生河東川澤八月採實有樹大如棗者實無常形但棗中味酸而形圓者是膽虛不眠心多驚悸一兩炒搗每竹葉湯下二錢驗方第一膽風多睡一兩生搗用末薑茶下第二骨蒸不眠同生地取汁煎入大米作粥食第三刺入肉不出燒末水下立出第四躁煩不安循村而走炒棗仁黑梔竹茹枳殼麥冬第五病呼難受乃心煩也炒棗仁黑梔麥冬枳殼第六酸棗仁湯棗仁茯苓川芎知母甘草治虛勞虛煩不眠諸方第一蕤核仁三百二十湯浸去皮尖劈與芒硝木通同水煮取仁研膏用苦平無毒治一切眼疾除心腹結熱結痰生函谷巴西等處壅州河東並州諸處亦有之木高五六尺莖間有刺葉似枸杞而狹長花白子附莖生紫赤色大如烏豆形圓而扁有紋理山茱萸三百二十一去核酒蒸蓼實為使惡防風防己桔梗酸平無毒入足厥陰少陰強陰益精破積通竅縮小便而溫肝暖腰膝而助水除一切風解諸般氣生漢中及琅琊冤句九月十月採實海州兗州亦有之木高丈餘葉似榆花白色金櫻子三百二十二去刺及子炒用酸澀無毒縮小便而澀精止泄痢而斂氣在處有之類薔薇而有刺四月開白花實大如指頭狀如石榴而長其核細碎而有白毛補血益精焙末用砂仁蜜丸酒下驗方第一郁李仁三百二十三湯浸去皮尖用生蜜浸宿一夜陰乾研膏用辛苦無毒潤腸逐水破血消食除水腫浮腫導結氣癖氣山野處處有之葉花及樹並似大李惟子小如櫻桃甘酸而香女貞實三百二十四苦溫無毒補中養神強陰明目掃除百病平安五臟健腰膝而變發肥肌膚而輕身處處有之其葉不凋凌冬茂盛頗似冬青五月細花青白色九月實成似牛李子或云即今冬青也蓋一物而二種耳鬼箭羽去赤毛酥炒用衛矛苦平無毒鎮邪祛鬼退蠱殺蟲通經落胎行瘀破症止崩帶下血息皮膚風腫所在山谷有之小株成叢春生嫩條條上四面有羽如箭羽葉似山茶八月十一月十二月採莖條五加皮三百二十五遠志為使惡元參蛇皮辛溫無毒治一切痿痹除諸般風濕舒肢節攣急助筋骨堅強生漢中及冤句五月七月採莖十月採根有數種類大抵類薔薇金櫻等輩五葉者良四葉三葉者次之三四月開白花結青子男婦腳氣同遠志為末酒丸服驗方第一小兒行遲同牛膝木瓜末散服第二油煎散加皮丹皮赤芍當歸為末每服一錢用青錢一文蘸油入藥煎之治婦人風血勞憔悴困倦喘滿虛煩少氣有汗口乾舌澀不思飲食是也諸方第一地骨皮三百二十六苦寒無毒入足少陰手少陽經退熱除蒸解渴涼血堅筋助骨益精祛痹退傳尸有汗之骨蒸祛在表無定之風邪除骨槽之風病療金瘡之折傷降肺胃之伏火解腎肝之虛熱善漱齒衄亦止吐血處處有之苗葉如石榴而軟薄莖高三五尺作叢六七月小紅紫花結實如棗核生青熟紅甘州者良今陝之蘭靈諸處並是大樹子圓如櫻桃枸杞子酒潤搗爛用甘平無毒滋腎潤肺益精明目堅筋立骨除風治勞嗌乾心痛最宜渴飲消中亦效熱勞如燎骨皮三兩柴胡一兩每麥冬湯下二兩驗方第一帶下脈數骨皮半斤生地半斤煮酒服第二婦人陰腫或有瘡骨皮煎洗第三骨蒸煩熱及一切煩熱骨皮二兩防風一兩炙草半斤每用薑作引水煎五錢第四赤目生翳淨枸杞取汁點之神效第五注夏病枸杞子五味子研細滾水泡封三日代茶飲甚效第六足趾雞眼骨皮紅花為末敷之第七骨槽風槐米二兩骨皮一兩蜜丸彈大每服一丸初起者發汗即愈潰後者點服第八石南葉三百二十七加皮為使惡小薊辛苦平無毒助腎益陰逐風殺蟲利筋骨毛皮療腳弱陰痿女子禁久服令思男也生華陰山谷三四月採葉今南北皆有之葉似枇杷而小有小刺凌冬不凋春生白花成簇秋結細紅實蔓荊子三百二十八去蒂下白膜打碎用之或酒蒸惡烏頭石膏辛平無毒明目堅齒涼血搜風解風寒頭痛腦痛除筋骨濕痹拘攣長鬚發而利關竅治癇疾而殺百蟲血虛頭痛及胃虛者忌之汴京秦隴明越諸州多有之莖蔓延長丈餘春園舊枝而生小葉五月葉成似李葉六月有花紅白色九月有實黑斑大如梧子而虛輕頭風作痛漬酒七日服驗方第一乳癰初起炒末酒服以渣敷之第二紫荊皮三百二十九苦平無毒入手足厥陰經破血通淋消腫行經活血長膚通氣解毒消一切腫毒癰疽喉痹解諸般物傷蛇虺蠶犬最通小腸亦解飛尸梗花同處處有之高樹柔條其花甚繁以川中厚而紫色味苦如膽者為勝婦人血氣刺痛為末醋丸服驗方第一鶴膝風攣酒煎服第二木槿皮三百三十甘滑無毒活血潤燥治赤白帶下止腸風瀉血洗目中昏暗解痢後熱渴腫痛能除疥癬亦消花甘溫無毒止腸風瀉血療赤白下痢消瘡腫而利小便除濕熱而治風虛南北皆有之人家多種植之花有紫白二種朝開暮斂四月始開延綿至秋從川中來者皮厚而色紅赤白帶下槿根皮二兩切赤用白酒白用黃酒煎服甚妙也驗方第一牛皮癬槿皮一斤大楓子仁十五個半夏半斤河水井水浸七日入輕粉一錢入水中禿筆掃塗覆以青布有臭涎出第二脫肛槿皮或用葉煎水熏洗後用白礬五倍子末敷第三頭面錢癬槿皮為末醋合重湯煮如膠敷之第四下痢噤口槿花紅者為末煎麵餅醮末食之第五痔瘡腫痛槿根皮煎水熏洗第六反胃吐食槿花為末糯米湯下第七風痰壅逆槿花為末沸湯下第八芙蓉葉三百三十一辛平無毒清風涼血散熱解毒消腫排膿行瘀止痛一切癰疽良劑惡瘡靈丹處處有之插條即生小木也其干叢生高者丈許葉大如桐秋花似牡丹芍藥有紅白黃諸色霜後取葉一切癰疽惡瘡已成未成已穿未穿俱可為末以蜜合敷之神效驗方第一赤眼腫痛為末水合敷太陽穴第二經血不止同蓮蓬殼為末米飲下二錢第三偏墜作痛同黃柏為末木鱉子仁醋磨合敷第四杖瘡腫痛同皂角末雞子清合敷第五密蒙花三百三十二酒浸蜜蒸用甘平微寒無毒足厥陰藥也治一切目疾療青盲而去浮翳退赤脈而息羞明消赤腫多淚蜀中州郡皆有之木高丈餘經冬不凋花微紫色春月採花目中障翳同黃柏丸服柞木三百三十三苦平無毒催生利竅治鼠瘻療黃疸處處山中有之高者丈餘葉小而有細齒其木及葉丫皆有針刺經冬不凋五月開細白花不結子木心理皆白色鼠瘻作木皮一斤水煎分服驗方第一柞木飲柞木葉乾荷葉心中蒂萱草根甘草地榆各四兩每水煎半兩服治一切癰疽發背已成未成俱效諸方第一茯苓三百三十四去皮木用馬蘭為使惡白蘞畏地榆雄黃秦艽龜甲忌醋酸物甘平無毒入足陽明太陰少陰膀胱經開心益志健胃暖脾利水燥濕泄飲消痰善安驚悸最解煩滿退胸脅之逆氣除心腹之結痛消氣水之腫脹止水飲之燥渴淋癃泄利神品嘔吐遺帶妙劑治奔豚必用安胎孕亦良赤苓破氣結利水道茯苓皮消水腫利水道茯神三百三十五甘平無毒療風眩風虛止驚悸健忘除心下痛堅解小腸澀淋闢一切不詳補五般虛勞善安魂魄尤養精神生大山大松下二八月採所在大松處皆有之出泰山者理小不復採用出華山者形極粗大壅州南山亦有之不如華山者出大松下附根而生無苗葉花實作塊皮黑而皺內堅而白在土底下大者數斤有赤白二種或云松脂變成或云假鬆氣而生又曰茯苓皆自作塊不附著根茯神塊小包根而生此説為勝蓋假鬆氣而生也千年者有神近世所用皆自雲南來者又曰下有茯苓則上有靈氣如絲之狀山人亦時見之非菟絲子之絲也山間獨汗茯苓末水下驗方第一胸脅氣逆腹滿茯苓同參煎服第二夢泄成白濁茯苓末米湯下第三五苓散茯苓豬苓澤瀉白朮桂枝治微熱而渴小便不利脈浮數此水停也又治渴飲水水入即吐此水逆也諸方第一半夏加茯苓湯半夏生薑茯苓治嘔而不渴者第二茯苓甘草湯茯苓甘草桂枝生薑治汗出不渴者第三茯苓飲茯苓人參白朮枳實陳皮生薑治吐水後胸滿不食者第四桂枝去桂加茯苓白朮湯桂枝湯原方去桂枝加茯苓白朮治頭痛發熱無汗心下滿小便不利者第五茯苓澤瀉湯茯苓澤瀉甘草桂枝生薑治嘔而飲水者第六琥珀三百三十六以布拭熱或手心磨熱吸得芥草者方為真也甘平無毒安神散瘀通淋破瘕壯心明目清肺利尿治金瘡止血生肌定魄魂辟邪殺魅磨目翳而去兒枕去蠱毒而平癲癇楓脂入地千年變為琥珀不獨松脂變也南海林邑多出之松脂淪入地所化有琥珀則旁無草木今並從外國來而出茯苓處並無琥珀不知出琥珀處復有茯苓否耶豬苓生用忌鐵甘平無毒入足太陰太陽經治腫脹腹痛除濕熱心煩解淋腫腳氣退妊娠子淋利小便而消腹腫息痎瘧而解毒蠱止濁帶之遺瀝解寒溫之大熱生衡山濟陰冤句蜀州習州等渚是木之餘氣所結如松之餘氣結茯苓之義他木皆有惟楓木惟多皮黑肉白而實者佳通身腫滿小便不利豬苓五兩為末白水下三錢日三服驗方第一妊娠腫渴從腳至腹小便不利同上第二妊娠子淋同上第三身腫如軟綿木通二錢豬苓三錢茯苓二錢檳榔二錢燈心少許白朮三錢水煎服第四豬苓湯豬苓茯苓澤瀉滑石阿膠治熱渴便癃脈浮又治嘔渴心煩不眠諸方第一豬苓散豬苓澤瀉白朮為末治嘔後思水飲第二雷丸三百三十七甘草水浸酒蒸用荔實厚朴蓄根芫花為使惟惡葛根苦寒有小毒殺諸蟲蠱毒逐癲狂風邪久服令人陰痿出石城山谷及漢中土中八月採乃竹之苓也大小如栗狀如豬苓而圓皮黑肉白並無苗蔓淡竹葉三百三十八甘寒無毒除新舊風邪之煩熱止喘促氣勝之逆沖止渴消痰涼心益脾治熱狂煩悶止妊娠旋暈漱齒縫出血洗肛脫不收失音不語之風驚癇鬼疰之邪頭痛壯熱之表吐血喉痹之火淡竹茹甘微寒無毒除嘔噦氣逆止吐衄血崩婦人胎産小兒癇熱傷寒勞復肺痿唾血五痔最良噎膈亦平上氣發熱竹葉同陳皮煎服三日一劑驗方第一天行發黃竹葉小麥石膏水煎頻服第二女勞復病腹痛卵腫股腫竹茹水煎第三産後煩熱短氣竹茹同參苓甘草煎服第四月水不斷竹茹炒末水下第五牙根宣露竹茹歸尾為末煎入鹽合漱第六頭痛竹茹煎水煎雞子三枚食之第七淡竹瀝甘寒無毒清熱除煩消痰止渴治中風失音解風痹胸熱中風口噤同薑汁服驗方第一子煩頻服第二小兒重舌同黃柏時時點之第三小兒目赤點之第四天竹黃三百三十九甘寒無毒治小兒驚風天吊客忤癲癇療中風風熱痰壅失音不語製藥毒熱發息金瘡血出鎮心最宜明目亦良今天竺國諸竹內往往有之人多燒諸骨及葛粉偽之不可不知或曰是南海邊竹內塵沙結成者又曰竹黃生南海鏞竹中此竹極大又名天竹其內有黃可以療疾此説得之小兒驚熱同雄黃黑醜丸服薄荷湯下驗方第一黃絹三百四十乃蠶吐黃絲所織非染絲也煎水洗痘瘡潰爛燒灰止血痢吐崩解病人消渴療産婦脬損産婦脬損不小便而淋澀不斷黃絹一尺丹皮白芨為末各一錢煎至絹爛服之不宜作聲驗方第一血崩黃絹灰棕子灰京墨灰荷葉灰水酒合服即止第二木棉青布三百四十一棉花糸羌布用藍靛染者炙熱尉目痛不瞑亦尉目赤燒灰敷積年惡瘡亦敷灸瘡漬水取飲解一切物毒煩毒丹毒煉脂合塗除諸般唇裂唇瘡口臭水浸貼陽熱之烙胸醋煮搽轉筋之入腹與蜜蠟同燒熏惡瘡入水不爛卷艾雄至炷治臁瘡流漿則愈瘡傷風水熏取惡汁嗽因風熱熏墜濁痰木棉即棉花也絲綿尤良止一切血症霍亂轉筋腹痛醋煮尉之驗方第一吐衄諸血好綿燒灰入面打糊酒調服之第二血崩不止好綿頭髮共燒灰入百草霜酒下入棕灰尤良第三臍瘡不幹燒灰敷之第四耳中出汁故綿灰棉包塞之第五褲襠灰即褻衣近襠處入足少陰太陽經治女勞疸復陰陽易疾燒襠散取婦人褲襠燒灰水下治傷寒陰陽易病身重氣少少腹滿裡急或陰中筋攣熱上衝胸頭重不舉眼目生花膝脛拘急者女取男襠諸方第一麻鞋底三百四十二入藥宜用舊者即人所者之鞋也瘧疾不止去兩頭燒灰井水服之驗方第一鼻塞不通燒灰吹之立通第二血衄不止同上第三子死腹中本婦麻鞋底炙熱尉肚臍上下十次即下第四胎衣不下同上第五常惡夢魘臥時以鞋一仰一覆著身旁第六接骨斷市上乞兒破麻鞋一隻燒灰白麵等分好醋調成打糊敷以絹束之杉木夾定須臾止痛第七皮鞋底小兒頭瘡故皮鞋底燒灰入輕粉少許香油合敷驗方第一牛皮癬同上第二瘰癧已潰同上第三身項粉瘤皮底洗淨煮爛成凍子常食之瘤自破如豆腐第四腸風下血與胡桃殼紅雞冠花燒灰酒下第五故草鞋渾身骨痛燒灰香油合敷驗方第一行路足腫被石墊傷者用尿浸之燒磚令赤置草鞋於上以足踏之令熱入里即消第二臁瘡潰爛洗淨燒灰入輕粉末敷之須先以鹽水洗之第三催生燒灰酒下第四霍亂去兩頭洗淨水煎服第五氈夜夢魘寐紅氈一尺以枕之驗方第一故梳篦三百四十三吃蝨成症梳篦各一破兩半一半燒灰一半水煎合服驗方第一霍亂轉筋入腹敗小梳一件燒灰酒下第二噎膈不通木梳一燒灰鎖匙煎水下二錢第三小便淋痛故木梳燒灰冷水下男用女女用男者第四發梗咽中久梳燒灰酒下第五乳汁不行內服通乳藥外周圍以梳梳百遍第六猘犬咬傷故梳同韭根煎服第七敗蒲席扇三百四十四五色遊丹燒灰合雞子白敷驗方第一癰疽不合燒灰蠟脂油合納孔中第二小便不利燒灰同滑石末服之第三盜汗燒灰酒下用蒲扇良第四月水不斷同上第五蜂蜜三百四十五入水四分之一煉熟用甘平無毒入足陽明太陰手陽明經養脾和胃清熱解毒潤燥止痛除煩和中治赤白痢下止心腹血刺善和諸藥尤療諸瘡陰頭生瘡蜜煎甘草敷之驗方第一熱油燒痛塗之第二産後口渴煉蜜水調服第三難産橫生同香油各二兩煎服立下第四痘疹作癢以翎掃之第五癮疹瘙癢好酒調服第六誤吞錢骨頻頻服之第七蜜煎導蜜煉乾作挺納穀道中治津竭便硬小便利而出汗諸方第一黃蠟三百四十六甘微溫無毒治下痢膿血金瘡臁瘡生肌止痛補中續絶益氣耐飢白蠟治膿痢後重安胎産下血能補絶傷尤利小兒白蠟與蜜蠟之白者不同乃小蟲食樹汁所作也四川湖廣滇南閩嶺吳越皆有之蠟樹枝葉似冬青四時不凋五月開白花成叢其蟲大如蟣蝨芒種後則延緣樹枝食汁吐涎黏於枝莖化為白蠟處暑後則剝取煉化濾淨待凝成塊即為蠟矣蜜蠟之白者乃經水煉過或懸於風日中所變化耳肝虛雀目黃蠟熔汁取出入蛤粉相合每用刀子切下二錢以豬肝二兩批開入藥在內扎定煮熟急乘其熱以熏眼至溫並肝食之日二次以平安不發為度者也驗方第一代指疼痛黃蠟松香相合火炙籠指即瘥第二手足凍瘡煎黃蠟敷之第三湯火瘡爛香油一兩當歸三錢煎焦去渣入黃蠟三錢貼之第四妊娠胎漏黃蠟一兩酒化服立止第五霍亂吐痢同上第六臁瘡黃蠟一兩香油二兩黃丹半兩同化開頓冷瓶收以之攤貼可也第七金瘡同上第八湯火瘡同上第九調氣飲黃蠟三錢阿膠三錢同化入黃連末五錢分三服治赤白痢腹痛下重諸方第一膠蠟湯黃蠟六錢阿膠六錢同化當歸二錢五黃連三錢黃柏一錢陳廩米二兩先煎米熟去米入藥煎服治熱痢産後痢第二移瘡方地龍一個入絲瓜內煅焦共為末每用三錢再入元香一錢乳香五分沒藥五分雄黃一錢蟾酥一分黃蠟一兩為末以蠟為丸每服三分治瘡在緊要處可移於間散處在上部宜用甘草二錢桂枝二錢麻黃二錢黃酒煎送藥下可移於手而散在脊上要處用防風三錢薑引水煎下可移於背上在下部用牛膝二錢靈仙二錢陳皮二錢獨活二錢薑引水煎可移於足上矣第三露蜂房三百四十七炒熟用惡乾薑丹參黃芩芍藥牡蠣樹上大蜂房佳甘平有毒手足陽明藥也除驚癇瘛瘲解癲狂蠱毒殺鬼精邪惡祛蜂毒腸痔同蛇皮燒灰漬酒治惡疽附骨並豬脂煎研作膏塗瘰癧成瘻燒灰酒服主玉莖痿弱並下乳石煎水漱口止齒牙風蟲又洗乳癰狐刺惡瘡並療下痢遺尿亦禁風癢癮疹煎汁入芒硝敷之日五次又同蛇蛻炒末酒服一錢驗方第一牙腫連頭燒末酒合含漱第二風蟲牙痛醋煎熱漱第三崩漏五色炒末酒下大效第四陰痿不起燒末新水下二錢大效第五陰寒痿弱燒灰敷上即熱而起第六小兒重舌腫痛燒灰酒合敷第七蟲白蠟三百四十八甘溫無毒生肌止血定痛補虛續筋接骨為外科要藥非蜜蠟之白者乃小蟲伏蠟樹食汁葉涎化為白脂當秋刮取水煮溶濾入冷水則塊矣和油燒燭大勝蜜蠟頭上禿瘡蠟燭頻敷勿令日曬久則發自生矣驗方第一五倍子三百四十九一名川文蛤宜煅研用酸澀咸寒無毒入手太陰足太陽斂肺降火生津化痰除咳止血解渴斂汗斂一切潰瘡金瘡脫肛子腸下墜收諸般濕爛膿水牙宣痔瘻下血住泄痢而止嘔吐烏鬚髮而止腫毒目赤喉痹最宜口疳鼻蝕亦良在處有之以蜀中者為勝乃小蟲伏鹽膚子木食汁結巢漸漸長堅山人霜降後採取蒸殺貨之否則蟲必穿壞矣虛勞遺濁佐茯苓龍骨丸服鹽水下驗方第一盜汗同蕎麥麵作餅煨熟夜臥時干吃勿飲水又為末津合敷臍上縛定第二瀉痢不止半生半熟丸服赤痢燒酒下白痢水酒下水瀉米湯下又為末每下一錢第三腸風下血同白礬丸服忌酒第四耳瘡腫痛為末水合敷濕則乾摻第五耳中出膿為末吹之第六牙縫出血為末敷之第七瘡不收口焙末醋合敷四圍第八一切腫毒初起炒末蜜合敷第九一切諸瘡同黃柏末敷之第十下部疳爛同枯礬搽之十一天行口瘡為末摻之吐涎十二陰戶疳爛同紅褐子黃繭黃扣線焙末敷之十三小兒脫肛同苦參壁土煎洗次用木賊末搽之或蠣粉末亦可十四文蛤散文蛤為散沸湯下治欲飲不渴肉上粟起而煩者又治渴欲飲者諸方第一沖翳散五倍子五錢苦參四錢升麻二錢草決明二錢薄荷一錢防風一錢荊芥一錢白芷一錢川芎一錢羌活一錢水煎秋冬入大碗中宜在屋內日夕時春夏在天井向西偏南吹藥沖目去厚翳每日吹之一日一服或七八服或十餘服或二十三十四十服用葦筒第二百藥煎酸寒微甘無毒清肺化痰定嗽解熱生津止渴收濕消酒口鼻疳蝕便溺血脫一切風濕諸瘡將五倍子十斤水漬舂細用瓷缸盛貯稻草蓋盦七日夜取出再搗入桔梗甘草末每二兩又盦一七仍搗仍盦滿七次取出捏餅曬乾即為百藥煎桑螵蛸三百五十炙黃用貨者多用桑枝膠偽之甘咸無毒足少陰太陽藥也止遺尿失精療疝瘕腰痛起陰痿而通淋益精氣而固腎遺精白濁同龍骨末服驗方第一一切遺尿炙末水下第二螵蛸散桑螵蛸遠志菖蒲人參茯神當歸龜甲末服治尿數如淋或赤白濁淋諸方第一白殭蠶三百五十一炒淨絲用惡螵蛸桔梗茯苓茯神萆薢諸味咸辛無毒祛風化痰散結行瘀療頭風齒痛止喉痹咽腫瘰癧結核丹毒瘙癢小兒驚疳婦人崩帶治中風之失音除久瘧之結痰退莖囊之癢痛消皮膚之風瘡滅瘡瘢而拔疔根息金瘡而療風痔一切風痰七個焙末薑汁灌之驗方第一小兒驚風同蠍梢附子尖為末薑湯灌之第二酒後痰咳焙末茶下第三急喉風痹焙末薑湯灌之或加南星第四金瘡焙末敷之立愈第五小兒鱗體去嘴為末水煎洗之一加蛇皮第六蠶繭甘溫無毒治血淋血崩止消渴反胃療諸疳瘡殺諸蛔蟲燒灰酒服治癰腫無頭次日即破一枚出一頭二枚出二頭也痘瘡疳蝕膿水不止用一枚白礬末填滿煅枯為末搽之神效驗方第一口舌生瘡五枚包硼砂瓦上焙焦為末搽之效驗如神第二反胃吐食十枚煎汁烹雞子三個食之酒下神效第三婦人斷産蠶子故紙一尺燒末酒下終身不産即蠶之運也第四未連雄蠶蛾固精強陽交接不倦焙末丸服驗方第一蠶沙三百五十二原蠶者良乃第二番蠶也甘辛溫無毒祛風除濕散瘀破症止崩通經解渴消疹炒熱尉偏風癱瘓手足不遂腰腳痿軟皮膚頑痹炒黃浸酒亦良半身不遂作二袋蒸熟更互尉患處驗方第一癮疹作癢成瘡水煎洗浴避風第二頭風白屑作癢燒灰淋汁洗之第三血崩炒末酒下三五錢第四月經久閉炒黃四兩酒煎沸去渣溫服第五扭傷閃出骨竅炒黃四兩緑豆粉四兩炒黃枯礬二兩為末醋合敷之絹包縛定數易之第六心痛莫忍滾湯泡一兩去渣服清湯即止第七斑蝥三百五十三糯米同炒去翅足用馬刀為使畏巴豆丹參空青惡甘草豆花辛寒有毒外用蝕死肌敷疥癬惡瘡內用破石淋拔瘰癧疔毒利水道而墜胎除疝瘕而潰肉制猘犬咬傷下鬼疰蠱毒靛汁黃連黑豆糯米等能制其毒芫青亭長地膽治略同壯婦經閉血乾斑蝥二十個大黃五錢桃仁四十九個酒丸豆大每酒下五七丸用四物湯下驗方第一新舊經閉斑蝥五個乳香沒藥兒茶巴豆蔥白各五分為丸綿包系放筒上縛住送入陰戶中一炷香時經當下未生子者不可用也第二血疝便毒斑蝥三個南滑三錢同研分作三服空心白湯下如服後小便痛以車前木通燈芯草豬苓澤瀉等利之第三疔瘡拔根斑蝥一個捻破以針劃瘡上作米字形封之即出根矣第四癰疽拔膿或破而腫硬無膿斑蝥為末以蒜搗膏合貼之膿出去藥第五全蠍三百五十四辛甘有毒治諸風眩掉驚癇抽掣療偏風不遂目口斜歪大人痎瘧耳聾女子帶下陰脫疝氣風瘡之疾癮疹瘡癢之疴小兒一切驚風炙焦為末薄荷湯下驗方第一婦人乳癰積乳沒藥三錢乳香二錢蜈蚣半條全蠍二個焙焦為細末黃酒沖服發汗第二水蛭三百五十五銼細炒熟用之畏石灰食鹽咸苦微寒有毒足厥陰藥也破積血而通經化堅症而墜胎蜘蛛三百五十六簷角懸網者是也微寒無毒足厥陰藥也能消偏墜兼療狐疝蜘蛛散蜘蛛桂枝為散飲服治狐疝偏墜有大小時時上下諸方第一蠐螬三百五十七焙乾研粉用糯米同炒尤良畏附子咸平有毒足厥陰藥也化瘀血而通月經消症塊而破脅血木竹入眼搗塗之立出驗方第一斷酒不飲焙末酒服永不飲第二蟬蛻三百五十八漿水煮過曬乾用去翅足咸甘寒無毒除風熱發痘疹退目翳治啞病解小兒肺熱驚癇噤風天吊夜啼陰腫療大人中風失音膚癢頭眩久痢消渴蟬性同墜胎落胞通乳殺蟲治小兒驚癇壯熱癇喑不言小兒陰莖頭腫用半兩水煎洗之仍服五苓散即消驗方第一痘瘡作癢同炙草煎服第二皮膚風癢同薄荷葉為末酒下日三第三小兒天吊頭目仰視痰塞內熱洗淨為末冷水下第四小兒驚啼二七個為末入辰砂末蜜調與吮之第五頭風旋暈一兩為末酒下白湯亦可第六痘後目翳為末每一錢豬肝湯下第七大蜣螂三百五十九蒸熟收貯臨用去足火炙之畏羊角羊肉與石膏咸寒有毒治小兒驚癇瘛瘲腹脹寒熱治大人癲疾陽狂腹滿奔豚塞下部引痔蟲盡出敷金瘡令箭頭自拔利二便燥結治瀉痢赤白塗一切惡瘡疔毒解諸般疳蝕𧈟蟲除鼻下息肉點舌下重舌最墜胎孕亦療脫肛小兒疳疾煨熟食之驗方第一急慢驚風用一個杵爛以水一盅於百沸湯中燙熱必去渣服之第二赤白下痢燒末酒下五分甚效第三重舌燒末唾合敷舌上第四一切惡瘡為末香油合敷第五灸瘡出血燒末豬脂合敷第六附骨疽漏用七枚用大麥搗敷第七一切瘻疾燒末醋合敷之第八大小便祕欲死者烘一個烘乾當中斷大便不通用上半小便不通用下半細末井水下二便俱不通全用即愈第九螻蛄三百六十去翅足炒用咸涼有小毒潰癰腫而下哽噎消水腫而通石淋平瘰癧而治惡瘡出肉刺而催難産利二便善療口瘡治水腫甚效其性最急虛人戒之一切水腫喘滿五枚焙末白湯下小便利為效驗方第一氣水面腫焙末同輕粉吹鼻以黃水下為效第二石淋疼痛七個食鹽二兩新瓦上鋪蓋焙乾去鹽每服一錢七日愈第三小便不通取下半截焙末水下第四胎衣不下同上第五針刺入肉杵汁滴上三五日自出第六箭入肉同上第七竹木入肉為末白麵合敷即出第八蟅蟲三百六十一炒枯存性研用其極小者名鼠婦即俗云濕生蟲也畏皂角菖蒲酸微咸寒無毒足厥陰藥也消瘀破症下乳通經療折傷而續筋骨祛積血而治口瘡鼠婦利水道而墜胎破癥結而通經除久瘧之寒熱解風蟲之齒牙治小兒之驚風起痘瘡之倒靨折傷接骨土鱉焙末每服三錢神效一方生者研汁酒服一方同自然銅火煅醋淬七次為末每酒下二錢又方土鱉一個新瓦上焙乾巴豆一斤去殼半夏一斤生用乳香半分沒藥半分自然銅火煅醋淬七次用些須為細末每服一釐黃酒送下不可多用多則補得高起其神效非常用端午日製藥最忌婦女及雞犬等物驗方第一大黃蟅蟲丸蟅蟲二十枚去足桃仁二十枚大黃二兩煉蜜分四丸每酒下一丸當下乾血治産婦積血腹痛諸方第一虻蟲三百六十二去翅足炒用惡麻黃此蟲善吮牛血苦微寒有小毒逐瘀破症通經墜胎生胎欲去用十枚燒末酒下驗方第一蟾蜍三百六十三泥固煅用有癩者辛涼微毒足陽明藥也療諸般癰疽發背惡瘡治一切五疳八痢腫毒殺疳蟲而平鼠瘻破癥結而除陰蝕小兒疳積腹大黃瘦取大者一枚去首足腸清油塗之用陰陽瓦焙熟末食之連服五六枚驗方第一小兒疳瀉腹大黃瘦取一枚燒末飲服第二發背腫毒未成者用活蟾蜍一枚繫於瘡上半日必昏憒置水中救其性命再易一枚其蟾蜍如舊則毒散矣又勢重者破開可連肚合瘡上第三一切疳積燒末醋敷第四金蟾散大蟾一枚揀砂塞滿腹用黃泥固濟燒紅去泥為末酒下分數服治單腹脹諸方第一蟾酥辛溫大毒療一切惡腫發背疔瘡小兒勞瘦疳疾腦疽蟾酥丸蟾酥三錢輕粉銅緑膽礬枯礬寒水石乳香沒藥雄黃各一錢麝香七分硃砂三錢蝸牛二十一個先將蝸牛研爛入各藥末丸緑豆大每三丸蔥白嚼爛裹藥黃酒送下出汗治一切疔腫諸方第一蜈蚣三百六十四去頭足炙用赤足者良辛溫有毒入足厥陰經治臍風撮口驚癇瘰癧療蛇症甲肉症癖毒蠱最墜胎孕兼殺蟲毒出南方今西南處處有之趾甲肉突焙末敷之以南星末醋合敷四圍驗方第一手上蛇頭燒煙燻之或為末豬膽汁合敷第二蛇症吐食常飢食物即吐焙末酒下一枚第三白頸蚯蚓三百六十五蛐蟺咸寒有小毒除一切大熱狂煩除諸般風癇水腫赤遊丹毒蛐蟺糞水合敷或者加皮硝驗方第一蝸牛三百六十六俗名毒波落每秋夏時雨後出咸寒有小毒解熱消毒除風癇臍風撮口消腫毒痔漏喉痹龍骨三百六十七煅赤用同人參牛黃良畏石膏青白者良也甘澀微寒無毒入手足少陰手陽明足厥陰經固腸益腎安魂鎮驚辟邪解毒澀精止痢除驚癇瘧痢止吐衄崩帶止虛汗而定喘生肌肉而斂瘡出晉地山谷中及太山岩水岸上穴中採無時勞心夢泄同遠志煉蜜為丸硃砂為衣服之驗方第一久痢脫肛為末敷之第二臍瘡同上第三陰囊汗癢同蠣粉撲之第四龍齒寒澀無毒鎮心安魂除寒退熱止一切驚癇癲狂解諸般精物蠱毒山甲三百六十八蛤粉炒用沙炒亦可咸微寒有小毒入足厥陰陽明經通經下乳消腫止痛排膿通竅殺蟲除驚解痰瘧寒熱退風痹強直療蟻瘻瘡癩平疥癬痔漏生湖廣嶺南及金商均房諸州深山大谷中皆有之形似鼉而短小又似鯉而有四足能陸能水日中出岸張開鱗甲如死狀活蟻入甲即閉而入水開甲蟻皆浮出因接而食之熱瘧不寒同干棗末服三錢驗方第一乳汁不通為末酒服外以梳梳之第二乳癰同上第三痘子變黑末服酒下入元香少許即發紅如神第四便毒佐豬苓為末每酒下二錢外山甲末同輕粉及香油敷神效第五瘰癧潰壞燒研敷之第六眉間癬合輕粉香油敷之第七一切大痛不止乳癰腹癰耳中大痛或聾便毒等症青皮四錢陳皮四錢蔞仁二錢淨花一錢穿山甲二錢連翹一錢甘草二錢湯及散服俱可也第八山甲五錢烏頭五錢為末搗蔥白汁合成敷足心布中縛定以足浸滾水稍熱盆中待身麻汗出急去藥避風即愈半月後再行一次除根治癱瘓手足不舉諸方第一蛤蚧三百六十九去頭足焙黃用咸平有小毒補肺潤腎定喘止嗽除渴通淋益精助陽住咳嗽之血逆通閉結之經脈生嶺南山谷及城牆或大樹間形如大守宮守宮即俗名蠍虎子也大抵即世俗所稱馬車子之類也蛇蛻三百七十皂角水洗淨燒用甘咸有小毒除一切惡瘡驚癇腫毒殺諸般邪魅蠱蟲惡氣耳忽大痛燒末吹之立止驗方第一生産橫逆燒末酒下立順第二
