服之十三背疽初起酒服四兩毒不內攻十四倒倉法黃肥牝牛肉二十斤長流水煮成糜去渣將肉湯再熬成琥珀色服前減食一日每飲一盅病在上則吐在下則泄吐痢後渴即服自己小便臥二日再食淡粥養半月則沉疴悉去矣治停痰積血或為癱瘓或為勞瘵或為蠱脹或一切積滯脈虛症虛者不可用諸方第一牛乳甘微寒無毒潤腸胃解熱毒補虛勞治反胃噎膈牛臟腑補人各臟腑黃牛屎腳根腫痛用鐵鍁炒熱入鹽罨之驗方第一濕熱黃病黃牛屎日曬乾丸服第二痘瘡潰爛用乾者燒白灰敷之第三小兒爛瘡野外乾者燒灰入輕粉香油敷第四癰腫不合燒末雞子白合封干即易之第五白馬溺三百九十六辛微寒有毒破症積而止渴療反胃而殺蟲婦人乳腫塗之立愈驗方第一伏梁心積銅器貯之每旦服之第二白馬通即糞也微溫無毒止一切血症損傷諸瘡手足腫痛水煮汁漬之驗方第一馬頭骨甘微寒有小毒燒灰水服令不睡作枕亦良灰敷頭耳瘡膽熱多眠頭骨粉鐵粉各一兩硃砂半兩冰片半兩蜜丸豆大每竹葉湯下三十丸食後服驗方第一驢尿三百九十七辛寒有小毒治反胃膈噎殺蟲阿膠蛤粉炒用山藥為使畏大黃辛平無毒入厥陰肝清肺養肝滋腎益氣和血補陰除風化痰潤燥定喘利腸止血除虛勞之咳嗽息肺痿之吐膿解腸風之下血消水氣之浮腫腰腹骨節之痛癰疽腫毒之瘍吐衄淋痔之血崩帶胎產之疴善調經脈亦安胎產泄者忌用阿井在山東兗州府陽穀縣東北六十里即古之東阿縣也有官舍禁之彼用井中水煮烏驢皮作膠不作皮臭夏月亦不濕軟今人多以牛皮膠偽之以黃透如琥珀色或光黑如漆者為真妊娠血痢酒服之良驗方第一膠艾湯阿膠川芎當歸甘草白芍地黃艾葉治妊娠腹痛下血諸方第一虎骨三百九十八頭骨及脛骨良捶去髓炙用辛微寒無毒祛風健骨定痛解邪治風痹攣痛驚悸癲癇療風腫骨節腳膝痛腫一切筋骨走痛浸酒服良驗方第一象牙三百九十九刮生屑用甘寒無毒治風癇驚悸療邪魅精物息瘡瘍解骨蒸諸鐵入肉刮屑合水敷之立出驗方第一雜物入肉同上第二象皮燒用治金瘡療下疳扇風散象皮五錢焙龍骨五錢煅陳石灰一兩松香一兩枯礬一兩共為極細末瓷瓶收貯遇有損傷敷之用扇扇之如傷處發腫或結血痂煎黃連水洗之敷藥亦治臁瘡諸方第一犀角四百用生者研用入丸散紙裹納懷中令熱搗之立碎翡翠屑金人氣粉犀即謂是也苦酸咸寒無毒涼心瀉肝清胃祛風利痰解邪解毒止血止吐血下血除發黃發斑提痘瘡黑陷除風熱驚癇消癰腫而化膿止譫狂而退熱痘子稠密磨汁冷飲驗方第一服藥過劑燒末水服第二熊膽四百零一陰乾用苦寒無毒涼心平肝明目殺蟲治驚癇五痔療惡瘡諸疳十年痔瘡用熊膽塗之大效驗方第一小兒驚癇水服豆許第二羚羊角四百零二水磨汁用末用者要極細咸寒無毒入足厥陰手太陰少陰清心瀉肝明目去障去風舒筋退熱解邪治驚癇搐搦骨痛筋攣療狂越僻謬夢魔驚駭去惡血而益氣止血痢而降火除煩滿而治噎消腫毒而明目鹿茸四百零三酒炙焙用甘溫無毒生精補髓養血助陽強筋健骨益氣破瘀治腰腎虛冷療四肢痠痛崩帶遺精之疾腳膝痿弱之疴鹿角銼屑蜜浸火焙用咸溫無毒散熱行血消腫解邪平癰腫惡瘡除折傷惡血止脫精尿赤塗重舌鵝口除腰脊之疼痛解夢寐之交接婦人夢交酒服一撮即出鬼精驗方第一婦人腰痛錯屑炒黃研酒服第二腫毒癤毒磨汁敷之第三鹿角霜米泔浸七日令軟入急流水浸七日去粗皮入東流水桑柴火煮七日旋旋添水入醋少許取搗成霜其汁入酒熬成膠是矣甘平無毒補中益氣止痛安胎治一切血病吐血下血尿血血崩血閉療諸般勞症勞嗽勞瘦勞絕精勞虛勞益髓長肌肥身悅顏淋露折傷之苦瘡痔腫毒之疴除赤白之漏下助陰分而生子鹿角膠專於滋補余治同霜炒用遺精盜汗霜同龍骨牡蠣粉酒丸服驗方第一虛勞尿精膠炒末酒服第二男子陽虛霜茯苓丸服第三小便數同上第四陽和湯鹿膠二錢熟地三錢肉桂五分乾薑五分麻黃五分托一切陰疽諸方第一麝香四百零四微細用不必甚細當門子良今人多雜荔枝之核偽之不可不知辛苦溫香無毒通竅走絡透骨辟邪催生墮胎除瘕破症解惡氣而殺鬼精止驚癇而解魘寐治瘧疾而吐風痰退目翳而療耳聾治一切中風中惡蝕諸般癰瘡腫毒膨水息心腹之暴痛開痰氣之厥逆療鼻塞之失味平毒物之咬傷殺蟲最能除毒亦效明月砂四百零五炒用即兔屎也除目翳而解毒療勞瘵而殺蟲善平痔瘻尤治疳瘡五疳下痢炒用半兩干蛤蟆一枚燒灰為末綿裹納下部日三易驗方第一明月丹兔屎四十九粒硇砂等分丸豆大月望前以水浸甘草一夜五更初起取汁送下七丸有蟲下急鉗油鍋中煎殺三日不下再服治癆瘵追蟲或四體如焚寒熱煩躁諸方第一筆頭灰兔毫者療心痛而催生止咽痛而通淋牡鼠四百零六甘平無毒鼠瘻潰爛以豬脂油煎鼠一枚令消盡入發一團化盡以一半塗之以一半酒服不傳之妙方也驗方第一滅諸瘢痕以臘脂油煎鼠一枚令消盡日日頻塗之妙第二潰癰不合燒末敷之第三蛇骨刺人同上第四狐瘕如孕精神恍惚月經不通胸脅腰背痛引陰中小便難嗜食欲嘔用新綿包鼠一個泥固桑火燒焦入桂心末三錢每酒下三錢第五令人媚悅五月五七月七正月朔子時取牡鼠一個向子位刮取外腎陰乾佩囊中男左女右人見之無不喜悅所求如意也第六目澀好眠鼠目一個燒研和魚膏點之再以絳囊盛兩枚佩之第七青盲眼鼠膽同鯉膽點之第八牡鼠糞兩頭尖者是炒用甘微寒有小毒下死胎而通月經塗鼠瘻而平乳癰治勞復而療陰易敷折傷而消瘡腫解大腹之疳疾除貓犬