莖黑鉛五錢化開投水銀二錢五分研末見星入寒水石三錢五分輕粉二錢五分硼砂一錢共為極細末如遇此症用蔥艾花椒熬水洗之若怕洗將湯入瓶內將龜頭向瓶口薰之止了痛再洗拭乾摻上此藥再查犬部方驗方第一舌被咬去若舌咬去少半或舌尖先以乳香沒藥煎水口含止痛後上藥即長全也效第二黑錫丹真沉香五錢黑附子五錢胡蘆巴五錢肉桂五錢茴香一兩破故紙一兩肉蔻一兩金鈴子一兩木香一兩鉛三兩硫黃三兩與鉛化結為沙子如鉛不成沙入水銀少許酒丸豆大每四五十丸姜水下治脾元久冷上實下虛胸中痰飲或上攻頭目乃奔豚上氣兩脅膨脹並氣不升降治五般水氣腳氣上攻猝中風痰擁上膈各種等症諸方諸一黃丹四百二十三鉛一斤土硫磺十兩硝石一兩先將鉛熔化成汁下醋點之滾沸下硫黃一錢少頃下硝石少許沸定再下醋依前下硝黃待為末則成丹矣水飛炒用之辛寒無毒內服墜痰除吐消積殺蟲治驚疳痢瘧外敷解熱拔毒去瘀止血定痛生肌解消渴而明目染鬚髮而下氣一切目疾蜜半斤銅器熬起紫色入水飛黃丹二兩水一碗再煉至水氣盡以細絹濾淨瓶封埋地中三七日取以點目用驗方第一目赤痛同蜜敷太陽穴立效第二赤目及翳同白礬末點之第三目生珠管鯉膽合點第四小兒口瘡黃丹一錢蜜一兩蒸黑雞毛掃之甚效第五瀉痢赤白棗肉搗爛入黃丹白礬各豆大米飯和丸若彈大鐵線穿燈上燒過為末米湯下第六赤白痢同黃連丸服第七妊娠痛痢烏雞子開孔去白入黃丹五錢攪勻泥包煨乾為末每米湯下二錢一服愈是男二服愈是女子第八吐咯嗽血新汲水下一錢第九松香散紅棗八錢去核燒焦黃丹松香枯礬各四錢為末香油調敷治黃水瘡諸方第一碧霞丹黃丹四兩醋半斤煎乾另用炭火就銚中煅紅為末米飲丸豆大每醋湯下七丸治吐逆不止第二燒針丸黃丹硃砂白礬棗肉丸豆大每服四丸針刺燈上燒過涼米泔浸下治嬰孩或嘔或瀉或瀉嘔並作外用雞子白合綠豆粉嘔敷足心瀉敷頭心第三鉛粉四百二十四乃黑鉛所制炒用瘡似蜂窩同硃砂蜜合敷之驗方第一痘瘢凸凹同輕粉豬脂合敷之第二臁瘡用四兩水合入碗內艾葉燒煙薰干入乳香少許同研香油合作隔紙膏反復貼之第三神應膏官粉四兩香油三兩熬至入水成珠入白膠香少許水浸二日油紙攤貼治一切癰疽惡瘡諸方第一密陀僧四百二十五水煮用辛咸小毒墜痰鎮驚止血散腫消積殺蟲治瘧除痢療腫毒而愈凍瘡解胡臭而染鬚髮平金瘡而息瘢䵟止咳嗽而降嘔逆赤白痢下三兩燒黃為粉每醋茶下一錢日三次驗方第一痰積胸中用一兩醋水合煮乾為末酒水煎服每二錢吐痰良第二因驚失音為末每茶下一錢第三鼻中生瘡同白芷末蠟燭油合敷之第四鼻皶赤皰用二兩細研乳調晚敷旦洗之第五密陀僧膏用二十兩為末赤芍二兩當歸二兩大黃半斤苦參四兩四味先炸枯去渣入密陀僧末百草霜二兩細研篩入油鍋中乳香五錢沒藥五錢赤石脂二兩血竭五錢兒茶五錢銀黝一兩六味均不細篩於滴水成珠後入之入水中扯千次常以水浸之貼一切惡瘡流注瘰癧跌打損傷金刃等症諸方第一古文錢四百二十六辛平有毒明目除翳止心腹疼痛催橫逆胎產諸鐵四百二十七一切草木藥畏之熟鐵辛平有毒堅肌耐痛生鐵鎮心除癇散瘀消丹針砂作鐵索磨鑢細末也須真鋼砂乃可用鐵粉鋼鐵飛煉而成者鐵落煅時鐵砧上打落者鐵鏽鐵上赤衣也雲母四百二十八鹽湯煮之可作粉甘平小毒補中下氣堅肌續絕治癆傷溏痢療瘡腫癰疽生太山山谷及廬山齊山定山石間二月採兗州淳州杭越間亦有之生土石間作片成層可析明滑光白者為上丹砂四百二十九明淨者良細研水飛用惡磁石畏鹼水忌一切血甘寒無毒鎮心清肝明目發汗祛風定驚解毒辟邪止渴安胎通脈除煩西南諸山谷皆有之有數十種以辰州錦州者為良光明瑩澈者為勝今世所用皆都仇池雄黃夾雌黃者俱不堪用惟以光明如鏡者入藥水銀四百三十畏磁石砒霜乃煉硃砂而成者辛寒有毒祛痰除驚墜胎絕孕治瘡療風退熱利水卻蟲疥蟣蝨之患解金銀銅錫之毒輕粉四百三十一畏磁石忌一切血溫燥有毒殺蟲治瘡劫痰消積除水腫鼓脹治瘰癧疥癬乃水銀燒煉而成者其法用水銀一兩白礬二兩食鹽一兩同研不見星鋪於鐵器內以小烏盆覆之篩皂灰鹽水和封固盆口以炭火打二炷香時取開則粉升於盆上矣一兩水銀可升八錢下疳陰瘡為末摻之驗方第一銀硃四百三十二乃水銀煅煉而成者今人多以黃丹及礬紅雜之不可不知辛溫有毒破積滯劫痰涎散結胸殺蟲蝨療疥癬惡瘡琥珀膏官粉一錢血餘一錢輕粉五分銀硃七分花椒七粒黃蠟四錢琥珀一分香油一兩將余椒炸焦去渣繼下諸末晚下黃蠟治手指疔毒潰爛又白芨末銀硃涼水合敷一切瘡腫諸方第一雄黃四百三十三紅如雞冠明澈不臭重大者良劣者名熏黃燒之臭只堪殺蟲蝨熏疥瘡耳辛溫有毒殺百毒而辟邪治驚癇而殺蟲散百節之大風解伏暑之瀉痢開痰澼而搜風止腹痛而破積除頭風之眩暈退瘧疾之寒熱化腹中之瘀血兼殺癆蟲疳蟲併除鼻中息肉除惡瘡臁瘡鼠瘻最良疥癬最易生武都山谷明澈如雞冠者佳味不臭而堅實者良今人每以此偽丹砂不可不知蛇頭蛇眼蛇節蛇背蛇腹泥鰍諸疔毒雄黃二錢輕粉五分蟾酥二錢冰片一分水合敷之猝中邪魔為末吹鼻驗方第一闢禳魘魔以棗許帶左脅下終身不魘第二下部痛癢蟲蝕狐惑燒煙瓶中熏之第三五屍疰病發則痛變無常上衝心脅同大蒜丸彈大每酒下一丸第四腹脅痞塊用一兩白礬一兩麵糊攤貼大便重乃愈第五陰腫如斗痛甚同白礬每二兩甘草一兩水煎浸之第六臁瘡日久用二錢陳皮五錢青布卷捻燒煙燻之熱水流出數次即愈第七牙根臭爛走馬牙疳也棗七枚去核每包雄黃豆大鐵線穿之於燈上燒末以摻之第八疳蟲蝕鼻同葶藶末豬膽汁合槐枝點之第九鼻準赤色同硫黃各五錢官粉二錢乳汁合敷第十蟲牙痛同棗肉丸塞孔中十一痘疔用一錢紫草三錢為末胭脂汁合以針挑破點之十二皮內蟲啼如蟹而走筋肉所化也同雷丸為末摻豬肉上炙熟食之十三杖瘡腫痛同密陀僧末水合敷十四風癢如蟲同松香為末蜜丸豆大每十丸日三次百日可愈十五中藥箭毒為末敷之汗出愈十六呃逆危篤黃酒煎雄黃二錢嗅之即止十七天蛇毒牡蠣粉二錢雄黃四錢以蜜合而敷之十八中飲食毒同青黛末新水下十九截瘧丸信石一錢明雄黃三錢辰砂三錢甘草二錢綠豆粉一兩丸豆大臨發日五更井水吞二丸小兒一丸瘧疾脈沉者可截之諸方第一熏黃乃雄黃之劣者色黃而臭之治惡瘡而平疥癬殺蟲蝨而熏咳嗽三十年嗽熏黃莨菪子木香為末羊脂塗青紙上以末鋪之竹筒燒煙而吸之妙驗方第一咳嗽熏法用一兩以蠟調卷為筒十枚燒煙吸菸取吐止日一次食白粥第二雌黃主治略同生山陰色如金者佳色黑者勿用與雄黃同產但色赤黃如金耳石膏四百三十四煅時雞子為使惡莽草巴豆出青徐者為真甘寒無毒入手太陰肺足陽明胃經清燥渴而除熱汗解狂熱而止煩喘住鼻衄而除牙痛斂痰飲而除火嗽墜頭痛而解肌息火灼而平癰療金瘡而通乳理咽痛而止渴汗而渴者宜服之傷寒發狂逾垣上屋同黃連為末甘草湯下驗方第一小兒丹毒水合服第二喘嗽熱盛用二兩甘草半兩薑蜜湯分服第三痰熱喘嗽痰湧如泉為末參湯下脈浮洪滑第四小兒吐瀉色黃同甘草為末水下第五乳汁不下水煎頻服第六油傷火灼水合敷之第七金瘡出血同松香乾摻第八瘡口不斂煅紅二兩黃丹半兩為末摻之第九刀瘡傷濕潰爛用一兩黃丹二錢為末洗後敷之甚者加龍骨兒茶第十白虎湯知母石膏大米炙草治汗渴內熱脈滑而厥諸方第一小青龍加石膏湯麻黃桂枝白芍細辛五味半夏甘草乾薑石膏治咳而上氣煩躁而喘又治肺脹脈浮者第二滑石四百三十五丹皮同煮研用石葦為使惡曾青制雄黃以廣東中及山東蓬萊者為佳云甘寒無毒足太陽藥也利小便而止渴降心火而退熱通諸竅而行乳解五淋而瀉濕療黃疸水腫除瀉痢腳氣行滯積瘀血消吐衄瘡腫小便赤黃不利者急服清利者忌用黃疸晡熱額黑溏瀉得之女勞同石膏末大麥湯下腹滿難治驗方第一小便不通為末合車前汁敷臍之四旁干再易冬月水合第二妊娠子淋尿閉水合敷臍下第三伏暑水瀉火煅一兩硫黃四錢丸綠豆大姜水下第四伏暑吐瀉燒四兩木香丁香各一錢為末米湯下一錢第五霍亂及瘧同上第六熱瘡遍身出黃水風毒也為末敷之第七腳趾縫爛滑石一兩煅膏半兩枯礬少許摻之第八陰下濕癢同上第九斑喘發硬目赤鼻脹此熱毒也同白礬為末不住服第十益元散南滑石六兩甘草一兩為末每服三錢溫水下實熱涼水下治中暑身熱尿澀暑瀉下迫催生下乳煩熱瀉泄腸癖赤白痢蓄水消渴產後熱甚乳痛諸淋石淋身熱嘔吐五勞七傷胸腹悶痛煩滿短氣痰嗽驚悸健忘一切虛損陰痿等症諸方第一赤石脂四百三十六火煅水飛畏芫花惡大黃松脂甘澀辛溫無毒手足陽明手少陰足太陰藥也療腸澼瀉痢止崩帶遺精益氣補心收濕止血長肉收口明目催生南方山谷有之有五色今惟赤白二種入藥白者入氣分主治略同赤白痢為末服驗方第一冷痢腹冷白凍同乾薑丸服第二小兒疳痢末服第三痢後脫肛為末敷之第四經水過多同故紙末服米湯下第五痰飲吐水末服酒下盡一斤第六桃花湯石脂乾薑大米治膿血痢腹痛虛寒者諸方第一脂糧湯赤石脂禹餘糧治大腸滑痢第二爐甘石四百三十七煅紅童便或燒酒淬七次研粉水飛甘溫無毒陽明經藥也明目去翳退赤收濕除爛止血消腫生肌同冰片點目一切諸疾所在金銀坑中皆有之乃金銀之苗也輕白者良目猝赤痛火煅尿淬同風化硝極淨蘸新水點之驗方第一諸般目翳同膽礬白礬亦可朴硝末沸水化開洗之第二一切目疾用半斤同黃連四兩石器內同煮一日去黃連入冰片二錢研勻取點又方同盆硝泡洗之第三下疳火煅童尿淬制甘石一兩兒茶三錢炒末香油合敷立已再查甘草第一洗方驗方十八內第四目睛昏花制甘石制赭石水飛黃丹各四兩為末蜜半斤以銅器煉去白沫更添冷水數碗熬沸下諸藥熬至一碗滴水不散或生絹或夾紙濾入瓷器收之取點第五風眼爛眩制甘石地上出火毒研粉先以沸湯洗之取點數次又甘石一斤火煅黃連四兩煎水淬七次研粉入冰片取點第六漏瘡不合制甘石合蠣粉外塞之內服滋補第七牙疏陷物同石膏末搽之第八陰下濕癢同蛤粉摻之第九無名異四百三十八即土豆也甘平無毒止痛生肌消腫收濕治金瘡折傷療癰疽腫毒煮蟹殺腥氣煉桐油收水氣塗剪剪燈則燈自斷也生川廣山中臨杖預服為末臨時服三五錢則杖不甚痛驗方第一打傷腫痛為末酒下第二石鐘乳四百三十九輕薄如鵝翎管碎之如指甲光明者真也生太山山谷甘溫無毒陽明藥也強陰益陽明目益精通百節而利九竅補虛損而下乳汁石灰四百四十風化者良陳久者佳辛溫無毒散瘀止痛止血生肌蝕惡肉而滅瘢疵止瀉痢而收崩帶消積聚而除結核收陰挺而殺瘡蟲療金瘡而墜胎孕住血痢而止水泄白帶白淫風化石灰一兩茯苓三兩丸服驗方第一水瀉不止同上第二酒積下痢為末水合泥封固煅醋丸豆大姜水下第三十年血痢石灰燒黃以水投之澄清以後頻熏之第四脫肛石灰燒熱布包坐之冷再易第五產門不閉石灰熬黃以水投之澄清頻熏之第六腹脅積塊風化者半斤瓦上炒熱入大黃末一兩炒紅取起再炒取桂末半兩略炒入米醋合成膏攤貼內服消塊藥第七產門生合不開銅錢磨利割開陳石灰敷之妙也第八瘧疾寒熱或一日一發或二三日陳石灰二錢頭垢靈脂各一錢飯丸豆大每五更無根水下第九猝暴吐血陳石灰於刀頭上燒研井水下二錢第十發落不生石灰水拌焙焦入酒漬之常服令酒氣相接十一染髮烏須礦灰一兩化開七日用官粉一兩研勻好醋調搽油紙包一夜先以皂角水洗淨十二身面疣目醋漬石灰六七日取汁常點之久自落矣十三痄腮腫痛醋合敷之十四年久惡瘡陳石灰為末雞子清合塊煅過為末薑汁合敷之立效十五瘻瘡不合古塚中石灰封之十六疥瘡有蟲石灰淋汁以洗之十七丹毒火熱醋合敷之十八杖瘡腫痛新石灰香油合敷十九刀刃金瘡石灰裹之定痛止血如不欲速合入少滑石末二十海浮石四百四十一咸寒無毒止渴治淋明目除嗽清金降火破積化痰消癭瘤結核療瘡腫疝氣乃江海中細沙水沫凝聚日久而結成也狀如石而輕浮入水不沉陽起石四百四十二火煅酒淬水飛螵蛸為使惡澤瀉箘桂雷丸蛇皮畏菟絲子並忌羊血一切咸平無毒補命門而治陰痿暖子宮而添精乏除腰膝冷痹消水腫癥瘕生齊州山谷以雲頭雨腳輕鬆如狼牙者為佳磁石四百四十三火煅醋淬水飛柴胡為使殺鐵毒惡丹皮莽草即吸鐵石辛咸無毒補腎益精除煩祛熱明目聰耳治羸弱周痹療骨節痠痛消癰腫而治鼠瘻止驚癇而卻針鐵生太山及慈山山陰有鐵處以能吸鐵者為真小兒驚癇末服之代赭石四百四十四火煅醋淬水飛乾薑為使畏天雄附子苦寒無毒入心肝包絡經闢鬼魅而殺精物鎮鬼疰而除蠱毒止崩帶而陽痿住瀉痢而息腸風平血熱之歸肝解驚氣之入腹治精尿之遺泄止經脈之頻數生金瘡之肌肉療小兒之癇疳卻吐衄之血逆瀉慢脾之驚風左脈有力者宜之處處山中有之以西北出者為良旋赭湯旋覆花代赭石半夏臺參炙草姜棗治噫氣不除與噎食等症諸方第一瀉後慢驚制末每冬瓜仁湯下五分驗方第一傷寒無汗同乾薑為末熱醋合敷兩手心合掌握定夾於大腿內側溫覆汗出愈第二急慢驚風制末每五分真金湯調下腳上起赤斑為欲愈無斑不治第三小腸疝氣為末湯下第四腸風下血同上第五衄血吐血血崩同上第六禹餘糧四百四十五煎湯生用丸散火煅醋淬丹皮為使甘微寒無毒入足太陰脾少陰腎厥陰肝手陽明大腸固大腸而住崩中止咳逆而破癥瘕除煩滿而療痔瘡通血閉而息痛煩解肢節之痹木治筋骨之疼痛除小腹之痛結出東海池澤其石舐之澀舌冷勞腸滑制四兩烏頭一兩醋丸豆大每五丸水下驗方第一赤白帶同乾薑末下第二崩漏青黃赤白同赤脂蠣粉烏賊骨桂心為末每酒下一錢忌蒜蔥第三婦人小腹結痛為末湯下第四大風癘疾眉毛脫落遍身頑痹用二斤白礬一斤青鹽一斤為末罐子固濟炭火十斤煅之從辰至戌候冷研粉埋土中三日每一兩入酒蒸曬胡麻三兩荊芥湯下日二服第五咳則遺矢大腸咳也同赤脂煎服第六空青四百四十六甘酸寒無毒益肝明目利水通竅生益州山谷有銅處銅精熏則生空青其腹中空而有漿者良能化銅鐵鉛錫作金今信饒諸州多有之狀如楊梅砒石四百四十七醋煮用畏綠豆涼水錫之苗也辛苦而咸大熱大毒截瘧除哮爛肉蝕瘀腐瘰癧而消癖積吐風痰而枯痔瘡最殺蟲蟻尤落胎孕出信州玉山有砒井官封甚嚴井中有濁綠水先綆水盡然後下鑿取生砒色黃赤如牛肉今市所貨者惟取山中夾沙石者燒煉而成也或取信石升打取霜用後經火煉毒更滋甚何苦用生者為愈乎礞石四百四十八坩鍋內與火硝同煅硝盡為度甘咸平無毒治積痰驚癇除咳嗽喘息江北諸山往往有之以盱山出者為佳有青白二種以青者為勝堅細而青黑打開中有白點者為勝小兒驚癇磨水服驗方第一急慢驚風痰壅為末姜水下第二金寶神丹制礞石半斤赤脂二兩水丸豆大候乾入坩鍋內煅紅收之每溫水下一二丸治一切積病滑泄久痢婦人崩帶諸方第一滾痰丸制礞石一兩川軍六兩黃芩六兩真沉香五錢丸豆大每二十丸治一切大症痼疾脈滑實者第二花蕊石四百四十九火煅水飛酸澀無毒一切金瘡之良劑諸般失血之靈丹能除目翳尤止血暈出陝華諸郡色黃如硫黃而堅重石蟹四百五十身是蟹而質石也細研水飛咸寒無毒治諸般目疾解一切藥毒療癰腫而退熱催生胎而落胞近海州郡皆有之云是尋常蟹耳年月深久水沫相著化成石食鹽四百五十一水化澄出腳渣煎煉白色漏蘆為使甘咸寒無毒解毒涼血潤燥定痛明目除風止痛除癢解一切蟲傷瘡腫火灼吐諸般風熱痰飲痰癖最通二便尤堅肌骨潰癰作癢摩其四圍驗方第一一切毒物傷或洗或塗第二手足心腫毒同椒末醋合敷之第三痛癢初起頻嚼敷之第四身如蟲行煎湯洗之第五酒皶赤鼻常搽之第六目中浮翳點之良第七淚出或癢點之第八耳猝痛炒熱枕之冷再易第九風病耳鳴同上第十大笑不休煅赤河水煎服取吐良十一下痢肛痛炒熨之十二婦人陰痛布包熨之十三兩脅脹滿同上十四胸中有痰煎湯吐之十五一切腳氣蒸熱分包近壁以腳踏之令腳心熱冷再易合槐白皮同蒸良十六霍亂腹痛炒熨之十七一切腹痛同上痛在中是也十八青鹽出西戎形塊方稜如石明瑩而青戎鹽咸寒無毒堅骨固齒明目烏須助水臟而平血熱消症積而除疥癬止吐尿舌齒諸血除心腹目瘡諸痛余治同食鹽寒水石四百五十二薑汁煮研粉用甘寒無毒涼血降火堅牙明目退熱消積除煩解渴生於鹵地積鹽之下精液滲於土中年久至泉結而成石清瑩如水晶玄精石四百五十三咸寒無毒治上盛下虛救陽助陰有扶危拯逆之功鹹鹵精液流滲入土年久結成石片狀如龜背之形大者如杏葉小者如魚鱗芒硝四百五十四乃皮硝煉成者石葦為使惡三稜煎煉成稜者曰馬牙硝辛苦咸寒無毒入手少陰心足太陽膀胱經利二便而破五淋退壅熱而除留血化積聚而墜痰結通經脈而下胎孕平瘰癧而明目息黃疸而消腫硝有三品生川蜀曰川硝最勝生河東曰鹽硝次之生河北青齊者曰土硝皆生於斥鹵之地彼人刮掃煎汁經宿結成猶有沙土猥雜故名朴硝一經煎煉澄去渣腳則成芒硝腹中痞塊同大黃獨頭蒜搗餅貼之以消為度驗方第一口舌瘡紅含之良第二丹毒如火水合敷之第三碧雪芒硝皮硝石膏寒水石水飛各一斤甘草一斤煎汁去渣入諸藥同煎攪之令化再入青黛一斤和勻經宿結成或含咽或吹之或煎服治一切積熱狂憒秘結喉腫口瘡等症諸方第一玄明粉淨白芒硝與萊菔同煉再入甘草末和勻則成粉矣退心熱而明目消腫毒而退煩最破症積善消宿滯火硝四百五十五火為使惡苦參苦菜畏女菀杏仁竹葉苦寒無毒消積散堅除脹破血退熱止煩利尿解渴喉閉目赤頭痛牙痛平瘰癧而療疽除霍亂而通淋生硝石諸鹵地皆產之而河北慶陽及蜀中尤多秋冬間遍地生白掃取煎煉而成頭痛如死為末吹鼻驗方第一心腹諸痛同雄黃細末點目止痛第二腰腹諸痛同上第三赤目腫痛為末點之第四甘露丸火硝硫黃各一兩白礬滑石各半兩飛面四兩水丸豆大每新汲水下五十丸治伏暑泄瀉腸風下血酒毒下血諸方第一硇砂四百五十六水飛淨醋煮乾刮下用畏一切酸咸苦辛溫有毒消宿食而破瘀暖子宮而助陽治膈噎癥瘕去目翳胬肉出西戎形如牙硝光淨者良亦硝石之類乃滷液所結虜人採取淋煉而成硼砂四百五十七甘涼無毒消痰止嗽清咽利膈除熱生津退翳療瘡消積塊瘀肉療膈噎反胃口齒諸症咽喉一切生西南諸番有黃白二種西者白如明礬南者黃如桃膠皆是煉結而成可焊金銀銅鐵諸物木舌腫大為末薑片蘸搽即消驗方第一咽腫痛同牙硝蜜合含咽第二血衄水服一錢第三飲酒不醉先服二錢第四飲食毒物用四兩甘草四兩香油一斤瓶內浸之遇毒者服一盅久浸尤良第五一切惡瘡同上第六胬肉瘀突同冰片少許燈草點之第七硫黃四百五十八萊菔剜孔納入糠火煨用或酒煮用曾青為使畏細辛朴硝酸熱有毒暖精壯陽殺蟲療瘡止血平疥除嗽闢魅敷婦人之陰蝕除小兒之慢風補命門之不足回陽氣之暴絕止虛寒之滑痢止虛損之泄精治腰腎之寒冷健腳膝之痛弱堅精骨而消積聚散風冷而除頑痹化五金而下氣逆息二毒而止霍亂陽毒陰毒出南海諸番女子陰瘡為末常敷之驗方第一玉門冷水煎常洗之第二一切惡瘡同蕎麥粉水合作餅曬乾收之臨用細研涼水合敷第三諸瘡胬肉以末敷之第四小兒口瘡水合敷足心第五癧瘍白片同白礬搽之第六酒皶赤鼻同白礬輕粉搽之第七鼻上作痛冷水調搽第八極冷厥躁腹冷無脈陰症傷寒也為末艾湯下汗出愈第九冷瀉白瀉同黃蠟丸服第十呃逆危篤同乳香共為末酒煎嗅之即止又以熱物熨小腹下妙十一頭痛難忍脈弦牢硫黃二兩石膏一兩半夏一兩硝一錢五分姜水丸每服二十丸十二硫黃湯硫黃荔核川芎吳茱萸大茴木香乳香橘核湯丸皆可治一切疝氣痛兼偏墜繞臍衝心乃小腸氣痛也衝心加半夏枳殼諸方第一白礬四百五十九煅枯者名枯礬甘草為使惡牡蠣又畏麻黃諸味酸寒無毒燥濕墜痰解毒生津除蝨殺蟲止血定痛通二便而蝕惡肉療諸瘡而止白痢除骨中之痼熱平鼻中之息肉息牙縫之血出治中風之失音治一切癰疽疔腫惡瘡療諸般瘰癧疥癬鼠瘻喉痹血衄之患癲癇毒物之傷礬石初生皆石燒碎煎煉乃成礬也有白黃綠黑絳五色今白礬出慈州晉州無為等州其諸色惟入染家方藥稀用漆瘡作癢煎湯拭之驗方第一牛皮癬石榴皮蘸白礬末搽之第二嵌甲成瘡燒灰敷之第三刀斧金瘡同黃丹末敷之第四瀉下痢枯礬稍入飛白麵醋丸豆大每三十丸白痢姜水下赤痢以甘草水下之妙第五爛弦風眼枯礬五錢銅綠二錢湯泡澄清洗之第六目生白膜白礬用銅器水煎入少蜜合之帛濾過取點第七目翳胬肉每納米大一枚入目日日用之第八牙關不開同鹽搽之則開第九白帶不已煉蜜丸礬石指肚大納入陰戶中當愈第十羽澤散風痰不省枯礬薑汁下十一風癇生礬細茶蜜丸服十二齁喘枯礬白湯下十三痢疾枯礬石膏末服十四水瀉枯礬五倍子面丸服十五耳聾痛或出水枯礬吹之十六口瘡生礬硼砂蜜合敷十七咽喉痛急為末吹之十八心腹痛為末醋下十九心痛生礬胡椒末湯下二十白濁枯礬滑石丸服二十一一切腫癰疔毒枯礬滑石硃砂丸服蔥湯煎汗之二十二腳椏爛生礬摻之二十三臍中出汗枯礬末敷之二十四產後陰痛枯礬五倍桃仁共搗敷之二十五牙疳枯礬五倍燒末敷二十六湯火傷枯礬香油合敷二十七白礬一兩茶葉五錢蜜丸豆大一歲一粒茶下久用痰自大便出諸方第一又方白礬三兩鬱金七兩每五十丸治失心癲症第二膽礬湧吐風痰平息喉痹治咳逆癲癇崩淋療牙蟲瘡毒陰蝕黑礬一名綠礬蜣螂蛀膽礬三錢血竭三錢蟾酥二錢硃砂二錢京墨一兩乳香一錢水合敷諸方第一皂礬丸皂礬不拘多少日曬夜露三七日為末棗肉為丸綠豆大每九丸日三小兒三丸治一切黃疸第二白石英四百六十甘辛微溫無毒潤肺去燥利尿實腸治肺痿吐膿療咳逆上氣生華陰山谷及太山今所在山谷皆有以澤州者為良大如指長二三寸六面如削白澈有光長五六寸者彌佳白英辰砂等分為末治驚而善忘者紫石英四百六十一甘溫無毒鎮心補肝祛血海之虛寒除心神之不安生太山山谷其色淡紫其質瑩澈隨其大小皆五稜兩頭如箭鏃紫石英水煎細服或煮粥服治虛勞而驚鴉膽子四百六十二先血後便十枚為末元肉包好吞之或咽之亦治先膿後糞驗方第一
