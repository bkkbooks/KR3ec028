body:
  text: 本草易讀卷八白花蛇三百七十一酒浸去頭尾皮骨取淨肉炙過收之甘咸溫有毒透骨搜風截驚定搐治風濕癱瘓大風疥癩解驚風急慢癮疹癧瘍口喎目斜節疼腳弱半身不遂之邪筋脈拘急之疴出蘄州龍頭虎口黑質白花大者可得淨血四兩再造丸安息香四兩人參二兩白花蛇四兩當歸川芎黃連羌活防風元參藿香白芷茯苓麻黃天麻萆薢薑黃炙草肉桂白蔻首烏琥珀炙耆酒軍草蔻兩頭尖熟地穿山甲全蠍各二兩威靈仙葛根桑寄生細辛赤芍烏藥青皮白朮殭蠶乳香沒藥辰砂香附天竺黃沉香丁香膽星各一兩紅花犀角各八錢地龍五錢焙松香五錢木香虎骨冰片牛黃各二錢血竭一錢蜜丸治風癱一切諸方第一烏梢蛇三百七十二制如白花蛇同尾細穿百錢者佳重七錢至一兩者為上大者力減甘平有小毒功同白蛇性善無毒蛇骨刺人痛甚莫治鯉魚三百七十三甘平無毒治咳逆上氣療腳氣黃疸治妊娠水腫解心上塊結最利小便善調氣水妊娠水腫大鯉魚一個入赤小豆同煮食魚服汁良有效也驗方第一水腫同上第二久痢欲死大鯉魚重一二斤者照常油鹽等留鱗加胡椒末三錢入水煮熟後置病者前嗅之如欲食即連湯食一斤病自愈第三青魚膽三百七十四收取陰乾苦寒無毒點目消赤腫障翳咽津吐喉痹痰涎塗火熱瘡療魚骨鯁鯉魚膽味甘喉痹將死點入即活石首魚三百七十五乾者名鯗魚甘平無毒開胃消食治暴痢腹脹鯽魚三百七十六甘溫無毒溫中下氣利水消腫止血住痢療瘡平疳猝患水腫用三條去腸留鱗以商陸赤小豆填扎定煮爛去魚食豆服汁二日一作驗方第一腸風下血用一枚去腸留鱗入五倍子末泥固火煅為末每酒服一錢或丸服第二酒積下血酒煎鯽魚常食之第三刮骨取牙用一個去腸入砒在內露於陰處待有霜刮下瓶收以針搜開牙根點少許咳嗽即落良有效也第四反胃去腸留鱗入礬石封固煅末服飲下第五乳岩隱痛活鯽魚取肉用白鮮山藥共搗如泥加元香敷之七日一換癢極無動第六鱔魚甘溫無毒除風邪濕痹止惡露淋瀝尾血療口目喎斜點耳聾鼻衄目翳鰻鱺甘溫有毒除風瘙濕痹療骨蒸勞瘵補虛損而殺蟲除陰戶之蝕癢烏賊骨三百七十七炙黃用咸微溫無毒足厥陰藥也祛寒除濕治血枯血瘕血崩血閉療瘧痢疳蟲目翳淚出止男婦陰中腫疼治小兒痘瘡潰爛蝦三百七十八甘溫無毒托痘瘡下乳汁吐風痰壯陽道敗龜板三百七十九醋或酒炙灰用捶碎以水浸之熬膏尤良甘平無毒補心養腎滋陰益智續筋健骨催生消瘡治勞熱骨蒸療陰虛血衰解腰腿痠痛助腹體重弱癥瘕麻痹之緩疾瀉痢咳嗽之陳疴痔漏悉療崩帶皆醫難產須用久瘧能斷龜尿走竅透骨染鬚髮治啞聾以鏡照之自尿或以豬鬃刺鼻久瘧燒末酒下驗方第一交骨不開炙搗同發灰當歸川芎水煎服生死俱下第二口吻生瘡燒灰敷之第三頭痛同上第四豬咬成瘡燒灰香油合敷第五發白欲黑以龜尿合極細水蛭末日日捻之發自黑矣第六小兒龜背以龜尿摩背頻作第七中風不語尿點舌下第八龜鹿二仙膠鹿角血者十斤龜板自敗者五斤以上二味另熬膏枸杞子甘州者三十兩人參十五兩用鉛壇如法熬膠初服酒化五分加至三錢空心下大補精髓益氣養神諸方第一鱉甲三百八十醋炙黃用酒煮令爛如膠漆用尤良惡礬石理石咸平無毒入厥陰肝攻一切症塊瘕癖消諸般惡肉敗血腰痛脅堅瘧母痔核腸癰瘡腫驚癇斑痘除勞瘦骨熱療難產經阻奔豚氣痛上衝腹醋炙三兩為末三稜煨二兩為末桃仁四兩湯浸研汁水熬良久入醋再熬如餳每空心下驗方第一瘧疾不止醋炙末酒下夜間一服至旦一服臨發一服無不斷者第二痃癖症積醋炙末牛乳合服朝朝服之第三漏下為末酒下第四猝然腰痛同上第五沙石淋痛同上第六一切瘡癰不斂燒灰摻之第七腸癰內痛燒末水服第八人咬指爛燒灰敷之第九魚鰾膠治經脈逆行鰾切炒新綿燒灰共為細末每米湯下二錢蟹三百八十一咸寒有小毒散血通經除熱解結續筋骨塗漆瘡崩中腹痛蟹殼燒末飲下一錢毛蟹尤良驗方第一熏壁蝨蟹殼燒煙第二蜂蠆螫蟹殼燒末蜜合敷第三生胎欲去蟹爪同桂心瞿麥牛膝為末每空心酒服一錢第四千金神造湯蟹爪一升甘草二尺東流水一斗以葦子火煎去渣入阿膠三兩煎沸頓服治子死腹中或雙胎一生一死令生者安死者下也諸方第一牡蠣三百八十二泥固煅粉用貝母為使得甘草遠志蛇床良惡麻黃辛夷吳茱萸咸澀微寒無毒入手足少陰澀腸軟堅化痰補水斂汗止嗽祛濕解渴收遺尿滑脫消癭癧結核降膽氣而消痞斂心神而息驚除虛勞之煩熱退溫瘧之寒熱崩痢濁帶之脫疝瘕症塊之結男婦瘰癧牡蠣三兩元參四兩丸豆大每酒下三十丸更以丸敷之又方不拘已破未破牡蠣一兩甘草四兩每末服一錢神效驗方第一甲疽潰痛每末服二錢紅花酒下仍外敷之第二金瘡不斂敷之神效第三癰腫未成水合敷之干再上第四水病囊腫牡蠣三兩炮姜一兩為末合水敷之干再上一方用蔥汁面合第五月水不止牡蠣數兩醋調艾葉末熬膏丸服第六盜汗塗之良第七瘧疾不止同杜仲蜜丸服湯下第八氣虛同上第九面色黧黑蜜丸服仍常服其肉第十金瘡出血敷之十一桂枝骨蠣湯桂枝湯原方加龍骨牡蠣治虛勞失精脈芤動者諸方第一柴胡骨蠣湯半夏人參桂枝姜棗茯苓黃丹龍骨蠣粉治胸滿驚狂便癃身重譫語者第二海蛤粉三百八十三海蛤粉者海中諸蛤之粉以別江湖之蛤粉蚌粉但能清熱利濕而已咸冷無毒治同牡蠣瓦壟子殼火煅醋淬為粉甘咸無毒消血塊化痰積醋丸服治一切氣血症瘕青蛤散蛤粉一兩青黛三錢石膏八錢輕粉五錢黃柏五錢為末香油合塊涼水調敷治一切黃水瘡又治鼻爛諸方第一田螺三百八十四甘大寒無毒瀉熱利濕止渴醒酒治腳氣黃疸噤口毒痢解目熱赤痛痔瘻狐臭石決明三百八十五麵裹煨熟磨去粗皮研粉水飛用出嶺南而菜州沿海尤多俗名之金蛤蜊咸寒無毒降肺肝風熱退青盲內障解骨蒸勞熱通五般淋瀝點外障良效解酸酒甚驗羞明怕日同黃菊花甘草水煎泠服驗方第一解酸酒煅細末將酒燙熱攪入第二真珠三百八十六取未經鑽綴者乳浸三日研極細用不細則能傷人臟腑矣咸甘寒無毒鎮心安魂墜痰拔毒收口生肌明目去翳治驚熱疔瘡下死胎胞衣止遺精白濁解煩熱消渴澤顏色而除面䵟淨皮膚而塞耳聾烏骨雞三百八十七烏骨雞有白毛黑毛斑毛之不同但視其舌黑者則骨肉俱烏也甘平無毒益肝養腎退熱補虛治虛勞消渴止下痢噤口崩漏帶下之疾鬼擊惡中之疴骨肉俱黑者良舌黑則俱黑也男用雌女用雄得水木之精氣虛熱者宜之赤白帶下制淨剖腹去腸白果蓮肉各五錢胡椒一錢入腹煮熟空心食之驗方第一遺精白濁同上第二白雄雞肉調中除邪下氣療狂安五臟而止消渴利小便而去丹毒得庚金之氣辟邪惡宜之紅雄雞肉補虛溫中止血補肺息崩除帶通神殺惡愈久傷之瘡闢不祥之氣得離火之氣辟惡者宜之黑雄雞肉養中補虛安胎止痛除風濕麻痹解心腹惡氣療癰瘡折傷塗竹木刺肉得坎水之氣胎產者宜之補益虛弱用五味煮極爛食驗方第一貓眼瘡多食雞魚蔥韭自愈第二老人中風用蔥白入五味作羹食之第三癲邪狂妄自賢自聖奔走不休白雄雞一隻以五味作羹食之第四赤白痢下同上第五黑雌雞肉寧心定志除邪辟惡祛風治痹安胎去濕補血破血排膿平癰治產後虛羸息反胃腹痛黑雌有陰象血分家宜之中風舌強目睛直煩熱淨酒煮去渣分服食蔥姜微取汗驗方第一黃雌雞肉補中益氣添髓助精止腸澼泄痢養臟腑絕傷止泄精而壯陽縮小便而解渴理著床之冷疾調產後之虛羸黃雌有土形脾胃家宜之天行黃病用金色黃腳者治如食法勿入鹽煮熟食之飲汁盡不過再作也驗方第一水癖水腫如上法和赤小豆煮食之第二下痢噤口如食法作羹食之第三人痿黃瘦淨肉七兩白麵五兩俱切作餛飩下五味煮食空心食之日一服第四老人噎食同上第五脾虛滑痢制淨炙之以鹽醋塗之須煮熟食之也第六消渴尿數制淨煮汁冷飲並作羹食肉第七項暴腫塞不拘何色雞數枚破腹罯之數易第八黃疸困篤同上罯胸上第九雞冠血咸平無毒三年老雄者良舌脹出口中蜈蚣毒也取血浸舌並咽之驗方第一諸蟲入耳滴入即出第二發疹痘和酒服之第三蜈蚣咬傷塗之第四蜘蛛咬同上第五小兒作驚似有痛處以少許滴入口中妙第六鬼擊猝死滴入口中令咽仍破此雞扎心下冷乃去之第七小兒解顱以血滴之再以赤芍末粉之第八雞內金即膍胵內黃皮也甘平無毒止泄痢遺精住崩帶腸風縮小便而除尿痛退煩熱而息淋痛一切口瘡牙疳諸般喉閉乳蛾能消酒積尤止反胃瘡口不合貼之驗方第一腳脛生瘡同上一日一易第二陰頭疳蝕瓦焙末一斤疳洗淨搽之第三口疳同上第四穀道生瘡同上第五走馬牙疳同枯礬研搽第六一切口瘡燒灰敷之立效第七喉閉乳蛾燒末吹之破愈第八小兒瘧疾燒末乳服男用雌女用雄第九噤口痢疾燒末乳汁下第十鵝口白瘡同上十一反胃吐食燒末酒下男雌女雄十二小便淋痛焙末白湯下三錢十三消導酒積乾葛丸服酒下三十丸十四雞屎白雄雞屎有白臘月收之白雞烏骨者更良微寒無毒消鼓脹而破癥瘕利二便而止遺尿解石淋而止轉筋息諸風而滅瘢痕療諸風痹癇治諸物咬毒消滅瘢痕以豬脂飼烏公雞三日取白屎同白芷當歸煎十沸去渣入鷹屎白調敷之驗方第一耳中惡瘡燒研敷之第二內癰未成燒研水下第三小兒驚啼焙末飲下第四腹脹尿澀脈實沉炒末酒下第五雞卵三百八十八甘平無毒婦人白帶用酒及艾葉煮雞子日日食之有效也驗方第一傷寒發狂煩熱生服一枚第二年深哮喘將卵略敲損浸尿缸中三日煮食之能去風痰第三身體發熱大人小兒三枚入蜜攪勻和服之立效第四胎前下痢絞痛無他急症者雞子一枚去白留黃每入黃丹一錢攪勻紙包煨乾為末飲下三錢一服愈為男二服愈為女第五小腸疝氣取黃溫水合服三作效第六小兒驚癇取黃乳汁攪勻合服一黃五作自定第七小兒頭瘡煮熟取黃炒令其中油出香油輕粉搽之第八子死腹中取黃一枚薑汁合服當下不煎第九面黑令白雞子白三個酒浸密封二十八日用之每夜塗面則白如雪矣第十五種遁屍腹脹氣急衝心或磥磈踴起或牽腰脊以卵白七個醋煎頓服甚良十一玉莖下疳抱過雞子殼炒研香油合敷十二五屍病雞子一個豬脂一塊醋一合煎服十三鴨肉三百八十九甘冷微毒滋陰補虛除蒸止渴利水道治熱痢白鳳膏黑嘴白鴨一隻取血入溫酒隨量飲之將鴨去毛脅下開孔入棗肉二升參苓平胃散一升置沙坩內以炭火慢煨將陳酒一瓶作三次入之酒干為度取起食鴨及棗數作取愈治久虛發熱嗽痰咳血諸方第一鴨卵甘咸微寒治陰虛勞嗽除心腹膈熱夜明沙三百九十淘盡焙用即蝙蝠屎也惡白蘞白薇天鼠糞辛寒無毒入厥陰肝經活血消積治目盲障翳療瘧魃驚疳止血氣腹痛平瘰癧癰疽內外障目焙末入豬肝內煮食服汁驗方第一小兒雀目炒末豬膽汁丸綠豆大每五丸以米湯飲下第二五瘧不止為末每冷水下一錢效第三胎前瘧疾同上酒下第四五靈脂三百九十一去淨沙石為末酒飛曬乾用最惡人參甘溫無毒足厥陰藥也除一切血病崩痢漏帶積痹閉結諸血止諸般痛疾心腹脅肋身體疝齒諸痛除風化痰殺蟲消積息驚風