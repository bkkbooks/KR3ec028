body:
  text: 本草易讀卷五甘遂百三十二舊麵包煨用瓜蒂為使惡遠志反甘草苦寒有毒入足太陽經除大腹之腫滿消面目之浮腫解陰囊之腫墜敷腳氣之腫核留飲宿食之滯癥瘕積聚之堅痰迷癲癇之疾隔噎痞塞之疴虛人忌之生中山二八月採根今陝西江東亦有之苗似澤漆莖短小而葉有汁根皮赤肉白作連珠亦有色白者水腫腹滿同黑醜為末水煎時呷驗方第一身面洪腫為末入豬腎內煨食日三第二四肢腫痛腿膝攣急上方加木香第三水腫喘急二便祕同大戟芫花為末棗肉丸服第四二便不通為末面合敷臍及丹田再艾灸三壯內服甘草湯以通為度第五偏墜同茴香末酒下第六麻木疼痛甘遂二兩萆麻子四兩樟腦一兩杵貼之內服甘草水第七耳猝聾甘遂半兩綿包納入耳內口嚼甘草第八甘遂半夏湯甘遂半夏白芍甘草蜜水煎治心下堅滿有水脈伏沉自利反快者諸方第一遂心丹甘遂末二錢以豬心血和之入豬心內煨熟取末入辰砂一錢分作四丸每一丸豬心湯下大便惡物為效不下再用第二續隨子百三十三紙包去油取霜用千金子辛溫有毒行水氣而破血結消癥結而除腫滿化痰飲而祛冷氣利二便而下惡物瘡癬疥瘤之疾蠱蟲鬼疰之疴生蜀郡今南中多有苗如大戟初生一莖莖端生葉葉中復出葉花亦類大戟自葉中抽乾而生實青有殼人家園田中多種植莖中亦有白汁可結水銀萆麻子百三十四外殼無刺內實紅色者良辛甘有毒通諸關開諸竅貼偏風喎斜療水氣浮腫搗爛塞鼻窒耳聾燒煙燻喉痹舌脹下胞衣而收子腸敷瘰癧而平惡瘡拔針刺之入肉下骨木之哽咽追膿拔毒最靈齁喘咳嗽悉效在處有之其莖有赤有白中空葉如瓠葉每葉凡五尖夏秋丫間出花穗纍纍黃紫每枝結實數十殼如巴豆殼內有子大如豆有斑點狀如牛蜱其外殼有刺者內實不紅外殼無刺者內實發紅手臂一塊腫痛搗敷之一夜愈驗方第一偏頭氣痛同乳香食鹽搗敷太陽穴第二子腸不收搗敷丹田一夜而上第三手足偏枯取油同羊脂麝香穿山甲煎膏日摩數次月餘瘥內服搜風化痰養血劑第四口目斜杵膏左貼右右貼左第五風氣頭痛同乳香杵餅敷太陽穴第六鼻窒不聞香臭三百粒大棗一個杵膏塞之日易一月愈第七舌上血出取油捻紙燒煙燻鼻第八舌脹滿口同上熏口第九喉痹口噤同上第十小便不通取油捻紙插入莖中即愈十一催生下胞以七粒杵敷足心下即速去十二子宮脫出搗敷頭頂十三下生胎一月一粒酒吞下十四一切腫毒痛甚搗敷之十五耳猝聾百粒大棗十五乳汁丸綿包塞之日易耳熱為度二十日瘥十六面上雀斑同密陀僧硫黃為末羊髓合勻每夜敷之十七發黃不黑淨仁香油煎焦去渣三日後頻刷之十八湯火傷同蛤粉杵膏湯傷油調火傷水調敷之十九針刺入肉淨仁一粒杵膏以帛襯傷處敷之二十癘風鼻塌手指攣曲節間痛甚淨仁一兩黃連一兩以小瓶入水同浸三日後取淨仁一粒劈開面東以浸藥水吞之漸加至四五粒微利不妨瓶中水盡更添之兩月後吃大蒜豬肉如不發是效也若再發再服之直候不發乃止二十一齁喘痰嗽經霜萆麻葉霜桑葉米殼蜜丸豆大每五丸白湯下二十二腳氣風腫木痹萆麻葉蒸搗裹之日三易二十三鼻血以香油塗萆麻葉炙熱尉囟上二十四鐵針入肉萆麻肉石灰紅秫穀米飯搗膏貼之即出二十五項側結核如卵同山藥膏敷之二十六常山百三十五酒浸蒸熟用忌蔥菜辛苦微寒有毒專截諸瘧最吐老痰生益州川穀及漢中二八月採根今汴西湖南淮浙亦有之而海州出者葉似楸葉八月有花紅白色又莖圓有節高者三四尺葉似茗而狹長兩兩相當二月生白花青萼五月結實青圓蜀漆常山苗也八九月採之辛苦微溫有毒治與常山略同生用大劑則吐熟用小劑則否得大黃則瀉溫瘧熱多常山小麥竹葉水煎五更服驗方第一牝瘧寒多蜀漆雲母龍骨為末發日平旦一服發前一服第二腎瘧四肢冷腰脊痛大便難悽悽而寒常山香豉竹葉烏梅蔥白水煎發前分服第三肺瘧胸多痰心寒寒甚乃熱熱間時驚常山三錢甘草五分秫米三十五粒水煎發前分服第四肝瘧少腹滿喘息如死或小便如膿寒多熱少常山一兩醋浸一宿瓦器焙乾每二錢水煎五更服第五妊娠瘧疾常山石膏烏梅甘草酒浸一宿平旦溫服第六積年久瘧常山黃連每一兩酒浸一宿發日早服發前再服熱當吐冷當利第七截諸瘧湯常山三兩水漬一宿發前服輒吐第八截諸瘧酒常山一兩酒漬三日平旦一服發時一服第九間日瘧常山大黃炙草水煎五更服發時又服第十久瘧不止常山檳榔丁香烏梅酒浸一宿五更服之十一胸中痰飲常山甘草每一兩蜜水煎輒吐不吐再服十二截瘧常山丸常山二兩雞子百合丸豆大煮熟曬乾收之每二十丸竹葉湯下五更一服天明一服發時一服或吐或否諸方第一截瘧黃丹丸常山二兩黃丹半兩烏梅一兩糯米湯丸豆大每三十丸涼酒下隔夜一服平旦一服午後方食第二不二飲常山二錢檳榔要一雄一雌大者貝母二錢知母二錢酒一盅十分酒煎至剩八分不可過熬過則不效露一宿臨發日五更溫服勿令婦人煎藥治一切新久瘧疾一劑截住神效第三藜蘆百三十六去頭糯米泔浸之曬乾即山蔥也辛苦微寒有毒吐風癇痰涎疔疥癬惡瘡生泰山之谷二八月採今所在山谷皆有苗葉似車前莖似蔥白有黑皮裹莖似棕皮有花肉紅色此有二種一種水藜蘆莖葉大同只是生在近水根鬚百餘莖不中藥用今用者蔥白藜蘆根鬚甚少中風不省牙急每末服五分以吐痰為度不吐再服驗方第一諸風有痰同上第二久瘧痰多同上第三頭上生蝨為末摻之第四反花惡瘡為末豬脂合敷第五誤吞水蛭為末水下取吐第六附子百三十七生用去皮臍入藥熟用水泡全拆去皮臍乘熱切片炒之地膽為使惡蜈蚣畏防風黑豆甘草人參黃耆緑豆生用發散熟用峻補切片色光黑而潤軟今時一種附子片色暗黑而乾焦全失附子氣味用者慎之辛甘大溫無毒入足太陰脾少陰腎通行十二經暖腎燥脾除濕逐冷退手足之厥逆舒踝膝之拘攣回將絶之元陽降逆上之濁陰破癥瘕積聚兼治寒疝療癲癇麻痹並息慢驚嘔噦膈噎之疾沉寒痼冷之疴瀉痢清穀之厄霍亂轉筋之症通筋脈而墜胎孕斂瘡口而塞耳聾烏頭制同附子初種為烏頭象烏之頭也附烏頭而生者為附子如子附母也烏頭如芋魁附子如芋子蓋一物也別有草烏白附故以黑附川烏別之辛甘大溫有毒除諸風風痹風邪半身不遂之風祛諸寒寒濕寒冷堅痞老積之寒功同附子助陽之力稍緩祛風之力則盛烏頭尖吐風痰治癲癇取其鋒鋭無他意也生犍為山谷及廣漢冬採為附子春採為烏頭今綿州乃廣漢故地綿州所屬彰明所産尤多蓋十一月播種春月生苗莖類野艾而澤葉類地麻而厚其花紫瓣黃蕤長苞而圓其初種之小者為烏頭附烏頭旁生者為附子又左右附而偶生者為烏喙附而長生者為天雄附而上出者為側子春末生子故曰春採為烏頭冬月生子已成故冬採為附子蓋附子乃烏頭所生之子也腰腳冷痹痛生川烏為末醋合敷之驗方第一腳氣腫痛久者生附子為末薑汁合塗第二年久頭痛川烏南星末蔥汁合敷太陽穴第三頭風斧劈川烏末燒煙燻碗中茶泡服之第四耳鳴不已生烏頭燒末菖蒲等分綿包塞之日易之第五耳猝聾醋炙附子削尖插入耳中第六手足凍裂附子為末合面敷之第七附子湯附子茯苓白朮人參白芍治身體骨節俱痛手足寒脈沉微諸方第一桂枝加附子湯桂枝白芍炙草薑棗附子治因發汗成漏小便難四肢急屈伸不便惡風第二附子瀉心湯附子大黃黃連黃芩附子煎三黃用水漬之治心下痞惡寒汗出者第三桂枝附子湯桂枝附子甘草生薑大棗治骨節痛小水不利不渴者第四仙桃丸生烏頭五靈脂威靈仙酒丸豆大每酒下七丸忌茶治手足麻痹疼痛或癱瘓疼痛或腰膝痹痛第五薑附湯附子乾薑治中寒困昏臍腹冷痛霍亂轉筋第六烏頭煎烏頭煎去渣納蜜再煎治繞臍寒疝痛手足冷自汗脈緊第七再造散烏頭當歸臺參桂枝川斷烏蛇甘草茅朮川芎羌活松節牛膝防風治癱瘓第八小活絡丹舒筋最宜天麻白附子牛膝木鱉子羌活各五錢烏頭一錢地龍焙乳香沒藥各一錢硃砂一錢南星五錢酒丸豆大治兩腳無力小兒不能行成痿症者第九草烏頭百三十八黑豆同煮用莽草遠志為使反半夏瓜蔞貝母白蘞白芨惡藜蘆畏飴糖冷水黑豆辛苦大熱大毒搜諸風除諸濕開頑痰療頑瘡墜胎孕以汁熬膏名射罔敷箭射物見血立死出江左山南等處今處處有之其根苗花實並與川烏相似但此係野生又無釀造之法其根外黑內白皺而枯燥為異爾所附生亦有天雄烏喙遍身生瘡陰囊兩腳尤甚草烏一兩鹽水浸一宿炒末豬腰子一具煨熟竹刀切搗醋合丸緑豆大每三十丸驗方第一積年麻痹或歷節走風疼以草烏半斤為末以袋盛豆腐半袋入烏末在內再將豆腐填滿壓干入釜中煮一宿其藥即堅取出曬乾為末每五分薑蔥湯下第二白附子百三十九炮用辛甘大溫有小毒陽明經藥也除頭面遊風瘢痕皯𪒟悉療解陰下濕癢疥癬風瘡亦醫止心痛而散血痹療足弱而補肝虛中風失音之疾風痰眩暈之疴生蜀郡三月採又曰此物久絶後無真者時珍曰根如草烏之小者乾者皺紋有節又曰其根苗悉與附子同按今所用白附類川烏而內心色白未知此何物也而除風亦有效驗中風口斜同殭蠶全蟲酒下末驗方第一偏墜疝氣為末津合敷臍艾灸三五壯第二慢驚風同南星黑附子為末薑水下第三玉真散白附子十兩羌活防風南星白芷各一兩細末收貯治跌打損傷已破或傷口潰爛進風口目斜歪內服外敷諸方第一南星百四十去皮臍湯泡用或濕紙包糖火煨用蜀漆為使惡莽草畏附子乾薑生薑辛苦大溫有毒入肝脾腎三經治中風麻痹除風癇痰涎消癰腫而散血攻堅積而墜胎療金瘡折傷之瘀除口噤目斜之疾得防風不麻得牛膽不燥得火炮不毒牛膽合勻入膽中懸風處干之為膽星生漢中及冤句二八月採根今河北州郡亦有之初生根如豆大漸長似半夏而扁年久者根圓及寸大者如雞卵周匝生圓牙四月生苗高尺余獨莖上有葉如爪一窠生七八莖時出一莖作穗一切金瘡折傷同防風為散外敷內服驗方第一破傷中風同上第二諸風口噤同生薑蘇葉入膽少許煎服第三口噤不開一枚煨之用紙斜包剪小孔透氣入口關自開也第四小兒驚風佐辰砂末荊芥下第五風癇痰迷薑汁為丸參湯下第六小兒癇後不言為末豬膽合服第七口目斜為末薑汁合貼之左貼右右貼左第八婦人風氣攻目作痛醋炙南星為末酒下第九風痰頭痛同荊芥葉薑汁丸服第十頭暈目眩吐逆同半夏天麻倍白麵水丸豆大每三十丸將丸煮熟用十一中風中氣初起稍佐木香薑水煎服十二右臂疼痛痰濕同生薑蒼朮丸服十三氣痰咳嗽同半夏陳皮薑水丸之脈寸盛者宜之十四解頤脫臼為末薑汁合敷兩頰一夜而上十五小兒解顱為末淡醋敷帛上貼囟門炙手尉之立效十六小兒口瘡白屑如鵝口為末醋合敷足心男左女右十七走馬疳蝕透骨穿腮生南星當心剜空入雄黃一塊麵包燒之候雄黃作汁以盞子合定出火毒為末入麝香少許掃瘡數日愈十八黃精百四十一蒸過曬乾用甘平無毒補中氣而安五臟益脾胃而潤心肺填精髓而助筋骨除風濕而下三蟲南北皆有以茅山嵩山者良苗高一二尺葉如竹而短兩兩相對莖梗柔脆頗似桃枝本黃末赤四月開青白花狀如小豆花結子白如黍粒亦有無子者根如嫩生薑而黃二八月採根亦可劈根稀種之一年後極稠子亦可種以所來多偽近世稀用矣半夏百四十二湯泡數日薑汁製用射干為使惡皂角畏雄黃生薑乾薑秦皮龜甲反烏頭忌羊血海藻飴糖陳久者良辛溫有毒入足陽明胃手陽明太陰少陰諸經降胃止嘔驅痰除濕解傷寒之寒熱消心胸之結滿咳逆頭眩之疾癰腫咽痛之疴胎前勿用在處有之以齊州者為良二月生苗一莖莖端三葉淺緑色頗似竹葉生江南者似芍藥葉根下相重上大下小皮黃肉白八月採根小兒吐瀉同生薑陳粟米煎服驗方第一小兒腹脹酒丸粟大每十丸薑水下或薑汁合末敷臍上第二霍亂腹脹同肉桂末服第三白濁夢遺與豬苓同炒去豬苓入蠣粉丸服第四八般頭風為末入百草霜少許作紙捻燒煙就鼻內嗅之口中含水有涎吐去再含第五喉痹腫塞生末嗅鼻涎出效第六木舌脹大醋煎含漱第七面上黑氣焙末米醋合敷忌片連敷三日皂角湯洗面如玉也第八子腸不收生末吹鼻第九小兒驚風不省同上第十猝死不寤同上十一五絶急死同上十二癰疽發背雞子清合末敷之十三吹奶腫痛煨末薑酒下立瘥又取末入鼻十四打撲瘢痕為末水調敷之一宿即沒十五遠行足趼同上十六飛蟲入耳生末香油合敷耳門外十七蠍蠆螫人水合末敷十八骨哽咽中同白芷末服取嘔十九心痛正在心下按之益痛半夏瓜蔞黃連乾薑白芍甘草偏左右者加柴胡無火者去黃連寸脈弱加參二十眉稜骨痛半夏羌活酒芩白芷二十一子懸逆上捧心半夏枳殼瓜蔞香附揀砂白芍蘇梗陳皮生薑去半夏加丹參青皮尤良二十二半夏瀉心湯半夏人參甘草乾薑黃芩黃連大棗治心下痞滿不痛又治嘔而腸鳴心下痞諸方第一大半夏湯半夏人參蜜取流水揚之二百四十遍治反胃第二薑半湯半夏生薑末服治乾嘔吐涎第三小半夏湯半夏生薑治嘔而不渴第四越婢加半夏湯麻黃石膏甘草生薑大棗半夏治肺脹喘咳上氣目如脫脈浮大第五半夏湯散半夏甘草桂枝湯散俱可治少陰咽痛第六半夏麻黃丸半夏麻黃蜜治心下悸者第七射干百四十三米泔浸烏扇味苦微寒有小毒治咳逆上氣療咽喉痹痛祛瘀血而通經破癥結而消痰塗癰腫而解瘧母降實火而利大腸在處有之人家種之今人所種多是紫花者呼為紫蝴蝶葉如烏嬰故又名烏扇葉中抽莖莖上分枝開花秋月結實作房中子黑色三月採根咽腫痛同豆根末吹之如神驗方第一咽閉塞腫痛同豬脂油合煎令焦去渣每服少許第二咽閉不通含之咽汁第三二便不通諸藥不效者水煎服第四水腫腹大動搖有水聲搗汁服第五射干麻黃湯射干麻黃紫菀冬花五味子細辛半夏薑棗治咳而上氣喉中有水雞聲諸方第一玉簪百四十四甘寒有小毒處處有之人家栽為花草二月生苗成叢柔莖如白菘葉大如掌圓而有尖葉上紋如車前葉六七月抽莖莖上有細葉中有花朵白色下小末大中吐黃蕊頗香不結子乳癰初起取根擂酒服以渣敷之驗方第一斷産同鳳仙子紫薇花辰砂等分蜜丸每經見後服之不可著牙第二解斑蝥毒以根擂水服之第三刮骨取牙用干根一錢白砒三分白硇七分硼砂二分靈仙三分烏頭半分為末以少許點痛處自落也第四鳳仙子花百四十五子炒用甲指桃花苦平有小毒透骨軟堅損齒通竅催生落胎攻積除噎根苗主治略同塗打撲腫痛齒牙欲去為末入砒少許點疼根取之驗方第一咽中骨哽欲死者研水以竹筒灌入其骨即軟勿著牙又以末吹之第二噎食不下酒浸三宿為末酒丸緑豆大每八丸酒下第三催生為末水下二錢勿近牙再以萆麻子敷足心第四小兒痞積鳳仙子水紅花子大黃芒硝為細末白鴿一個去毛腸剖腹勿犯水以布拭淨將藥末入內用綿扎定沙鍋煮乾將鴿焙黃早晨食之日西時疾軟三日便血而愈第五打撲腫痛取根葉搗敷第六骨哽咽中用根搗爛含咽後以水漱之第七誤吞銅鐵同上第八洗足令軟皮硝鳳仙子石榴皮各五錢茵陳四錢煎水洗不可用手洗婦女洗之易裹又方鳳仙花連根搗爛煎洗亦佳第九芫花百四十六醋炒用決明為使反甘草辛苦有毒入足太陽經泄水破氣逐飲滌痰療咳嗽而除上氣平癰瘡而消腹滿蕘花治同芫花生淮源川穀春採花秋採根今在處有之宿根舊枝莖紫根白似榆根苗葉似柳二月開紫花作穗又似藤花而細今絳州出者花黃謂之黃芫花或日黃色者即蕘花或曰生時色黃干則白耳贅瘤焦法甘草熬膏筆妝瘤之四圍上數次次用芫花大戟甘遂為末醋合另以筆妝其中勿近甘草次日縮小又以甘草膏妝小暈三次如前仍上此藥自然焦縮驗方第一便毒初起用根搗出水煎服以渣敷之得下則消第二瘰癧初起壯人用芫根擂水服大吐利則平第三一點痛甚背腿間根末合醋敷帛束之第四鬼胎癥瘕經不通以根炒末桃仁湯下下惡物為度第五酒疸尿黃同椒目燒末每水下半錢第六茵芋百四十七用莖葉辛苦微溫有毒治一切風濕拘攣痹痛療諸般風冷筋骨怯弱生泰山之谷三月採葉今雍華絳杭諸州亦有之苗高三四尺莖赤葉似石榴而短厚四月開細白花五月結實萆薢百四十八薏仁為使畏葵根大黃柴胡前胡甘苦無毒入足陽明厥陰經除腰脊之痛強散骨節之風濕療痔瘻之壞瘡起腰腳之癱瘓溺數莖疼之疾白濁陰痿之疴益精明目最良中風失音亦效時珍曰萆薢蔓生葉似菝葜而大其根長硬大者如商陸而堅今人皆以土茯苓為萆薢則誤矣腰腳痹軟佐杜仲末每酒下二錢忌牛肉驗方第一小便數酒丸豆大每酒下七十丸第二萆薢分清飲萆薢菖蒲益智烏藥等分水煎治白濁頻數諸方第一菝葜生山野中莖似蔓而堅強植生有刺其葉團大狀如馬蹄光澤似柿葉秋開黃花結紅子其根甚硬有硬須如刺主治同萆薢土茯苓百四十九忌茶葉甘淡無毒健脾理胃祛風除濕強筋骨而利關節舒拘攣而止泄瀉解膩粉銀硃之毒平惡瘡癰腫之邪生海畔山谷楚蜀亦有之蔓生莖細有點其葉不對狀類大竹葉而質厚滑如瑞香葉而長五六寸其根狀如菝葜而圓其大若雞鴨子連綴而生遠者離尺許近或數寸其肉軟可生啖有赤白二種入藥用白者良白蘞百五十代赭石為使反烏頭甘苦辛平無毒除熱散結止痛生肌解癰疽瘡腫療金瘡折傷治小兒驚癇平女子陰腫腸風痔漏之疾面瘡瘰癧之疴生衡山山谷二八月採根江淮荊襄懷孟商齊諸處皆有之二月生苗多在林中生蔓赤莖葉如小桑五月開花七月結實根如雞鴨卵而長三五枚同一窠皮黑肉白一種赤蘞花實功用皆同但表裡俱赤耳山豆根百五十一苦寒無毒瀉熱解毒消腫止痛治咽喉風癰療心腹脹痛諸瘡皆醫五痔並療解人馬之急黃平蛇犬之暴傷生劍南及宜州果州廣西忠州萬州諸處苗蔓如豆葉青經冬不凋八月採根赤白熱痢蜜丸服驗方第一喉風急痛牙閉同白藥子煎含咽第二五般急黃水下末第三威靈仙百五十二忌茶辛咸甘平無毒入太陽經通十二經絡祛風行氣宣通五臟除腰膝之冷痛卻臟腑之滯積破癥瘕而退痃癖解宿膿而去惡水黃疸浮腫之邪皮膚大腸之風生商州上洛山及華山今陝西河東河北汴東江湖皆有之初生作蔓狀如叉股七月生花六出淺紫或碧白色作穗似蒲苔子亦有似菊花頭者其根叢須數百條初時黃黑色干則深黑此別有數種根鬚一樣但色或黃或白皆不可用腰腳諸痛或末或丸酒下驗方第一腰腳膝沉重同上以利惡物為度第二破傷風半兩獨頭蒜一個香油一錢同搗爛酒下汗出愈第三手足麻痹痛或癱或打撲痛甚同烏頭靈脂醋丸服第四噎塞隔氣醋蜜煎服吐痰為度第五停痰喘咳而嘔同半夏末皂角水丸薑下第六大腸冷積蜜丸薑水下第七痔瘡腫痛水煎熏洗第八諸骨哽咽一兩砂仁一兩沙糖一兩水煎服第九熏疥神方威靈仙白芥子雄黃山梔為末捲紙燒熏之第十防己百五十三去皮酒洗用惡細辛畏萆薢女菀滷鹼伏消石治風宜木防己治水宜漢防己辛苦而寒無毒足太陰太陽經藥通行十二經解臟腑之水氣泄經絡之濕邪除腳氣之腫痛退下焦之濕熱手足攣急之疾關節腫痛之疴乃驅風逐水之要劑為除濕解熱之靈丹出漢中川穀及黔中二八月採根其莖如葛蔓延其根外白內黃如桔梗內有黑紋但漢中出者破之文作車輻解黃實而香莖梗甚嫩苗葉小類牽牛折其莖一頭吹之氣從中貫如木通他處者青白虛軟又有腥氣皮皺上有丁足子名木防己或以木防己不任用而張仲景孫思邈皆用之是木防己亦可甚棄也肺痿喘嗽漢防己末水煎細呷驗方第一肺痿咯血漢防己葶藶為末糯米湯下第二霍亂吐利防己白芷末新水下第三目睛猝痛酒浸為末酒下第四解雄黃毒水煎服第五小便淋澀木防己防風葵子水煎服第六木防己湯防己石膏人參桂枝治膈間支飲喘滿心下痞面赤黎黑脈沉緊者諸方第一防己茯苓湯防己黃耆桂枝茯苓甘草水煎服治皮水胕腫按之沒指第二防己黃耆湯防己黃耆白朮炙草薑棗治風水皮腫汗出脈浮又治風濕相搏關節沉痛微腫惡風第三木通百五十四古名通草古方所用即今之木通而俗間所謂通草即通脫木也鮮用矣甘淡無毒入心肝膀胱諸經利水通淋止渴退熱安心除煩通經下乳耳聾鼻塞之滯喉痹咽腫之疾通草治同生石城山谷及陽城正二月採干澤潞漢中江淮湖南亦有之藤生蔓大如指其莖幹大者徑三寸一枝五葉頗類石葦又似芍藥三葉相對夏秋紫花亦有白花者結實如木瓜食之甘美導赤散木通生地炙草竹葉治心熱尿赤諸方第一鉤藤百五十五甘苦微寒無毒手足厥陰藥也除心熱平肝風治大人頭旋目眩療小兒驚癇寒熱發斑疹而止內釣除客忤而息胎風出建平秦中興元等處三月採兩湖兩江山中皆有之狀如葡萄藤而有鉤紫色古方多用皮後者多用鉤取其力鋭耳小兒驚熱同滑石炙草末服驗方第一猝得癇疾同炙草煎服日五夜三第二斑疹不快同紫草末酒下第三金銀花百五十六忍冬俗名淨花葉名毛花辛甘微苦無毒退熱解毒養血止渴療風除濕補虛祛脹治熱毒血痢腸癖療腫毒癰疽疥癬在處有之附樹延蔓莖微紫色對節生葉葉似薜荔而青有澀毛三四月花開長寸許一蒂兩花二瓣一大一小俱色白經二三日則色黃新舊相參黃白相映故呼金銀花四月採花藤葉不拘時採一切腫毒初起發熱已潰未潰連莖葉煎服以渣敷之驗方第一疔瘡便毒同上第二喉痹乳蛾同上第三敷腫拔毒同大黃焙末酒水合敷四周莖葉亦可第四癰疽內托一切已成未成同黃耆當歸甘草末服以渣敷之葉亦可第五惡瘡不愈一兩雄黃五分瓦器煎之紙封七重穿一孔熏瘡大出黃水再用生肌藥取效第六輕粉毒癰同上第七瘡久成漏浸酒常服第八熱毒血痢濃煎服第九鬼打身青水煎服第十腳氣疼痛或煎或末常服十一忍冬膏淨花四兩磁石三錢香油一斤熬枯去渣入黃丹八兩熬至滴水成珠攤用治諸般腫痛金刀傷惡瘡諸方第一忍冬酒淨花五兩甘草一兩水煎成再入酒稍煎分服治癰疽發背一切惡瘡初起第二活命飲穿山甲一錢五分皂刺五分甘草一錢淨花三錢赤芍一錢乳香一錢沒藥一錢花粉二錢防風一錢貝母一錢五分白芷一錢五分陳皮二錢一切癰疽初起未成即消已成即潰第三又當歸五錢生耆五錢淨花五錢甘草三錢治同上第三尤宜於婦人第四菟絲子百五十七酒浸蒸曬數次杵粉用山藥為使辛甘無毒入足三陰經強陰益精祛風明目除腰膝之冷痛息便溺之淋瀝助筋脈而益氣力解燥渴而止白濁消渴不已任意煎飲以止為度驗方第一小便淋瀝同上第二益腎添精同熟地酒丸服第三白濁遺精同茯苓蓮肉丸服第四赤濁口乾煩熱同麥冬蜜丸第五腰膝疼同牛膝酒丸服第六肝傷目暗酒浸為末雞子白丸服第七身面猝腫洪大酒浸常服第八橫生酒下末第九穀道赤痛熬黑為末雞子白合敷第十痔如蟲咬同上十一五味子百五十八生用止嗽熟用入補蓯蓉為使惡葳蕤勝烏頭味酸微苦微咸無毒入手太陰肺經斂肺滋腎益氣生津補虛明目強陰澀精定喘嗽而止嘔瀉除煩渴而消水腫嗽初起脈數有火者勿用出齊山代郡遼東等處河東陝西越杭亦有之苗引赤蔓於高木葉尖圓似杏葉三四月開黃白花類蓮花七月成實叢生莖端今有二種有南北之分南産者色紅北産者色黑用滋補必用北産者良亦可取根種之當年就旺若二月種子次年乃旺赤遊風丹漸漸腫大為末服之驗方第一爛弦風眼同荊子煎湯洗第二女人陰冷五味子四兩為末口中玉泉合丸納陰中第三五更腎瀉五味子二兩吳茱萸半兩炒末每旦陳米湯下第四白濁脅脊穿痛醋丸服第五遺精為末蜜煎膏服第六陽事不起每酒下一錢用一斤忌豬魚蒜醋第七痰嗽且喘同白礬末每三錢以豬肺尖熟蘸食之第八久咳不止佐甘草五倍子風化硝末干含咽第九久咳肺脹同粟殼蜜丸彈子大每煎服一丸第十覆盆子百五十九酒蒸用甘酸微溫無毒益腎臟而固精補肝虛而明目起陰痿而縮小便潤肌膚而烏鬚髮處處有之四五月紅熟狀如覆盆味酸甘大如櫻桃軟紅可愛又曰色黑烏耳紅者乃𧂭田藨也不入藥男陽不起酒浸焙末酒下驗方第一令女人多孕同上第二使君子百六十甘溫無毒治小兒百病五疳悉療解小便白濁瀉痢亦醫最殺諸蟲兼益脾胃原出海南交趾今閩之邵武蜀之眉州少栽蒔之其藤如葛繞樹而上葉青如五加葉五月花開一簇一二十葩紅色輕盈如海棠其實長寸許五瓣合成有稜腹有蟲病每月上旬清晨空腹食使君子仁數枚或以殼煎湯送下或七生七煨驗方第一小兒痞塊腹大肌瘦同木鱉子丸三豆大雞子一個孔破入內蒸熟食之第二蟲牙痛煎漱之第三木鱉子百六十一去油用味苦微寒有小毒療瘡癰痔瘤瘰癧治疳積痞塊瀉痢生朗州及南中七八月採實今湖廣杭越全嶽諸州亦有之藤生葉有五丫狀如山藥青色面光四月生黃花六月結實如栝蔞而大生青熟紅黃色每一實有核三四十枚其狀扁而如鱉馬錢子百六十二番木鱉子苦寒無毒療咽喉痛痹消痞塊堅硬生回回國今西土邛州諸處亦有之蔓生夏開花七八月結實如栝蔞生青熟赤亦如木鱉而核小色白彼人言能治一百二十種病每症各有湯引或云以豆腐制過用之良病欲去胎杵膏納陰中驗方第一馬兜鈴百六十三去革膜取仁焙用肺虛寒者勿用苦寒無毒手太陰肺藥也清肺熱而降氣止痰咳而定喘血痔瘻瘡之疾水腫心痛之疴生平澤叢林中七八月採實關中河東河北江淮夔浙皆有之作蔓繞樹而生葉如山蕷葉而厚大背白六月黃紫花頗類枸杞七月結實如大棗似鈴作四五瓣水腫腹大喘急水煎服驗方第一喘急同炙草煎服第二一切心痛燈上燒末酒下立止第三痔瘻腫痛瓶中燒煙燻之第四牽牛子百六十四研取頭末用得青木香乾薑良或半生半炒黑醜白醜苦寒有小毒專消水腫最利二便解一切氣壅逐諸般痰飲消腫滿而攻癖落胎孕而殺蟲處處有之蔓生葉似扁豆而三尖有黑白二種一切積氣宿食不化頭末四兩取萊蔔剜孔入藥蒸熟加白蔻末一錢丸梧子大每服二十丸驗方第一大便不通半生半熟為末薑湯下第二水腫猝脹黑白各頭末二錢白麵合餅燒食因虛者不用第三水腫尿澀取頭末每五分同上第四小兒腫頭末丸服二便不通者第五面上雀斑為末雞子白合敷旦洗去第六小兒夜啼為末敷臍第七小便血淋為末薑水下二錢第八不拘氣水腹鼓同上第三因虛者不用第九奪命散黑白各炒末大黃檳榔等分每蜜水下五分治小兒馬脾風急驚肺脹喘滿胸高氣急脅縮鼻脹悶亂咳嗽煩渴痰潮聲嗄是也諸方第一舟車丸黑醜四兩生軍二兩甘遂一兩麵包煨用橘紅一兩大戟一兩麵包煨芫花一兩青皮一兩木香五錢檳榔一錢輕粉一錢丸豆大每三錢以大便利三次為度不知加之諸水腫形脈俱實者第二凌霄花百六十五畏鹼滷紫薇味鹹甘寒無毒入厥陰肝破血祛瘀通祕落胎甚止崩帶最攻癥瘕生西海川穀及山陽今處處有之蔓生數尺得木而上即高數丈年久者藤大如杯一枝數葉葉尖有齒自夏至秋開花一枝十餘朵大如牽牛而頭開五瓣赭黃色有細點八月結莢如豆莢糞後下血浸酒服驗方第一血崩為末酒下後服四物湯第二消渴水煎一兩服第三通身風癢為末酒下第四大麻風同地龍殭蠶全蠍炒末酒下第五酒皶鼻同山梔末服第六經脈不行酒下末第七薔薇根百六十六味苦澀冷無毒入手足陽明經除風濕諸熱解赤白諸痢息癰疽疥癬之毒平金瘡打撲之腫殺疳蟲而治肚痛通血結而治牙痛遺尿消渴之疾頭瘡白禿之疴子名營實治同生零陵及蜀郡八九月採根今在處有之叢生似蔓而莖硬多刺小葉尖薄有細齒四五月開花有紅白諸色消渴尿多水煎服驗方第一小便失禁同上第二尿床酒煎服第三小兒疳痢煎服以愈為度第四口舌糜爛水煎常漱第五金瘡腫痛燒末白湯下第六骨哽不出為末水下第七下疳瘡同葉焙末敷之第八月季花百六十七甘溫無毒活血消腫敷毒瘰癧未破用花二錢沉香五錢芫花炒三錢入大鯽魚腹中以魚腸封固酒水煮熟食之驗方第一栝蔞子百六十八古方用實今惟取仁炒用甘寒無毒入手太陰肺下氣定喘止嗽消痰瀉火潤肺滑腸止血平乳癰而通乳汁療胸痹而滌胸郁解赤白熱痢通二便祕澀瀉者忌用所在有之蔓生葉如甜瓜而小薄七月開花淺黃色結實在花下如拳秋月採實痰嗽不止蔞仁一兩為末文蛤七分薑汁澄濃丸彈大含化之驗方第一乾咳無痰蔞實一枚絞汁入蜜加白礬一錢熬膏常含咽之第二咳而有痰蔞實十個白礬二兩同搗為餅陰乾為末丸豆大每五十丸第三熱咳不止濃茶一盅蜜一盅蔞實去皮將瓤入茶蜜中去子蒸熟常食之第四痰咳胸滿有熱心下塞者用子同半夏丸服薑下第五肺痿嗽血蔞實一個烏梅肉十個杏仁二十個焙末每用一撮豬肺一片摻末入內炙熟食之第六酒痰咳嗽同青黛薑汁丸每含化之第七飲酒發熱方同上第八酒痞脅脹時嘔同神麯末每蔥水下二錢第九小兒痰喘咳內熱蔞仁為末白麵合餅炙黃為末每湯下一錢日三蒸餅食亦可第十婦人犯熱痰咳經不調蔞仁青黛香附為末蜜合含化十一痰咳胸滿氣塞蔞仁炒丸豆大每三十十二小兒黃疸蔞實為末水下下黃水為度十三酒疸同上十四吐血不止蔞實泥固煨之每末服三錢十五下鮮血蔞實燒末同赤小豆末每酒下一錢十六面黑令白蔞淨瓤三兩杏仁一兩豬胰一具杵如膏每夜塗之十七下胞衣用仁為末酒與童尿煎十八乳癰初發蔞實大者一個酒煎取汁十九諸癰發背初起同上二十便毒初起蔞實黃連水煎服二十一栝蔞薤白白酒湯蔞實一枚薤白三兩白酒一斤治胸痹氣短喘息咳唾胸背痛寸口脈沉而遲關上小緊數者諸方第一栝蔞半夏湯前方加半夏半斤治胸痹不得臥心痛徹背第二小陷胸湯蔞實一枚半夏半斤黃連一兩治小結胸疼痛只在心下寸關浮滑心不熱者去黃連第三天花粉百六十九取粉用枸杞為使惡乾薑畏牛膝乾漆反烏頭即栝蔞根也秋月掘者有粉夏月掘者有筋無粉不堪用甘酸微苦寒無毒解消渴除煩熱療黃疸治毒癰排膿生肌撲損血瘀發黃煩渴蜜煎服之驗方第一一切煩渴水煎服第二小兒發黃同蜜服之第三小兒壯熱頭痛乳汁合末服第四小兒囊腫佐炙草水煎服第五耳猝烘烘削尖以豬油煎三沸塞之第六耳聾未久用三十斤煮汁如常釀酒服之第七乳汁不下酒水煎第八癰腫初起同赤小豆末醋合敷第九折傷腫痛熱搗敷之第十箭鏃不出搗敷日三易十一針入肉中方同上十二痘後目障同蟬蛻焙末將羊肝批開入藥末米泔煮熟食之十三土瓜根百七十即王瓜月令四月王瓜生即此也味苦微寒無毒入厥陰肝通經瘀而破癥結利二便而消癰腫生魯地平澤田野及人家垣牆間三月採根三月生苗其蔓多須嫩時可茹其葉圓如馬蹄而有尖面青背淡色而不光六七月開五出小黃花成簇結子熟時有紅黃二色根如栝蔞根之小者澄粉甚白須深掘二三尺乃得正根葛根百七十一辛甘無毒入足陽明經解肌退熱升陽散火止嘔除瀉生津解渴降沖逆而定喘解酒毒而散郁除眼眶項背之強痛退胸膈心下之邪熱血痢溫瘧之疾腸風疹痘之疴在處有之其根外紫內白蔓生其葉有三尖面青背淡其花成穗紅紫色其莢如小黃豆莢亦有毛金瘡中風痙強欲死水煎四兩服仍合竹瀝服驗方第一服藥過劑水煎服第二中服藥毒方同上第三酒醉不醒同上第四小兒吐血水煎服第五衄血同上第六熱毒下血與藕節合服第七乾嘔不已水煎服第八傷寒頭痛發熱脈洪水煎汗之第九癤子初起葛蔓燒末水合敷第十消酒葛花煎服飲酒不醉十一目眶痛葛根煎服十二葛根湯桂枝白芍炙草薑棗葛根麻黃治項背強几几無汗惡風又治下痢兼太陽表症者又治剛痙口噤氣衝項強溺少無汗諸方第一桂枝加葛根湯桂枝白芍炙草薑棗葛根治項背強几几有汗惡風第二葛連芩甘湯葛根黃連黃芩甘草治下後下利脈促喘而汗出者第三天冬百七十二去心蒸用地黃貝母為使畏曾青忌鯉魚誤食鯉浮萍可解之甘寒微苦無毒入手太陽手足少陰經滋腎潤燥止渴消痰除陰火而療骨蒸潤五臟而利二便痰咳喘促之邪熱消渴嗌乾之火熱肺痿肺癰之熱毒吐膿吐血之熱鬱內無熱者與素渴者勿用殺三蟲而去伏尸強骨髓而澤肌膚生奉高山谷春秋採根今處處有之春生藤蔓大如叉股高丈餘葉如茴香極尖細而疏滑有逆刺亦有澀而無刺者夏生細白花亦有黃紫花者根頗同百部根婦人骨蒸煩熱盜汗口乾同麥冬末生地汁煎熬丸服驗方第一口瘡連年上方去地黃加元參蜜丸含化第二諸般癰腫取汁酒下第三百部百七十三酒浸焙用甘苦微溫無毒溫肺殺蟲除咳嗽上氣治傳尸骨蒸解疳疾最易療疥癬良效處處山野有之春苗作藤蔓葉大而尖長頗似竹葉面青色而光根下一撮十五六枚黃白色春秋採根暴咳嗽漬酒服日三驗方第一三十年嗽同蜜熬服第二薰衣去蝨同秦艽末入筒燒熏第三何首烏百七十四米泔浸拌黑豆同蒸忌鐵茯苓為使忌諸血無鱗魚蒜蔥萊蔔苦澀微溫無毒足厥陰少陰藥也益腎補肝養血祛風黑髭發而悅顏色長筋骨而益精髓治瘰癧而消癰腫止崩帶而除瘧疾生順州南河縣今在處有之以西洛嵩山河南柏縣者為勝春生苗蔓延竹木牆壁間莖紫色葉葉相對如山藥而不光澤夏秋開黃白花如葛勒花結子有稜似蕎麥而小根如拳有五稜瓣似小甜瓜有赤白二種秋冬取根疥瘡滿身不可治者同艾葉煎熏之驗方第一大麻風一斤胡麻四兩九蒸九曬為末酒下二錢第二傷破血出為末敷神效第三瘰癧結核已破未破嚼粗日二第四腸風下血米飲下末二錢第五皮里作痛不問何處為末薑汁合膏敷之帛包炙熱鞋底尉之第六骨軟腰膝痛行步不得遍身癢酒製棗肉丸豆大每三十丸酒下第七紫白癜風多起面項初無痛癢後漸微癢延蔓成片或遊走遍身純紫斑者紫癜粉紅有白斑者為白癜均有汗初起以萬靈丹汗之首烏荊芥蒼朮苦參皂刺丸服治白癜又附子硫黃薑汁調勻茄蒂搽之治紫白二癜又硫黃一錢密陀僧一錢信石分陳醋合敷之良效又密陀僧為末醋敷之第八七寶美髯丹首烏赤白各一斤米泔浸三日去皮鋪黑豆上砂釜蒸之如此九次赤白茯苓各半斤菟絲子半斤酒蒸當歸身半斤故脂四兩酒浸黑芝麻同炒牛膝半斤共為末蜜丸龍眼大每酒下二三丸黑鬚發壯筋骨固精氣續嗣延年諸方第一澤瀉百七十五酒浸乾用畏海蛤文蛤甘淡微咸微寒無毒入足太陽少陰經利水通淋止嘔除瀉滲濕解渴治疝補陰祛心下之水痞逐膀胱之濕熱消腫脹而除腳氣明耳目而舒筋骨生汝南池澤九月採根今山東河陝江淮亦有之以漢中者為勝春苗多在淺水中葉似牛舌獨莖而長秋開白花作叢似穀精草冒暑霍亂小便不利同白朮茯苓生薑燈心煎驗方第一水腫同白朮為末或丸服第二澤瀉湯澤瀉五兩白朮四兩水煎分服治心下支飲苦眩冒脈沉弦菖蒲百七十六去毛微炒秦皮秦艽為使惡地膽麻黃忌飴糖羊肉鐵器石菖蒲良辛溫苦平無毒手少陽足厥陰藥也開心孔通耳竅明目發音祛濕逐風除痰消積開胃寬中療噤口毒痢除風痹驚癇崩帶胎漏之疾癰瘡疥瘙之疴生上洛池澤及蜀郡嚴道一寸九節者良今處處有之而池州戎州者佳時珍曰菖蒲凡五種生於池澤蒲葉肥根高二三尺者泥菖蒲也生於溪澗蒲葉瘦根高二三尺者水菖蒲也生於石水之間葉有劍脊瘦根密節高尺余者石菖蒲也人家以砂栽之每春剪愈剪愈細高四五寸葉如韭根如匙柄粗者亦石菖蒲也遍身生瘡痛而不癢黏著衣被曉夕不臥以數斤為細末布席上臥之即不黏衣又得安臥五七日瘥神效驗方第一飛絲入目捶碎左目塞右鼻右塞左神效第二頭瘡不瘥為末香油合敷日三第三陰汗濕癢同蛇床末搽之第四病後耳聾取汁滴之第五耳猝聾同萆麻子搗丸綿包塞耳日易之七日愈第六産後崩中酒煎服兩半第七赤白帶下同故紙炒末酒下第八胎動不安或痛或下血取汁服第九肺損吐血同白麵新水下第十諸積鼓脹半斤斑蝥四兩同炒去蝥醋丸服三十丸十一霍亂脹痛四兩每服一兩十二尸厥如死脈如常為末吹鼻仍煎服十三魘死不寤勿以火照但痛咬其踵以菖蒲末吹鼻且煎服十四聰耳明目益智不忘為末酒常服之十五蒲黃百七十七甘平無毒手足厥陰藥也生用性滑行血消瘀通經脈而利小便祛心腹膀胱寒熱諸邪療打撲損傷瘡癤諸腫炒黑性澀止一切吐衄崩帶便血痢血煎止泄精處處有之以泰州者為良初生嫩葉出水時紅白色至夏抽莖於叢葉中花抱莖端如槌俗名蒲棒是也蒲棒即花中蕊屑也心腹血氣痛同靈脂末服驗方第一舌脹滿口為末摻之又同乾薑末摻之第二重舌生瘡以末敷之第三衄血同青黛新水下第四吐血唾血二兩每涼水下三錢第五吐血不已為末生地湯下第六小便血同上第七金瘡出血常服之第八胎動欲産井華水下脈散者急加參第九胞衣不下同上第十産後血瘀水煎三兩十一兒枕血瘕米湯下十二産後煩悶東流水下十三墜傷撲損內瘀酒下十四陰處濕癢為末敷之四度良十五聤耳出膿摻之十六耳中出血炒黑摻之十七口耳大血急以帛縛兩乳同阿膠生地煎服十八浮萍百七十八即水中小浮萍非大蘋也辛酸無毒入手太陰經除膚熱而解表消癮疹而祛風下水氣而利小便止瘙癢而解消渴麻痹癱瘓之疾打撲吐血之疴處處池澤水中有之春生或云楊柳花所化一葉經宿即生數葉葉下有微須即其根也一種背面皆緑者一種面青背紫赤若血者謂之紫背浮萍入藥為良七月採之取貯篩中篩下坐大盆水即易干也海藻百七十九咸寒無毒瀉熱行水軟堅化痰消癭瘤結核解㿗疝癥結平水腫而利二便治奔豚而療腳氣諸膈痰壅之疾癰腫宿食之疴海帶下氣消癭功同海藻海藻生東海七月採今登萊諸州皆有之黑色如亂髮海藻酒海藻一斤絹袋盛浸酒中數日服盡再作將渣丸服治癭氣瘰癧昆布百八十煮去鹹味焙乾用咸寒無毒治水腫癭瘤陰㿉膈噎功同海藻生東海時珍曰生登萊搓如繩索之狀出閩浙者大似菜癭氣結核為散每一錢用綿包好醋中浸過含咽汁味盡再易之驗方第一膈噎含咽汁第二石斛百八十一去頭與根酒浸日曬酥蒸用陸英為使惡凝水石巴豆畏雷丸殭蠶甘淡微咸無毒強陰益精暖水補虛平胃氣而壯筋骨療風痹而治腳弱夢遺滑精之疾發熱自汗之疴生六安山谷水旁石上七八月採莖色如金者佳荊襄澤中江左亦有之叢生石上其根糾結甚繁干則自軟其莖葉皆生青色干則黃色紅花節上自生根鬚人亦折下以砂石栽之短而中實者石斛也長而中虛者木斛也木斛不入散丸骨碎補百八十二去淨毛蜜蒸用焙亦可忌鐵即毛薑亦名申薑苦溫無毒入手少陰經及手足厥陰專治折傷最補腎虛耳鳴牙痛悉療破血止血皆醫江南淮浙陝西夔路皆有之其根扁長略似薑形其葉有丫缺頗似貫仲筋骨折傷為末米粥合敷之驗方第一久瀉腎虛為末入豬腎中煨食第二牙痛炒黑末摻之咽下第三發落欲生同薔薇嫩皮煎汁刷之第四耳鳴耳閉削條火炮乘熱塞之第五風中牙痛同乳香丸塞孔中第六石葦百八十三去毛梗炙用滑石杏仁射干為使得菖蒲良辛甘微寒無毒通膀胱而利水益精氣而治淋崩中漏下之疾發背金瘡之疴處處有之多生陰崖險罅處其葉長者近尺闊寸許柔韌如皮背有黃毛亦有金星者野芫荽百八十四即鵝不食草也石胡荽辛平無毒闢臭氣而通九竅吐風痰而散瘡腫去目翳而開鼻塞解耳聾而療痔病頭痛腦酸之疾痰瘧齁䶎之疴生石縫及陰濕處細莖小葉狀類芫荽卷柏百八十五先以鹽水煮次以井水煮焙乾之辛平無毒生用破血通經治癥瘕淋結炙用止血治腸風脫瀉生常山山谷石間關陝沂兗諸處亦有之宿根紫色多須苗似柏葉而細拳攣如雞足高三五寸無花子多生石上瓦松百八十六昨葉何草酸平無毒止血住痢生髮斂瘡處處有之生年久瓦屋上如蓬高尺許遠望如松栽六七月採苗馬勃百八十七俗名灰包生濕地中辛平無毒散血熱而清肺止喉痹而解毒敷諸瘡甚良止吐衄亦效生濕地久腐處或腐木上紫色虛軟如狗肺彈之粉出有大如小鬥者薺苨百八十八甘寒無毒利肺氣而和中止咳嗽而明目解消渴而除痛治強中而解毒以蜀江浙皆有之苗似桔梗根似沙參而姦商每以此偽作人參豬腎薺苨湯豬腎一具黑豆一斤薺苨三兩人參石膏茯神磁石知母葛根黃芩甘草栝蔞根每二兩治強中莖長興不交精自出消渴諸方第一仙茅百八十九糯米泔浸去赤汁用忌鐵辛溫有毒除腰腳之冷痹祛心腹之冷氣助陽道而生子添精髓而通神聰耳明目開胃消食最安五臟尤治虛勞生西域今處處大山中有之葉似茅四五月抽莖四五寸開小花深黃色其根獨莖而直大如小指下有短細肉根相附外皮稍粗褐色內肉黃白色二八月採根水仙百九十苦辛滑寒無毒最消癰腫甚下骨哽叢生下濕處其根似蒜薤而長外有赤皮冬月生葉似蒜薤春初抽莖如蔥莖頭開花數朵大如簪頭莨菪子百九十一醋煮乾牛乳浸苦辛熱有毒療癩疾風癇治肉痹拘急熏蟲牙而洗陰汗止冷痢而收脫肛安心定志聰耳明目除邪驅風通神見鬼茜草百九十二苦酸無毒補中益氣祛寒除濕解黃疸而通經止風痹而活血吐衄崩中便血諸血治痔瘻瘡癤息撲損諸傷生喬山川穀二八月採根今圃人亦作畦種蒔苗蔓生方莖中空有筋外有細刺數寸一節每節五葉七八月開花結實如小椒大中有細子白藥子百九十三辛溫無毒散血降火生肌解毒消腫癰而解喉痹除咳嗽而療損傷出原州夔施合州江西嶺南亦有之三月生苗葉四月抽赤莖如壺蘆蔓六月開白花八月結果九月葉落枝折根皮赤色名白藥子黃藥子百九十四苦平無毒涼血降火消癭解毒出嶺南夔峽州郡及明越秦隴山中以忠州萬州者為勝今處處人家種之莖高二三尺柔而有節似藤葉大如拳其根外褐內黃亦有黃赤色者胡麻百九十五酒蒸用烏者良甘平無毒潤養五臟添補精髓堅筋骨而明耳目黑鬚發而利二便最逐風而除濕亦涼血而解毒小便尿血碗許為末東流水浸一宿平旦絞汁熱服驗方第一瘡口不合炒搗敷之第二蜘蛛咬瘡杵爛敷之第三諸蟲咬傷同上第四湯火傷同上第五婦人乳少炒研入少鹽食之第六陰癢生瘡嚼敷第七頭面諸瘡同上第八小兒瘰癧同連翹末常食之第九小兒軟癤炒焦嚼敷第十小兒痢下赤白搗合蜜湯食之十一手足痠痛熬研酒浸常服十二偶感風寒炒研擂酒服取汗十三腰腳痠痛熬香杵末服十四白髮令黑九蒸曬棗肉丸服十五香油甘微寒無毒涼血解毒止痛生肌解諸毒而殺蟲消癰腫而滑腸發落不生塗之驗方第一令髮長黑入桑葉煎過去渣沐發第二耳聾有塞日滴數次第三蚰蜒入耳以油作餅枕之第四蜘蛛咬傷合鹽摻之第五冬月唇裂塗之第六小兒丹毒塗之第七毒蜂螫敷之第八蛇傷急飲之再治補第九喉痹腫痛灌之立愈第十腫毒初起煎熬乘熱通手旋塗十一癰疽發背香油一斤銅釜煎沸入好醋二碗作五次服一日服盡十二血乾難産入蜜煎服十三胎死腹中同上入湯服之十四猝熱心痛服一合十五小兒初生二便不通稍入皮硝煎服十六小兒諸熱蔥涎入油內手蘸油摩五心頭面項背能解毒涼肌十七傷寒發黃香油一盅水半盅雞子白合服十八中砒石毒一碗灌之十九腰痛牽心發則氣絶以香油服之吐物如發二十小兒鹽哮脂麻秸瓦上焙末豆腐蘸食之二十一眉毛不生脂麻花陰乾為末香油漬之日塗二十二湯火傷香油數兩入落陽花漬之陳久彌佳敷傷處止痛消腫永不潰爛神效即黃葵二十三大麻仁百九十六去殼取仁用畏牡蠣白薇茯苓甘平無毒手陽明足太陰藥也潤燥滑腸通乳催生破積血而利小便止消渴而通關節風水腹大腰臍重痛不可轉側麻仁半斤水研取汁入大米二合煮稀粥下蔥椒鹽豉服驗方第一老人風祕第二五淋澀痛第三大便不通第四産後祕塞俱同上第五産後瘀血酒浸一宿平旦服每一兩第六妊娠心痛水煎服第七月水不通同桃仁各二兩酒煎分服之無燥結象者不用第八嘔逆不止杵煎水研取汁著少鹽吃立效第九虛勞內熱骨節痛大便數口燥熱淋水煎三兩分服第十腳氣腫渴熬汁入赤小豆煮熟食豆飲汁十一血痢不止取汁煮緑豆空心食大效十二大腸頭出寸余干則自落又出坐香油中漬之飲大麻子汁數升自愈也十三金瘡內瘀二兩蔥白七個搗水煎服血出不盡再服十四小兒頭瘡研細絞汁合蜜塗之十五白禿無發炒焦為末豬脂合敷發生為度再煮麻仁汁常服十六小兒丹毒搗末水合敷之十七小麥百九十七新者性熱陳者和平甘微寒無毒除客熱而止煩渴利小便而止漏血消渴心煩作粥食之驗方第一老人五淋同木通一兩服第二白癜風攤石上燒鐵物壓油搽之良第三浮麥甘寒無毒益氣除熱自汗盜汗最宜骨蒸勞熱尤良麥麩止痛散血調中祛熱醋蒸尉手足痹痛寒濕腳氣醋炒罯損傷血瘀湯火傷爛一切虛汗盜汗或炒末服或煎服驗方第一氣走作痛醋炒布包尉之第二小兒眉瘡炒黑末酒合敷第三小便尿血炒香豬肉蘸食之第四陳小粉用麩皮水澄干之愈久愈佳炒黑醋熬膏敷一切赤腫焮痛湯火諸傷犬咬馬毒久不愈者麥面甘溫無毒補虛養氣厚腸強力助益五臟充實體膚敷癰腫損傷止鼻衄吐血最散血瘀尤止疼痛熱渴心悶溫水合服一兩驗方第一中暍猝死水合服一抄第二吐血略炒磨京墨合服第三大衄口耳皆血入鹽少許冷水下第四嘔噦不止醋合作小彈丸煮熟投漿水中每吞三丸未定再第五寒痢白色炒入粥中食之第六瀉痢不固炒焦一斤每水下二錢第七頭皮虛腫如裹水嚼面敷之第八咽腫痛醋合敷外腫處第九乳癰不消醋熬敷之大效第十破傷中風同炒鹽新水合敷十一金瘡出血敷之十二遠行腳趼成泡水合敷一夜消十三折傷瘀血同山梔水合敷之十四火燎成瘡同山梔香油敷之十五瘡中惡肉寒食麥面二兩巴豆五分水合餅燒末敷之十六小兒口瘡寒食麥面硝石水合敷足心下男左女右十七婦人斷産一斤酒煮沸去渣分三服經水至時前日夜次日早天明服之十八一切漏瘡同鹽合團燒研敷之十九瘡纍纍如赤豆生手足肩背瘭疽也酒合敷之二十一切疔腫豬油合封二十一傷米食積同陳曲末常服二十二傷肉積同上山楂湯下二十三一切腹痛麥秸草燒灰淋汁服二十四接骨外敷方生梔一錢飛白麵三錢薑汁調敷損傷腫痛極者水合敷之二十五大麥百九十八咸微寒止渴除熱益氣調中補虛養血消食止瀉充實臟腑滑肥肌膚大麥面平胃止渴消食除脹寬胸下氣涼血進食食飽脹煩大麥麵炒香白湯下以愈為度驗方第一小兒脹煩欲睡此傷乳也用面微炒水下一錢第二麥芒入目大麥煎洗即出第三湯火傷大麥炒黑為末油合敷之第四破傷腸出大麥粥湯洗腸納入但飲米糜百日可愈第五猝患淋痛大麥三兩煎湯入薑汁蜜代茶第六小便不通陳大麥秸煎汁服之第七大麥芽炒開胃補脾和中寬腸散氣破血通乳落胎化一切米麵果食消諸般脹結痰氣婦人乳脹因喪子水煎三錢立效驗方第一脹飽同萊蔔子煎服第二谷勞嗜臥飽食便臥四肢煩重大麥芽三兩椒一兩俱炒乾薑三兩為末白湯下二錢第三蕎麥百九十九甘平微寒無毒寬腸降氣磨積消癰除白濁白帶治脾積泄瀉塗丹毒而消熱腫療痢疾而止絞腸絞腸痧痛用麵炒焦熱水沖服驗方第一脾積痢疾炒麵沙糖水合常服第二赤腫熱痛醋合面敷之第三嗽而上氣面四兩茶末二錢蜜二兩水一碗順手攪千下服之良久氣下不止即愈也第四十水腫喘同大戟末作餅炙熟為末茶下以利為度第五男子白濁炒末雞子清合丸豆大每五十鹽水下第六赤白帶下同上第七噤口痢疾每沙糖水下面二錢第八癰疽發背麥面硫黃各二兩井水合餅曬乾每用一餅磨水敷之痛令不痛不痛令痛第九瘡頭黑凹用面煮食即發起第十痘瘡潰爛用面頻敷十一湯火傷炒麵水合敷神效十二男子敗積同大黃末酒下十三女子敗血同上十四頭風畏冷水調餅敷之數作汗出愈十五染髮令黑十六噎食蕎麥秸燒灰淋汁煎取白霜一錢硼砂一錢為末每酒下五分十七粳米二百陳者下氣宜病人甘平微寒無毒補中和胃益氣除煩清熱止渴壯筋骨而益腸胃和五臟而好顏色霍亂吐瀉煩渴入水研汁合竹瀝服之驗方第一赤痢熱躁入水研汁入瓶中貯井底一宿平旦服之第二自汗不止杵粉絹包撲之第三五種尸病水煮一沸常服之第四猝心氣痛水煎一沸即服第五初生無皮杵粉撲之第六小兒面耳生瘡嚼敷之第七胎動腹痛下黃汁脈欲散同黃耆煎服第八淅二泔即大米泔第二次也止煩渴而清熱利小便而涼血吐血不止溫服頻頻驗方第一鼻血同上第二服藥過劑飲之良第三糯米二百零一糯性黏滯小兒病人忌之痘病喜之甘溫無毒補脾益肺益氣止瀉堅大便而縮小便收自汗而發痘瘡自汗不止杵粉入龍骨牡蠣撲之驗方第一霍亂煩渴蜜水研汁服之大米尤良第二消渴不止同上第三下痢噤口糯谷三兩炒出白花去殼薑汁拌濕再炒為末白湯下第四久泄食減糯米二兩水浸一宿炒熟為末入山藥一兩每日平旦用半盞入沙糖二匙胡椒末少許以滾湯調食其味極佳久服令人有子神方也第五鼻血不止諸藥不效用糯米炒黃為末每新水下二錢仍吹鼻少許第六自汗不止同麩皮炒末每米飲下二錢第七女人白淫同花椒醋丸服第八風犬咬傷糯米一合斑蝥七枚同炒黃去蝥再入七枚炒黃去蝥又入七枚待米出煙去蝥為末香油合敷小便利佳第九虛勞不足入豬肚內蒸乾搗丸日日食之第十腰痛虛寒炒熟袋盛拴靠痛處內研服八角茴酒下十一金瘡癰腫糯米不拘多少端午前四十九日以冷水浸之一日再換水輕淘轉勿攪碎至端午日取出陰乾絹袋盛懸通風處每用旋出炒黑為末冷水調如膏隨瘡大小裹定瘡口外以布包勿令動直候瘡瘥若腫毒初起敷之一夜即消十二喉痹痄腮用前膏貼之干再易十三竹木簽刺以前膏貼之一夜刺出在藥內也十四煩渴不止糯米泔水任意飲之十五黍米二百零二多食發故疾閉氣甘溫無毒益氣補中杖瘡腫痛燒灰香油敷之不作瘢驗方第一小兒鵝口嚼汁敷之第二心痛不瘥四十年者取泔汁溫服第三閃肭脫臼赤黑腫痛黍米粉鐵漿粉各半斤蔥一斤同炒研末酒服三次再入少醋貼之第四稷米甘寒益氣補中涼血解毒闢除瘟疫令不相染稷米為末頓服之丹黍米止嗽下氣退熱除渴甚治霍亂亦調瀉痢令婦不妒同薏仁丸服驗方第一男子陰易酒煎三兩發汗第二蜀秫二百零三甘澀溫無毒溫中澀腸蜀秫根利小便止喘燒灰酒服治難産小便不通蜀秫根三兩扁竹一兩燈草百莖每流水煎半兩驗方第一玉蜀秫甘平調中開胃玉蜀根葉治小便淋沙石痛甚煎湯服粟米二百零四甘咸微寒養腎益氣治胃熱而止渴除霍亂而利小便反胃吐食為粉水丸豆大煮七枚納醋中吞之驗方第一胃熱消渴陳粟米炊飯干食之第二鼻血為粉水煮服第三粟米泔飲服止霍亂煩渴洗浴療皮膚瘙疥穀芽甘溫開胃快脾下氣和中消食化積杵頭細粳粟秫之粳也氣膈噎塞刮取含之亦可煎呷之亦可蜜丸含咽驗方第一咽中如有物吞吐不利杵頭粳臺參蓮肉煎服第二薏苡仁二百零五糯米同炒用甘微寒入足太陰足陽明經利水瀉濕退熱除淋舒筋急拘攣止咳唾膿血治腳氣而除風止消渴而殺蟲水腫喘急用郁李仁二兩水研取汁煮薏苡飯食驗方第一咳唾膿血用半斤杵破水煮入酒少許服第二薏苡附子散苡仁半斤附子二兩煎服治胸中痹塞或隱痛諸方第一薏附敗醬散上方加敗醬為散煎服治腸癰身甲錯腹皮急按之濡如腫狀腹無積身無熱脈數者第二薏仁粥治久風濕痹水腫胸痹筋攣等症蓋薏仁杵粉同大米作粥食之是也第三粟殼二百零六去蒂筋膜醋炒或蜜炙用酸澀微寒無毒斂肺澀腸止瀉痢而固脫肛療遺精而止久嗽瀉痢赤白蜜炙蜜丸服驗方第一熱痢便血醋炙同陳皮末烏梅湯下第二久痢不已蜜丸彈大每薑水下一丸病危者不用第三水瀉不止同烏梅大棗煎服第四久嗽不止穀氣素壯者即效蜜炙末蜜水下第五久嗽虛嗽多年不愈同烏梅為末白湯下第六壯人猝痢同烏梅燈心草引煎服第七嗽而遺尿同五味子服第八粟米甘平無毒行風氣而逐邪熱治反胃而開胸疾甚止瀉痢尤潤燥枯鴉片酸澀溫有小毒治瀉痢脫肛澀丈夫精氣一粒金丹真鴉片一分大米飯搗合三丸每重錢許每服一丸未效再進不可多服忌醋通治百病風癱酒下口目不正羌活湯下百節痛獨活湯下正頭風羌活湯下偏頭風川芎湯下眩暈防風湯下陰毒豆淋酒下瘧疾桃柳枝湯下痰喘葶藶湯下久嗽乾薑阿膠湯下勞嗽冬花湯下吐瀉藿香湯下赤痢黃連湯下白痢乾薑湯下噤口痢白朮湯下臍下痛燈心湯下諸氣痛木香酒下熱痛梔子湯下小腸氣小茴湯下血氣痛乳香湯下脈痛酒下噎食生薑丁香湯下血崩靈脂湯下慢脾風砂仁湯下其餘諸症審其所引可也諸方第一黑豆二百零七炒食極熱煮食則寒緊小者良甘平微寒無毒補腎鎮心解毒散熱利水下氣活血去瘀塗一切腫毒解諸般風熱除心腹之痛滿散産後之滯瘀頸項強硬不得回顧蒸熱布包枕之驗方第一風毒攻心煩躁恍惚水煮服第二猝風不語煮汁服第三喉痹不語同上第四目赤腫痛蒸數包五更時更互尉之第五脅痛如打炒焦入酒煮沸服之取醉第六腰脅猝痛同上第七猝然腰痛拌炒熱尉之第八腳氣衝心水煮服第九身面浮腫水煮再入酒煮服第十新久水腫同上十一腹中痞硬薑引水煎十二水痢不止炒末每米飲下三錢十三霍亂脹痛微炒末水下十四男子便血炒焦熱酒淋服十五一切下血皂角湯浸炒熟豬油丸服十六小兒沙淋百二十粒生草一錢南滑一錢水煎服十七腎虛消渴難治者炒同花粉丸服十八晝夜不眠以新布火炙尉目再蒸黑豆數包更枕之十九天行疫癘發腫炒同炙草煎服二十一切菜石食物毒同甘草服二十一酒食毒煮食得吐良二十二信石毒煎服二十三諸魚毒煮服二十四巴豆毒利不止者煮服二十五湯火傷煮食易愈二十六打頭青腫炒末水合敷二十七墮跌內瘀煮服二十八痘瘡濕爛為末敷之二十九小兒頭瘡炒末水合敷之三十染髮令黑醋煮熬稠染之三十一牙痛煎漱三十二月水不斷炒煙盡入酒沃之服或不見心熱者忌三十三妊娠腰痛酒煎服三十四子死腹中醋煎服三十五胞衣不下酒煎服三十六菜中蛇毒為末酒浸絞汁服三十七身如蟲行水浸絞汁旦旦洗之三十八腳腨𦚼䐐中癢出黃水風疽也以青竹筒三尺將黑豆入內以馬糞粳火燒熏以器承兩頭取汁搽之先以米泔合鹽洗之三十九小兒血淋黑豆葉煮汁服四十豆淋酒黑豆三升炒熟入瓶中以熱酒沃之經一日每取溫服取汗治産後百病産後諸風或背強口噤或煩熱瘛瘲或身頭皆腫或身癢嘔逆直視或手足頑痹頭眩目昏皆虛熱中風也中風口斜頭風頭痛破傷中風諸方第一黑豆補虛丸黑豆五升煮爛去皮搗末豬膏作丸豆大每酒下百丸長肌增顏填髓益氣補虛能食肥人不可服第二荒年避穀神丹黑豆五斗蒸三遍去皮大麻子三升浸一宿蒸二遍令口開取各搗為末再合搗作團如拳大入甑中蒸之從戌至子寅時出甑午時曬乾為末干服之以飽為度不得食一切他物第一頓得七日不飢第二頓四十九日不飢第三頓三百日不飢第四頓二千四百日不飢更不必服永不飢也令人強壯永不憔悴口渴即研大麻子湯飲之轉更滋潤臟腑若要重食他物用葵子三合研末煎湯令服取下藥如金色任食諸物並無所損真仙方也第三豆黃卷炒用黑豆生芽干之甘平無毒益氣宜腎破血止痛除胃中積熱消水病脹滿舒筋攣而止膝痛潤肌膚而除黑皯水腫喘急二便澀同大黃為末每蔥白陳皮湯下二錢以利為度驗方第一頭風筋攣膝痛便結炒末水下日二第二黃豆二百零八甘溫無毒寬中下氣利腸消水豆油辛甘熱微毒痘後生瘡燒豆為末香油合敷驗方第一損傷腫痛爛豆腐渣炒熱尉之良效第二赤小豆二百零九甘酸無毒散血消腫排膿清熱止渴解酒通乳下胎利小便而消水腫治腳氣而療瀉痢敷一切瘡癰塗諸般熱毒水氣腫脹赤小豆五合大蒜一顆生薑五錢商陸一條同搗同水煮爛去藥空心食豆旋旋啜汁令盡腫自消也驗方第一腫從腳起入腹殺人赤小豆三斤煮爛取汁溫漬足膝若已入腹但食小豆勿雜他食亦愈第二水腫腹大入白茅根同煮食之以消為度第三下部卒痛同黑豆蒸熟作二包更互坐尉之第四水穀痢疾一合同黃蠟三兩煎服之第五熱毒下痢為末水煎第六舌上出血如有孔水研絞汁服第七熱淋血淋炒末同煨蔥搗爛酒下第八重舌鵝口為末醋合敷第九小兒不語為末酒合敷舌下第十牙痛為末搽之吐涎及吹鼻十一中風嘔逆水煎服十二常患墮胎為末酒服十三妊娠行經同上十四難産研取汁入黃明膠煎服又生吞七枚十五胞衣不下男七枚女二七枚東流水吞下十六乳汁不通煮汁服十七吹乳酒研服以渣敷之十八癰腫初作水合末敷之十九痘後癰腫雞子清合末敷二十腮頰熱毒為末蜜合敷二十一丹毒如火雞子清合敷二十二風瘙癮疹合荊穗末雞子清合敷二十三中六畜肉毒燒末水下二十四赤小豆當歸散小豆當歸為末漿水下治狐惑病脈數無熱微煩默默欲臥目赤眥黃黑若能食者膿已成也又治先血後便諸方第一
