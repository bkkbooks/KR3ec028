body:
  text: 本草易讀卷二目部六十三一切目疾甘石四百三十七驗方三批內服外點見主治一切目疾黃丹四百二十三外點驗方一一切目疾鹼四百十八外點驗方一一切目疾羊肉三百九十四內服驗方三一切目疾白芷五十驗方二十天行赤眼腫痛淚羌活三十四諸方二目赤腫痛火硝四百五十五驗方四目赤澀痛葳蕤第六驗方二目花赤痛葳蕤第六驗方三目赤甚腫三七二十五驗方五暴赤目痛黃連二十六驗方十九火眼腫痛艾葉七十八驗方三目熱赤痛茵陳七十九驗方四目卒赤痛生地一百零五驗方九目赤腫痛決明一百十四驗方四風熱目赤地膚一百十五驗方一目赤作痛車前一百十九驗方七目暴赤痛大黃一百二十八驗方十一目赤腫痛黑豆二百零七驗方五目赤腫痛豆腐二百十三驗方四目赤澀痛桑葉三百十五驗方一目赤澀痛豬肝三百九十二驗方四目赤腫痛童尿四百零十驗方八洗目退赤諸水四百十三驗方三目赤痛黃丹四百二十三驗方二目暴赤痛甘石四百三十七驗方一神祟忽睛痛莫忍元參十八驗方七爛弦風眼白礬四百五十九驗方六爛弦風眼黃連二十六驗方二十一目弦赤爛薄荷七十四驗方五風弦爛眼青黛一百二十二驗方八爛弦風眼五味子一百五十八驗方二爛弦風眼銅綠四百二十一驗方三爛弦風眼甘石四百三十七驗方六眼眶痛葛根一百七十一驗方十二老人目疾見八卷末附記目生白膜白礬四百五十九驗方七目翳胬肉白礬四百五十九驗方八目中微翳車前一百十九驗方九目中翳膜穀精一百二十六驗方一目中翳膜白瓷器四百二十驗方一目中翳膜冰片二百八十九驗方一目赤生翳骨皮三百二十六驗方五塞耳鼻去翳膜野芫荽二百三十主治目中翳障蒙花三百三十二驗方一目翳目盲豬膽三百九十二諸方三目赤及翳黃丹四百二十三驗方三目中浮翳鹽四百五十一驗方七諸般翳膜甘石四百三十七驗方二內外障蒼朮第十驗方三雲翳而癢菊花七十七驗方七青盲雀目蒼朮第十驗方六病後青盲羊藿十四驗方三青盲雀目決明一百十四驗方二雀目地膚一百十五主治青盲洗法桑葉三百十五驗方十肝虛雀目黃蠟三百四十六驗方一青盲牡鼠四百零六驗方八目珠突出白芍五十一驗方一目珠陷塌人參第三驗方二十六補虛明目蒼朮第十驗方七目昏澀蒼朮第十驗方五內虛目暗當歸四十六驗方八目昏花甘菊七十七驗方六目昏多淚木賊一百零三驗方一目昏暗蒼耳九十七驗方六補肝明目決明一百十四驗方三肝傷目暗菟絲一百五十七驗方七諸目不明蔓荊二百二十五驗方一目熱昏暗槐角三百驗方一目暗昏花甘石四百三十七驗方五老人目赤暴痛白芍五十一諸方五目睛痛桔梗第五驗方六又夏枯八十二驗方七赤脈貫睛元參十八驗方五目卒癢痛黃連二十六驗方二十二眉眶作痛黃芩二十八驗方十二目睛忽垂羌活三十四驗方六目生胬肉貝母三十九驗方三睛突出諸水四百十三驗方十三目中漏膿膽草四十二驗方三暑天目澀膽草四十二驗方四淚出不止黃連二十六驗方二十三睛痛冷淚羞明香附六十八驗方八冷淚睛痛夏枯八十二驗方一痛連眉稜夏枯八十二驗方七風目下淚桑葉三百十五驗方九淚出或癢甘石四百三十七主治見風淚出不赤痛川芎四十七諸方二夜不合眼燈草一百零四驗方四物傷睛突生地一百零五驗方八飛絲入目菖蒲一百七十六驗方二睛被物傷腫痛生地一百零五驗方十五麥芒入目大麥一百九十八驗方三羞明怕日決明一百十四主治肝虛目赤羊肉三百九十四驗方一目生珠管黃丹四百二十三驗方四眼癢菊花七十七驗方八赤目生瘡蒼耳九十七驗方一病後失明羊肉三百九十四驗方二積年失明決明一百十四驗方一三十年失明蒺藜一百二十五諸方一目跳熱癢蒼朮第十驗方十八羞明怕日石決明三百八十五驗方一吹衝去厚翳文蛤三百四十九諸方二咽喉部六十四急喉風痹殭蠶三百五十一驗方四急喉風痹元參十八驗方三喉痹壅塞紅花八十七驗方二喉痹壅塞半夏一百四十二驗方六喉風痹塞燈草一百零四驗方三痹塞不通射干一百四十三驗方三喉痹乳蛾內金三百八十七驗方八喉痹乳蛾淨花一百五十六驗方三乳蛾咽痛杜膝九十八驗方四喉痹口噤羌活三十四驗方五喉痹口噤蓖麻一百三十四驗方十喉痹不語黑豆二百零七驗方四喉痹腫痛白芥二百二十四驗方八喉痹腫痛桃奴二百四十三驗方十三一切咽腫痛桔梗第五驗方十三冬月腫痛蛇床子四十八驗方十三喉痹腫痛馬藺九十五驗方一喉痹腫痛馬藺九十五驗方四喉痹腫痛牛蒡九十六驗方五咽腫痛射干一百四十三驗方一咽腫痛射干一百四十三驗方二咽腫痛麥面一百九十七驗方九咽腫痛硼砂四百五十七驗方二一切咽痛甘草第一驗方十四少陰咽痛甘草第一諸方十痹痛遠志十三驗方四喉痹作痛升麻三十五驗方三咽中熱痛膽草四十二驗方五少陰咽痛半夏一百四十二諸方六喉風急痛豆根一百五十一驗方二咽痛吳萸二百六十一驗方七冰硼散冰片二百八十九諸方一草芒黏咽地丁一百二十七驗方四發哽咽中故梳三百四十三驗方五骨哽咽豬脂三百九十二驗方十一咽中妨礙如有物杵頭糠二百零四驗方二瘰瘤部六十五瘰癧結核苦參三十六驗方三瘰癧結核連翹一百二十一驗方一瘰癧結核何首烏一百七十四驗方四瘰癧結核黃明膠三百九十五驗方十二癭氣結核昆布一百八十驗方一男婦瘰癧牡蠣三百八十二驗方一熱毒瘰癧白芥二百二十四驗方十九瘰癧馬刀夏枯八十二驗方六瘰癧初起芫花一百四十六驗方三瘰