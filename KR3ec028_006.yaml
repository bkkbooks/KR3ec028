body:
  text: 本草易讀卷六緑豆二百一十連皮用甘寒無毒清熱解毒下氣消腫利小便而止渴治瀉痢而除脹解一切菜物草木牛馬金石砒霜等毒十種水氣緑豆半碗黑附子一大枚去皮臍切作兩半同豆煮熟空心臥食豆次日將附子兩半作四半再入緑豆如前煮食第三日另以緑豆附子如前法腫自消也未消再作忌生冷鹽酒六十日此方非近世宜用驗方第一消渴飲水煮汁煎作粥服第二心氣痛緑豆二十一粒胡椒十四粒同研白湯服第三老人淋痛緑豆半碗陳皮二兩同煮成粥再下大麻仁汁二盅空心食之漸服其汁第四赤痢不已以大麻仁取汁煮緑豆食之效第五痘後癰毒緑豆赤小豆黑豆為末醋合敷第六感冒風寒緑豆大把生薑紅糖水煎第七三豆飲緑豆赤小豆黑豆用甘草水煮爛熟食之服汁七日乃止治天行痘瘡預服此可解痘毒縱出亦輕緑豆粉甘寒無毒解藥物酒食諸毒療癰疽發背諸瘡撲痘瘡濕爛不痂治損傷湯火不痊瘡氣嘔惡同胭脂研勻新水下立止驗方第一霍亂吐利同白糖各一兩新水下第二解鳩酒毒水合服第三燒酒毒同上第四砒霜毒同寒水石服第五諸藥毒水合服第六折損臂足新銚炒紫新水合敷杉木皮縛定神效第七杖瘡腫痛炒研雞子清合敷第八外腎生瘡同蚯蚓糞合敷第九一切腫毒初起炒黃黑同皂角末醋合敷皮破者香油敷第十小兒或吐或瀉同雞子白合敷嘔敷足心瀉敷頭心十一護心散豆粉一兩乳香半兩甘草煎湯下諸癰疽服之使毒氣外出防內攻也諸方第一白扁豆二百十一炒用甘平無毒和中下氣調脾暖胃消暑除濕止渴住瀉療霍亂吐利除帶下赤白霍亂吐瀉同香薷煎服驗方第一霍亂轉筋醋合末服之第二消渴不止同花粉蜜丸花粉湯下第三赤白帶炒為末每米湯下第四砒霜毒生研入水絞汁服第五諸鳥肉毒同上第六惡瘡痂癢而痛搗封之痂落即愈第七血崩不止扁豆花焙末炒米煮飲入鹽少許調下第八赤白帶同上第九霍亂吐下扁豆葉水煎服第十淡豆豉二百十二甘苦寒無毒調中下氣除煩止嘔發傷寒之表症除時疾之肌熱身熱頭痛同蔥白水煎服之驗方第一血痢不止同大蒜丸服第二豆腐二百十三甘咸寒無毒寬中益氣清熱散血消心腹之脹滿下大腸之濁氣休息久痢醋煎食之驗方第一杖瘡青腫切片貼之第二燒酒醉死切片遍貼再換第三赤目腫痛切片敷之酸者勿用第四疽生平塌紫硬出黃水日久者豆腐白礬雞子清合敷大效第五神麯二百十四炒用陳久者良味甘辛溫無毒行氣化痰開胃消食回乳落胎除結破核療瀉痢而退脹滿定霍亂而止閃腰造神麯法五月五日或六月六日用白麵若干青蒿汁赤小豆末杏仁泥蒼耳汁野蓼汁以配白虎等六神以諸汁合面豆杏作餅楮葉包罯待生黃衣曬收之陳曲甘溫無毒治同胃虛不化神麯麥芽杏仁蜜丸彈大每食後嚼服一丸驗方第一痞滿暑瀉不食同蒼朮丸豆大每五十第二健胃思食腹脅脹膨胸膈痞悶食少嗜臥神麯麥芽乾薑烏梅蜜丸服第三虛寒反胃內有脹痞象者同上第四暴瀉不止神麯同吳茱萸醋丸服第五食積心痛燒紅酒沃服之第六米穀食積炒末白湯下第七三焦滯氣同萊蔔子炒末服第八小腹堅大如盤炒末水下第九赤白痢水穀不化同米粥服日三第十酒毒便血濕紙包煨為末米湯下十一傷寒食復煮汁服之十二紅曲二百十五甘溫無毒消食健脾破血和血調赤白之下痢止血氣之刺痛除産後之惡露消損傷之血瘀大米一石五斗作飯分十五處入曲母搓揉合勻並作一處以帛密覆熱即去帛攤開覺溫急堆起又密覆次日日中分作三堆過一時作五堆再一時合作一堆又過一時分作十五堆稍溫又作一堆第三日用大桶盛新水以竹籮盛貯作五六分蘸濕完又作一堆如前法作一次第四日如前又蘸若曲半沉半浮再依前法作一次又蘸若盡浮則成矣曬乾收之心腹作痛同香附木香末酒下驗方第一濕熱瀉痢同六一散丸服第二麥芽二百十六炒用咸溫無毒消食和中寬腸下氣開胃除煩催生下胎破癥結而消痰飲退脹滿而止霍亂産後回乳因無子食脹膨水煎三錢立消驗方第一生胎欲去蜜水煎二兩服第二腹脹氣急為末酒下因無子食乳第三進食同陳皮神麯丸服第四小兒肚大黃瘦蓮肉山藥雲苓神麯麥芽白扁豆每四兩入面一斤或入糖水合烙焦餅用第五米醋二百十七酸苦無毒散瘀消腫下氣化食破症開結除痰行水解諸般癰腫毒瘡殺一切魚肉菜毒白虎歷節煎沸入蔥白再煎以布沃之乘熱裹之痛止乃已驗方第一霍亂吐利同鹽煎服第二霍亂煩脹未得吐下溫服良效第三足上轉筋以故綿浸醋中蒸熱包之冷再易第四腋下胡臭合石灰敷之第五瘡熟欲破合雀屎敷瘡頭上即破第六舌腫不消同釜底墨敷之第七木舌腫強時時含漱第八牙痛煎枸杞白皮含漱第九耳聾醋炙附子削尖塞之第十蜈蚣咬傷醋磨生鐵敷之十一蜘蛛咬傷同上十二百蟲入耳滴入即出十三湯火諸傷淋洗之並以醋泥敷之十四足上凍瘡洗之研藕汁敷之十五胎死不下煮黑豆飲服十六胞衣不下以水入醋少許噀面神效十七鬼打猝死吹入鼻良十八乳癰堅硬燒熱石投醋中二次溫漬之冷則更燒投不過三次十九疔瘡初起用面圍住以針亂刺疔上銅器煎醋沸傾入圍中冷再易三兩度根即出也二十米酒二百十八苦甘辛熱有小毒消憂發怒宣言暢意通血脈而厚腸胃潤皮膚而散風濕行諸藥勢殺百邪毒驚怖猝死灌之即醒驗方第一馬汗馬毛入瘡腫痛煩熱飲之最甚第二蛇咬成瘡洗之第三蜘蛛瘡毒同上第四毒蠍螫人同上第五産後血悶和生地煎服第六斷酒不飲酒一瓶入硃砂半兩安豬圈內任豬搖動七日取頓服第七丈夫腳冷不遂者酒三瓶水三瓶入甕中灰火溫之漬腳至膝常著灰火勿令冷三日止第八燒酒辛甘大熱有毒消冷積寒氣開濕痰鬱結清心腹冷痛療陰毒欲死止水瀉而定霍亂除瘧疾而解膈噎洗目赤腫痛之良劑為殺蟲闢瘴之靈丹最堅大便又利小水腹心冷痛同少鹽飲之驗方第一陰毒腹痛熱服汗出即愈第二嘔逆不止用新汲水和服最妙第三寒濕泄瀉小便清者飲之第四耳中有核大痛滴入半時可鉗去第五風蟲牙痛浸花椒頻漱之第六寒痰咳嗽燒酒四兩豬脂蜜香油茶葉各四兩浸酒內煮之每日挑食以茶下之冬日則犯第七腹滿脹猔豬脬一個入熱酒半斤敷臍上二日酒盡腹消第八酒糟二百十九甘辛無毒溫中消食除冷氣而殺腥潤皮膚而和中罯撲損血瘀敷蛇咬蜂螫手足皸裂同豬脂薑汁鹽研爛炒熱搽之裂肉甚痛少頃即合再搽數次即安驗方第一凍瘡浸水洗之第二暴發紅腫痛甚臘月酒糟敷之第三杖打青腫溫敷之良第四韭葉二百二十酸溫辛澀無毒歸心益胃助腎補陽散瘀逐痰解毒止血除一切血痢療諸般毒傷膈噎反胃悉效胸痹刺痛甚良胸痹急痛生韭或根搗汁服之驗方第一猝中惡死取汁入鼻即醒第二喘息欲絶取汁飲之第三每夜盜汗韭根四十九根水煎服第四疹痘不發韭根煎服第五怒傷嘔青緑取韭汁入少薑汁服之第六産後血逆昏絶切安瓶中沃以熱醋熏鼻第七衄血不止韭根蔥根同搗塞鼻頻易即止第八五般癬韭根炒末豬脂合敷數次愈第九金瘡出血韭汁合風化石灰曬乾為末敷之第十刺傷中水腫痛煮韭熱拓之十一漆瘡作癢韭葉杵敷十二百蟲入耳取汁入之十三聤耳出汁同上日三十四食物中毒取汁多服之十五漆瘡官粉一輕粉五石膏三韭汁調敷十六韭子蒸熟去黑皮炒用辛甘而溫無毒止男子遺溺泄精療女子白淫白帶補肝腎而暖腰膝助命門而除筋痿夢遺溺白每日空心生吞二十粒鹽水下又炒末每酒下三錢頻服驗方第一強中不痿精流不住同故紙為末每水煎服三錢第二女子白帶韭子數兩醋煮千沸焙末蜜丸豆大每三十丸空心酒下第三男子夢遺同上第四蟲牙痛用瓦片燒紅入韭子數錢香油數點待煙起以竹筒吸引至痛處良久以溫水漱吐蟲出為效空心酒下第五蔥二百二十一服地黃常山者忌之辛平無毒發表和里通陽散血行乳安胎益目利耳退面目之浮腫開咽喉之痹塞治時疾之頭痛療霍亂之轉筋解陰毒之腹痛除風濕之麻痹散乳癰而平折傷止吐衄而療血痢利大小二便殺魚肉諸毒頭痛如破傷寒連須蔥半斤生薑二兩水煎發汗神效驗方第一時疾頭痛發熱蔥白二十枚和米煮粥醋少許熱食取汗第二數種傷寒初起不能分別者用上方即愈第三傷寒女勞復因交接者腹痛卵腫蔥白搗爛醋一盞和服第四赤斑變黑尿血水煎服汁食蔥令盡取汗治妊娠傷寒第五胎動下血腰痛搶心多煎服未死即安已死即下未效再服第六猝中惡死急取蔥心黃刺入鼻中男左女右鼻出血即醒第七小兒猝死無故者以蔥白納入下部及兩鼻中氣通或嚏良第八陰毒腹痛厥逆唇青卵縮脈欲絶用淨蔥白一束切扁烘熱安臍上以尉斗火尉之蔥爛再易手足溫有汗則愈再服四逆湯若手足不溫者不治第九猝心急痛牙關緊閉以蔥白搗膏送入咽中灌以香油四兩但得下咽即蘇蟲化水而愈第十霍亂煩躁不安蔥白二十枚大棗二十枚水煎服十一蟲咬心痛蔥白二寸官粉二錢搗丸服之立止痛時唇青吐涎面白是也十二腹皮麻痹多食蔥白自愈十三大小便祕搗蔥白熱敷小腹十四小兒虛閉蔥白煎湯調蜜服再以蔥白染蜜入肛門十五小兒不尿大蔥白四片乳汁煎分服十六腫毒尿閉因腫毒未潰者用蔥白入香油煎黑去蔥白取油敷腫處即通十七陰囊腫痛蔥白乳香搗塗之即痛止腫消又方用煨蔥入鹽杵如泥敷之十八小便尿血蔥白一把鬱金一兩水煎分服十九赤白下痢蔥白一把切細合米粥日日食之二十一切腫毒大蔥白取汁漬之日四五次腫即消二十一疔瘡刺破以蔥白生蜜杵敷兩時疔出以醋湯洗之二十二骨折頭破蜜和蔥白搗勻厚封立效二十三自縊垂死蔥心刺耳鼻口出血可活二十四水病足腫蔥葉煎水漬之日三五次二十五小便不通蔥白連葉搗爛入蜜敷外腎上二十六瘡傷風水腫毒同乾薑黃柏水煎洗之二十七蜘蛛咬瘡遍身生瘡蔥葉一莖去尖入蚯蚓一條待化成水取點咬處二十八金瘡血不止搗蔥炙熱挼汁塗之即止二十九薤白二百二十二辛苦溫滑無毒入手陽明助陽利竅散血生肌溫中散結定喘安胎治泄痢下重療胸痹刺痛金瘡能愈湯火亦消大蒜二百二十三辛溫有毒健脾開胃通竅辟惡下氣消穀化肉消水祛寒濕而解暑氣闢瘟疫而消癰腫破症積而殺腥臭止吐衄而除瀉痢泄瀉暴痢搗敷兩足心及臍中驗方第一噤口痢同上第二小兒痢同上第三腸毒下血獨頭蒜煨搗合黃連末丸服米湯下第四鼻血不止服藥不效大蒜一搗膏敷足心左敷右右敷左第五牙痛蟲痛獨頭蒜切片煨熱尉痛處轉易之第六鼻淵不止切片敷足心取效止第七頭風苦痛研汁嗅鼻第八産後中風角弓反張不語用三十瓣水煎灌之第九金瘡中風大蒜一升酒煎取汁並服渣第十婦人陰腫癢煎湯洗之效乃止十一蜈蠍螫傷獨頭蒜摩之即止十二腳肚轉筋搗敷足心令熱即安仍以冷水食一瓣十三食蟹中毒煎汁服之十四面光發熱如火此蛇瘕也服蒜濃汁一碗吐蛇愈十五白芥子二百二十四杵末辛溫無毒通行經絡利氣開痰散腫止痛溫中和胃發汗散寒治喘嗽而療胸滿止反胃而除腳氣塗麻痹而敷毒腫散損瘀而暖腰痛芥菜子治同反胃上氣白芥子末每酒下二錢驗方第一熱痰煩暈白芥子黑芥子甘遂大戟芒硝硃砂丸豆大每二十丸薑水下名白芥丸第二冷痰痞滿黑芥子白芥子大戟甘遂胡椒肉桂丸豆大每十丸薑水下黑芥丸第三小兒乳痞白芥子為末水合攤膏貼之第四防痘入目白芥子末醋合敷足心第五腫毒初起為末醋合敷之第六身體麻木芥菜子末醋合敷之第七喉痹腫痛黑芥子末水合敷喉下第八耳猝聾黑芥子末以乳汁合綿包塞之第九眉毛不生黑芥子生半夏為末生薑自然汁合敷數次第十霍亂吐瀉黑芥子為末水合敷臍十一反胃吐食黑芥子末酒下十二上氣嘔吐芥子末蜜丸豆大井水寅時下七丸申時再下十三臍上絞痛同上十四腰脊脹痛黑芥子末酒合貼之十五走注風痛黑芥子末雞子白敷之十六一切癰腫豬膽汁合黑芥子末敷之十七癰腫熱毒黑芥子同柏葉搗敷十八熱毒瘰癧黑芥子末醋合敷之消即愈十九婦人經閉腹痛寒熱黑芥二兩每酒下二錢二十陰症傷寒腹痛厥逆黑芥末水合敷臍上二十一蔓荊子二百二十五辛苦無毒瀉熱解毒利水明目治黃疸腹脹破癥瘕積聚敷瘡癰甚良除面皯亦效蔓荊根辛甘溫無毒消毒下氣治嗽止渴去心腹冷痛消熱毒風腫諸目不明蔓荊子蒸熟為散為丸作粥俱可驗方第一諸般黃疸或末或取汁服第二一切腫毒搗敷之根子俱可第三陰囊腫大用根搗封之第四蕓薹子二百二十六即薹菜辛溫無毒散血行滯消腫開結敷丹毒而平乳癰療金瘡而治血痢産後諸疾甚良夢中泄精亦效莖葉辛溫無毒散瘀消腫破症除結搗塗療遊風丹腫煮食治腰腳痹木平乳癰而治瘭疽産後血風最良女子吹乳至效臟毒下血蕓薹子炙草每末水下二錢驗方第一頭風作痛薹子一分大黃三分為末嗅鼻第二風熱牙痛薹子白芥子八角茴香為末嗅鼻左右右左第三傷損接骨薹子一兩小黃米炒二合龍骨少許為末醋合成膏攤紙貼之第四蕓薹散薹子炒當歸肉桂赤芍為末每酒服二錢治産後惡露不下心腹刺痛甚諸方第一追氣丸薹子肉桂良薑醋丸豆大每醋下五六丸治婦人血刺小腹痛不可忍亦可常服補血破氣第二萊蔔二百二十七辛甘無毒開痰止嗽寬中下氣化食消積止渴散瘀治吞酸而止吐衄除五淋而解白濁塗打撲而敷湯火制面毒而解酒毒止噤口之下痢洗腳氣之走痛平肺痿之吐衄療煙燻之垂死萊蔔子炒研用辛甘無毒下氣定喘消痰化食利二便而除脹滿吐風痰而消腫毒止氣痛而發瘡疹平下痢而息後重食物吞酸萊蔔生食大效驗方第一反胃噎疾萊蔔蜜煎細嚼咽第二肺痿嗽血萊蔔同羊肉或鯽魚煮熟常服第三噤口痢萊蔔片不拘新舊染蜜含之味淡再換覺思食以肉煮粥與食不可過多又方只用萊蔔菜煎湯不拘新舊日日飲之第四痢後腹痛同上第五大便下血大萊蔔皮燒荷花葉燒存性生蒲黃每末服一錢湯下第六酒疾下血大者二十枚留青葉寸許井水煮爛入淡醋空心任食第七小便白濁萊蔔數枚剜孔留蓋入吳茱萸糯米飯上蒸熟焙末丸豆大每鹽湯下五十丸第八沙石諸淋痛甚萊蔔切片蜜浸少時炙乾再浸再炙不可過焦細嚼鹽湯下日三服第九遍身浮腫出子的萊蔔同浮麥煎湯服第十腳氣走痛萊蔔煎水洗之仍以干萊蔔末鋪襪內十一偏正頭痛萊蔔取汁仰臥隨左右注鼻中神效十二失音不語取萊蔔汁與薑汁同服加五味子十三滿口爛瘡取萊蔔汁頻漱吐涎十四煙燻欲死急取汁服十五湯火傷萊蔔搗敷之子亦可十六打撲血瘀未破者用萊蔔或葉搗封之十七喘嗽唾膿血以萊蔔子研細煎服十八肺痰咳嗽萊蔔子末炒沙糖合丸芡實大以綿包含咽甚妙十九齁喘痰促時發時止萊蔔子蒸熟曬乾為末再薑汁浸蒸餅丸緑豆大每三十丸口津咽下日三二十痰氣喘急萊蔔子炒皂角燒薑汁合之再煉蜜丸豆大每湯下五十丸二十一久嗽痰喘萊蔔子炒杏仁為末蒸餅丸緑豆大每五丸時時津咽二十二高年氣喘萊蔔子炒研蜜丸豆大每湯下五十丸二十三宣吐風痰萊蔔子為末溫水服三錢探吐二十四小兒風寒萊蔔子生研為末一錢溫蔥酒服之取汗大效二十五風祕氣祕萊蔔子炒末擂水合皂角末二錢服立通二十六氣脹氣蠱萊蔔子研末以水濾汁浸浸以時久炒乾再浸再炒凡七次為末每米飲下一錢神效二十七疹痘不出萊蔔子生研末米飲下二錢二十八生薑二百二十八去皮則熱留皮則冷秦椒為使惡黃芩黃連天鼠屎辛微溫無毒入足陽明太陰厥陰手太陰經散寒發表止嘔開痰解鬱行血除嗽下氣除鼻塞頭痛之風寒下胸壅脅滿之結實佐明膠熬貼風濕痛痹同半夏煎下心腹急痛並茶葉療諸痢赤白兼童便治諸中卒暴通神明而除穢惡療狐臭而搽凍耳醫腹痛而平霍亂散水氣而消脹滿薑皮辛涼和脾行水治浮腫脹滿諸痢赤白同茶葉水煎任意呷之熱痢留薑皮冷痢去薑皮驗方第一一切諸中卒暴取汁用童尿服即蘇第二瘧疾寒熱薑四兩取汁露一宿發日五更面北立飲未止更作第三寒熱咳嗽初起燒薑一角含之第四小兒咳嗽生薑四兩煎水浴之第五乾嘔厥逆頻嚼之第六嘔噦心痞生薑半斤水煎半夏二兩水煎再合二湯同煎分服第七反胃虛人取汁作粥食第八霍亂轉筋入腹搗三兩入酒煎服以渣敷痛處第九胸脅滿痛生薑二斤搗渣留汁炒熱包溫患處冷再入汁炒再溫良久豁然矣第十大便不通削尖塗鹽納肛門十一冷痢不止生薑煨為末同乾薑末入白麵醋合丸水煮粥下十二濕熱發黃生薑時時周身搽之十三舌上生苔薑片時時搽之十四滿口爛瘡自然汁常漱之十五牙痛焙末與枯礬末同搽之十六閃拗手足同蔥白搗爛合面炒熱封之十七刀斧金瘡嚼敷勿動次日生肉十八腋下狐臭薑汁常敷之十九赤白癜風生薑常搽二十耳上凍瘡自然汁熬膏敷之二十一生薑瀉心湯生薑人參甘草大棗乾薑半夏黃芩黃連治心下痞硬脅下水氣腹中雷鳴下痢乾嘔食臭諸方第一生薑半夏湯生薑半夏治似喘不喘似嘔不嘔似噦不噦心中憒然無奈者第二乾薑二百二十九生逐寒而發表炮除冷而守中孕婦忌之辛溫無毒入足陽明太陰厥陰手太陰經逐寒祛濕溫經止血定嘔消痰下氣消食治內寒之腹痛療縮筋之霍亂止寒濕之嘔利回手足之厥逆薑附湯乾薑附子治汗下後晝躁夜靜脈沉無表身無大熱者諸方第一柴胡桂薑湯柴胡黃芩甘草桂枝蔞根乾薑蠣粉治汗下後胸脅滿結小便不利往來寒熱渴而頭汗出者第二薑連芩參湯乾薑黃芩人參黃連治病素寒下醫復吐下之寒格更逆吐下食入即吐者第三芫荽二百三十多食發痼疾金瘡腳氣辛溫無毒起痘疹而辟惡氣通諸竅而發痼疾疹痘不快芫荽二兩切酒煎沃之候冷口含遍噀之勿噀頭面驗方第一野芫荽塞耳塞鼻去目翳茴香二百三十一炒黃用小茴性平理氣開胃祛蠅闢臭大茴性熱多食傷目發瘡辛平無毒入足少陰腎手太陽小腸調中止痛開胃下氣理疝氣而療腰痛補命門而暖丹田脅下刺痛小茴同枳殼炒末鹽酒湯下驗方第一疝氣入腎炒尉之第二繞臍衝心小腸氣也炒末酒下或同半夏枳殼煎第三偏墜卵腫小茴三錢附子一錢木香一錢臺參一錢沒藥一錢乳香一錢水煎服加荔核第四五般噎疾小茴陳皮青皮莪朮炙草揀砂肉桂生薑炭白芷胡椒半夏阿魏辰砂醋丸豆大每嚼咽二丸醋後下有內積兼脈沉滯者宜之兼治九種心痛第五馬齒莧二百三十二馬踏菜酸寒無毒散瘀消腫利腸滑胎解毒通淋祛風殺蟲止諸痢赤白破血癖癥瘕一切惡瘡皆療諸般丹毒悉醫諸氣不調煮粥食之驗方第一筋骨疼痛馬齒莧乾鮮俱可用數斤五加皮蒼朮數兩水煎湯洗急用蔥薑搗爛沖熱湯數碗服之取汗痛立止也第二産後虛汗取汁服乾者亦可第三産後血痢腹痛便癃取汁入蜜合水煎服第四小兒血痢同上第五肛門腫痛搗煎熏洗第六赤白帶下馬齒莧取汁雞子白二枚先溫令熱乃下莧汁微溫頓飲之不止再作第七腹中白蟲水煮馬齒莧一碗入鹽醋空腹食之白蟲盡出也第八風牙腫痛嚼汁漬之即日消腫第九耳內外惡瘡頭瘡黃水瘡同黃柏為末敷之第十小兒臍瘡久不瘥者燒末敷之十一疔瘡腫毒同石灰為末雞子清合敷十二瘡久不瘥積年者搗封之取汁煎稠亦可敷十三毛蟲螫人赤痛搗封之十四馬莧膏蒲公英二百三十三波波丁甘平無毒足少陰藥也乳癰紅腫同淨花搗爛水煎服兼外敷亦良驗方第一多年惡瘡搗敷第二蛇傷腫毒同上第三山藥二百三十四薯蕷甘平無毒入手足太陰補中益氣助腎強陰聰耳明目鎮心安神健脾立胃止腰痛而補心神除瀉痢而化痰涎長肌肉而強筋骨除泄精而起健忘甚塗癰瘡最消腫硬下痢噤口半生半炒為末每米飲下二錢驗方第一腫毒初起鮮山藥萆麻子糯米水研敷之第二項後結核或毒腫硬痛同萆麻子研貼之第三手足凍瘡磨泥敷之第四無比山藥丸百合二百三十五甘平無毒清熱止嗽潤肺寧心利二便而除浮腫止涕淚而消痞滿治傷寒之百合療脅乳之癰腫最除邪魅亦解癲驚百合病者百脈一宗悉致其病也欲食不食欲臥不臥欲行不行如寒不寒如熱不熱口苦溺赤得藥則劇如有神靈者心常默然六脈微數處處有之根如大蒜味甘美可食又有二種與百合相似其根味頗苦不堪入藥蓋葉短而闊微似竹葉白花四垂者百合也葉長而狹尖如柳葉紅花不四垂者山丹也俗名紅合葉似山丹而大紅花帶黃四垂上有黑斑點子先結在枝葉間者卷丹也俗名倒垂蓮百合變熱同南滑末服驗方第一百合變渴煎百合湯浴之第二百合腹滿炒末水服第三肺病吐血煮食第四肺癰煩嗽蜜合蒸軟時時含一片咽津第五百合知母湯百合知母水煎服治百合病發汗後者諸方第一滑石代赭湯百合滑石代赭石煎服治百合病下之後者第二百合地黃湯百合生地水煎服百合病不經吐下者第三黃茄根及莖葉二百三十六甘寒無毒散瘀消腫洗凍瘡皴裂治血淋血痢黃茄子甘寒無毒散血止痛腸風下血經霜茄子燒末每酒下二錢驗方第一久患下血老茄子三枚濕紙包煨熟以酒沃之封閉三日取飲第二磕撲青腫切片煨末酒下二錢神效第三熱毒瘡腫用一枚切去二分去瓤二分似罐子形合瘡上即消也如已生膿再用取瘥第四蟲牙痛燒末搽之第五一切牙痛茄花干之燒末敷之立止第六血淋痛陳茄葉為末每酒下二錢第七腸風下血同上米飲下第八久痢不止茄根燒末榴皮為末沙糖水下第九牙痛取牙茄科以馬尿浸三日曬炒為末用藥點牙即落第十夏月趾腫不能行茄根日日煎洗十一苦瓠子瓤二百三十七苦寒有小毒逐水通尿消水腫浮腫療鼻塞黃疸消諸癰疽兼療惡瘡黃疸腫滿取瓤如棗許以童尿浸一時取酸棗大納兩鼻中深吸氣黃水出愈驗方第一急黃病苦瓠一枚開孔以水煮之攪取汁滴入鼻取黃水愈第二水腫腹滿頭面洪大取瓤捻丸如豆大以麵包煮一沸空心服七枚午時當出水忌咸物百日又方取瓤炒末每日粥服第三通身水腫取瓤膜炒二兩葶藶子五分搗丸豆大每五丸日三又同大棗丸服每三丸又小鮮瓠擰子水煎發汗第四石水腹腫四肢瘦同杏仁炒丸豆大每十丸日三第五水蠱洪腫用瓤一枚水煎至可丸如豆大每米飲下十丸第六尿閉腫急用子三十粒土狗三個炒末冷水下第七風痰頭痛取膜汁以葦管灌鼻氣衝腦門出惡涎即愈乾者浸汁亦效以子為末吹入亦效第八赤崩白崩陳瓢蓮房同炒末每水下二錢第九湯火傷陳瓢燒灰敷之第十冬瓜二百三十八甘寒無毒利小便而止渴消腫脹而逐水除心胸煩熱解熱毒癰腫冬瓜甘平無毒澤面除皯潤肌耐飢祛煩解憂補肝明目消渴不止冬瓜一枚燒熟絞汁飲之驗方第一諸般渴痢肢腫口燥泥包煨熟取汁服第二小兒渴痢冬瓜取汁服第三一切水氣腫喘冬瓜一枚去瓤以赤小豆填滿泥紙固濟糯粳粳煨熟取出焙末丸服瓜子湯下第四水病危急冬瓜任意生食之神效第五發背欲死冬瓜截去頭合瘡上瓜爛再截去更合之瓜未盡瘡已小愈矣乃用膏貼之第六痔瘡腫痛冬瓜煎湯洗之第七面黑令白冬瓜一枚竹刀去皮切片酒水煮爛去渣熬成膏以瓶收之每夜塗之第八明目悅顏瓜仁淨仁丸服第九男子白濁瓜子仁炒末每米飲服五錢第十白帶同上十一黃瓜甘寒有小毒清熱解渴利水發瘡小兒熱痢嫩黃瓜同蜜食之驗方第一水病肚脹肢腫黃瓜一枚切開連子入醋煮一半至爛空心兩半俱食之第二絲瓜二百三十九霜後者佳絲瓜子最瀉大便甘平無毒涼血解毒祛風化痰下乳消腫發痘退熱痘出不快老絲瓜燒末砂糖水下驗方第一癰疽不斂搗取汁頻塗之第二肺熱面瘡同皂角燒末油合敷第三玉莖瘡潰取汁同五倍子末搽之第四手足凍瘡燒末同豬脂合敷第五腸風下血霜後乾絲瓜燒末酒服第六下血危篤燒同槐花共末每米飲下二錢第七酒痢膿血燒末酒下第八崩血不止同棕燒末鹽酒下第九乳脹不通燒末酒下出汗第十腹痛繞臍衝心小腸氣也燒末酒下十一腰痛不止用子仁燒末酒下以渣敷之又取根燒末酒下十二化痰止嗽燒末棗肉丸彈大每酒下一丸十三風蟲牙痛霜絲瓜燒末搽之十四小兒浮腫同燈草蔥白煎服煎洗之十五偏墜絲瓜葉雞子殼共燒末酒下十六刀瘡神藥古石灰新石灰絲瓜根葉韭菜根等分搗千下作餅陰乾為末搽之止血定痛生肌如神十七鼻流臭黃絲瓜藤燒末酒下十八甘李根白皮二百四十取東行者去外皮炙黃用種類甚多大寒無毒入足厥陰肝經下肝氣之奔沖清風木之鬱熱止消渴而除煩逆斷痢疾而收帶下奔豚湯甘草半夏生薑生葛川芎當歸白芍李根白皮黃芩治奔豚上衝胸腹痛往來寒熱諸方第一杏仁二百四十一湯浸去皮尖炒黃用去雙仁者惡黃芩黃耆葛根治風寒亦有連皮尖用者取其發散甘苦溫有小毒入手太陰肺止嗽下氣清肺除熱潤腸散結殺蟲療瘡去頭面之風邪利胸膈之氣逆止心下之痛煩平肺逆之喘急奔豚驚癇悉療金瘡腳氣亦治咳逆上氣炒研入蜜熬膏食前含化驗方第一咳嗽寒熱脈弦緊用童尿浸數日研膏再入童尿煎膏服第二頭面風腫搗膏同雞子黃敷帛上厚裹之干再上七次愈第三小兒冬日寒嗽杏仁蘇葉水煎第四巴旦杏仁甘平無毒止嗽下氣消心腹逆悶茯苓杏仁甘草湯茯苓杏仁甘草治胸痹塞短氣諸方第一烏梅二百四十二去核炒用酸澀微寒無毒入足厥陰肝下氣退熱除嘔殺蛔止燥渴而泄煩滿平久嗽而住渴痢清痰涎而消腫痛蝕惡肉而點黑痣收二便之下血除偏風之不仁松霍亂之轉筋開痰厥之牙關生漢中川穀五月採實襄漢川蜀江湖淮嶺皆有之樹葉皆似杏採梅實半黃者以煙燻之為烏梅取青大者以鹽汁漬之日曬夜漬十日則成白梅主治略同諸瘡胬肉烏梅肉燒末敷之驗方第一渴痢水煎代茶飲第二痢膿血淨肉燒末每米湯下二錢第三久痢不止淨肉二十枚水煎服第四大便血淨肉三兩燒末醋煎米湯丸服第五小便尿血同上第六崩血不止淨肉燒末米飲下第七蛔蟲上行出口鼻煎湯服且含之第八心腹脹痛短氣欲絶淨肉二七枚煎沸納銅錢二七枚煎服第九久嗽不已淨肉炒蜜粟殼同炒末蜜湯下第十金瘡折傷燒末敷之白者亦可十一白梅同用烏梅丸烏梅人參細辛桂枝附子黃柏當歸川椒黃連乾薑治厥陰病氣上衝胸心痛熱消渴食即煩生而吐蛔諸方第一桃仁二百四十三去雙仁者行血祛瘀宜連皮尖生用活血潤燥宜去皮尖炒用甘苦辛平無毒入厥陰肝破血行瘀除症消瘕通經潤燥止咳下氣治心腹之疼痛開心下之堅硬療陰中之腫癢殺下部之蟲𧈟斷婦人之崩漏縮小兒之卵㿗産後百病制桃仁一千二百粒熬搗細入酒研如粥納瓶中封固入湯中煮一伏時每酒下一兩良驗方第一唇乾裂痛搗合豬脂敷第二蟲風牙痛針刺一枚燈上燒煙出吹滅安疼上咬五六次愈矣第三婦人陰腫燒末敷之第四婦人陰癢杵爛綿包塞之第五男子陰腫且癢炒末酒下仍外敷之第六小兒卵㿗同上第七人好魘寐桃仁熬去皮尖三七枚以小便服之第八桃仁承氣湯桃仁甘草桂枝大黃芒硝治少腹急結其人如狂諸方第一桃奴桃子乾者懸在樹不落者是也苦微有小毒心下結氣不散此伏梁也用二兩為末空心酒下二錢驗方第一鬼瘧寒熱桃奴十四枚為末水丸豆大硃砂為衣每平旦面東井水下一丸第二五般瘧疾桃奴十四枚巴豆七粒黑豆一兩為末水丸豆大硃砂為衣發日五更念藥王菩薩七遍井水下一丸立瘥不過二次妙第三妊娠下血不止燒末水下第四食桃成病同上取吐第五大便難桃花為末水酒下立通第六瘧疾不已同上第七心腹結痛同上第八女人陰瘡如蟲食癢痛桃葉搗綿包納之日三易第九鼻中生瘡桃葉嫩心杵爛塞之無葉用枝第十身面生癬日午取桃葉取汁搽之十一猝得心痛東引桃枝酒煎服大效或沖桃奴服尤良十二喉痹塞痛搗桃白皮服十三石淋疼痛桃膠每水下如棗大一角十四血淋痛桃膠同木香煎服十五栗二百四十四甘溫無毒益氣厚腸補腎耐飢治腰腳不遂療筋骨斷碎嚼塗腫痛兼敷血瘀小兒疳瘡生嚼敷之驗方第一葦刺入肉同上第二馬咬成瘡燒研敷之第三小兒口瘡煮熟常食第四金刃斧傷研敷或嚼敷第五骨鯁在咽栗內薄皮燒末吹入第六大棗二百四十五去核甘平微苦酸無毒入脾胃二經養脾開胃生津潤肺補中益氣堅志強力和百藥而通九竅除煩悶而療腸癖滋血脈而治風燥和陰陽而調榮衛反胃吐食大者一枚去核入斑蝥一個去頭翅煨熟去斑蝥食之白湯下驗方第一小腸氣痛同上第二大棗湯大棗小麥甘草治婦人悲傷欲哭數欠伸如有神靈大梨二百四十六甘微酸寒無毒潤肺涼心消痰止嗽除胸塞結熱解心煩氣喘療瘡毒酒毒貼湯傷火傷暗風不語之疾二便不利之疴不可多食痰喘氣急大梨剜孔入小黑豆煨熟搗餅日日食之驗方第一暗風不語取汁服之第二小兒風熱昏悶煎湯入大米作粥食第三反胃吐食藥物不入大者一個丁香十五枚刺入煨熟食之第四食梨過傷梨葉煎服第五胸滿氣促氣從臍左右上衝鬱冒而厥者梨木灰雞卵殼中白皮紫菀麻黃或丸或末或湯俱可第六結氣咳逆同上第七霍亂吐瀉梨葉煎服第八小兒寒疝腹痛梨葉煎服第九木瓜二百四十七酸溫澀無毒入脾肺肝腎止轉筋而平霍亂退腳氣而消水腫除嘔瀉而卻冷氣治脹痛而強筋骨助腰腎腳膝之無力去濕痹煩痞之有餘處處有之腳氣急痛炙木瓜踏之驗方第一腳筋攣急酒水煮爛搗貼之冷再易第二臍下絞痛同桑葉大棗煎服第三霍亂轉筋煎服酒水皆可第四霍亂腹痛同桑葉大棗煎服第五虎骨丸木瓜一斤天麻一斤蓯蓉一斤牛膝一斤附子一兩虎骨一兩酒丸豆大每五十丸鹽湯下治兩腳痿廢不行諸方第一楂肉二百四十八酸甘無毒健胃補脾消食活血除血塊氣塊滯血痛脹解食積肉積痰飲痞滿洗頭身之瘡癢解産後之兒枕止小腸之疝痛發小兒之痘疹卻水痢而療吞酸浴漆瘡而治腰痛産後兒枕痛惡露不盡也同糖服之立效驗方第一偏墜同茴香丸服第二痘疹不快水煎服立出紅活第三痘疹乾黑為末酒下紫草湯煎第四食肉不化四兩煮食煎飲汁第五腸風下血寒熱攻補諸藥不效為末艾葉湯下第六瀉痢臍上痛楂肉一兩焙末白麵一把炒熟分數服痢紅用紅糖水痢白用白糖水第七柿餅二百四十九甘澀平無毒澀腸開胃消痰止渴止血殺蟲退熱解毒消腹中宿血吐血咯血止痔漏下血腸澼血淋潤心肺而療肺痿治反胃而解咳嗽柿霜生津止渴化痰寧嗽清上焦心肺之邪熱治咽喉口舌之瘡痛熱厄熱渴脈數半夏麥冬黃芩炒梔柴胡小茴柿蒂木香竹茹揀砂甘草心熱甚加黃連驗方第一冷厄病久肢冷柿蒂公丁半夏小茴陳皮良薑荔核此症百死一生第二腸風下血柿餅為末為丸俱可服之第三血淋柿餅燒末飲之第四熱淋澀痛同上加燈心服第五小兒秋痢大米煮粥熟時入柿餅細末再煮三沸食之第六反胃吐食乾柿三枚搗爛酒服勿雜他藥第七痰喘帶血大柿餅飯上蒸熟批開每一枚入真青黛一錢臥時食之薄荷湯下第八産後咳逆氣亂心煩柿餅切水煎細呷第九鼻窒不通同大米煮粥日日食之第十耳聾鼻塞同上十一臁脛爛瘡柿霜柿蒂燒研敷之甚效十二解桐油毒柿餅食之十三厄逆不止柿蒂丁香生薑水煎服十四酸榴皮根葉二百五十酸溫無毒止瀉痢下血除崩中帶下祛筋骨之風濕除腰腳之痿痹澀精泄而收目淚下蛔蟲而解筋攣赤白痢下腹痛食不化者炙末棗肉丸服燒末米飲下亦良驗方第一糞前有血炒末每服二錢第二腸滑久痢全石榴一枚燒末另以石榴一瓣煎湯下第三小兒風癇大榴一枚去頂剜空入全蠍五枚黃泥固濟煅之為末每半錢乳汁下或防風湯下第四腳肚生瘡癢痛黃水用皮煎湯日日掃之第五蛔蟲東行根水煎服第六經閉方同上不通再服嗽而脈甚數者不用第七赤白痢同上第八金蠶蠱毒吮白礬味甘食黑豆不腥是也方同上第九金瘡出血榴花石灰等分搗合陰乾為末敷之第十橘皮二百五十一色紅陳久者佳去白為橘紅去白消痰留白和中苦辛溫無毒化痰治嗽順氣理中調脾快膈止嘔降沖利水消穀通淋潤腸療霍亂吐瀉除嘈雜吐青破癥瘕痃癖解魚腥肉腐入食料最宜殺寸白亦良橘皮細紋紅色皮薄而多筋其味苦辛若紋粗色黃皮厚內多白膜無筋味甘辛者柑皮也紋極粗色黃內多膜無筋皮極厚味甘多辛少者柚皮也今天下多以柑皮雜之柑皮猶可柚皮則懸絶矣去淨內白名橘紅專於消痰下氣生江南十月採嘈雜吐水真橘皮為末五更安五分掌內以舌舐之即睡三日必效驗方第一霍亂吐瀉但有一點胃氣存者服之再生真橘皮五錢真藿香五錢時時煎服第二反胃吐食真橘紅西壁土炒同薑棗煎服第三猝然噎食炒末煎服第四痰膈氣脹水煎服第五積年氣嗽同神麯生薑蒸餅丸服第六腳氣衝心心下結硬佐杏仁蜜丸服第七老人氣祕同上第八風痰麻木濕痰死血為患也橘紅一斤水煎爛去渣再煎頓服取吐第九潤下丸橘皮半斤鹽水淹過煮乾炙草二兩蒸丸豆大每百丸治痰停胸膈咳唾稠黏諸方第一寬中丸陳皮四兩白朮二兩酒丸服治脹滿壅塞不通第二二賢散橘紅一斤陳皮亦可甘草四兩食鹽五錢水煮爛曬乾為末白湯下治積塊進飲食有塊加薑黃氣滯加香附噤口加蓮肉第三青皮去瓤醋炒用苦辛溫無毒入肝膽經下滯氣而消食破堅癖而祛脹治兩脅之郁痛降胸膈之氣逆疏肝膽而除疝氣瀉肺氣而平乳癰乃橘之未黃而青色者薄而光其氣芳烈今人多以小柑小柚小橙偽為之不可不知橘核仁苦平無毒消陰卵之腫痛除小腸之疝氣止腎疰之腰痛療酒皶之風鼻脹飽青皮三臺參二麥芽三陳皮三查肉三水煎驗方第一枇杷葉二百五十二以粟稈作刷刷淨毛用治胃病薑炙治肺病蜜炙苦平甘辛無毒下逆氣而止嘔噦除熱嗽而解暑毒退胸面之風瘡解腳氣之腫痛襄漢吳蜀閩嶺江西湖南皆有之木高丈餘肥枝長葉大如驢耳盛冬開白花四月成實大者如雞子小者如龍眼白果二百五十三銀杏甘苦辛澀無毒熟食益人溫肺益氣定喘止嗽縮小便而止白濁生食引疳降痰解酒消毒殺蟲塗皴皯而敷癬疳哮喘痰嗽白果一個麻黃二錢炙草二錢水煎臥時服驗方第一小便數十四個七生七煨食之第二白濁白果仁十個擂水服日一次第三腸風下血煨熟食之第四手足皴裂嚼爛每夜敷之第五癬瘡切斷頻搽之第六下疳瘡杵塗之第七陰毛生蝨嚼敷之第八狗咬成瘡嚼敷之又嚼爛杏仁塗之又洗淨熱牛糞封之痛止又瓦屋上刮下青苔敷之又瘡愈復發者蔓荊根搗汁服之又重發者化黃蠟滴入瘡中第九胡桃肉二百五十四甘溫無毒補氣養血潤燥化痰除腰腳之虛痛定心腹之疝痛療虛寒之喘嗽止血痢而解腸風散腫毒而發痘瘡有火者勿服發熱頭痛無汗同蔥白紅茶生薑水煎服出汗驗方第一老人喘嗽同杏仁生薑研膏煉蜜丸彈子大臥時服一丸薑水下第二久嗽不止同人參杏仁蜜丸彈大服第三食物醋心爛嚼薑湯下立止第四誤吞銅錢多食之良第五小腸氣痛胡桃肉一枚燒炭末酒下第六便毒初起胡桃肉燒末酒下三錢見效又胡桃用二個夾銅錢食之第七一切癰腫初起胡桃十個煨熟去殼槐花一兩炒末溫酒調服第八疔瘡惡腫平破取仁嚼爛再安殼內合在瘡上頻易甚效第九荔枝核二百五十五近世多用此偽麝香不可不知甘溫澀無毒入厥陰經治男子㿗疝之腫大療婦人血氣之刺痛止心脾之疼痛除小腸之疝氣閩蜀二處皆有之以閩中者為勝木高二三丈類桂木冬青緑色蓬蓬然四時不凋其木性至堅硬腎囊腫大燒研酒服或加青皮茴香驗方第一心脾痛為末醋下第二小腸疝氣荔枝小茴枳殼半夏木香少許第三龍眼肉二百五十六元肉甘平無毒開胃益脾補虛長智蜀閩二處出荔枝處皆有之樹似荔枝葉如林檎凌冬不凋夏開細白花七月實熟橄欖二百五十七酸甘溫無毒開胃下氣生津止渴除瀉消酒治咽喉之痛解魚鱉之毒生閩廣及緣海諸處木高丈餘葉似櫸柳二月開花八月成實狀如長棗熟時以木釘釘之或納鹽少許於皮內其實一宿自落檳榔二百五十八苦辛溫澀無毒降氣消穀逐水豁痰生肌止痛除煩破症療腳氣之脹滿治瀉痢之後重解二便之氣祕除腫脹之氣水殺寸白而逐三蟲療諸瘧而御瘴癘下一切氣除諸般風大腹子治同嶺南交廣諸處皆有之木高五七丈正直無枝皮似青桐節似桂枝葉生木端似芭蕉葉其實作房自葉中出旁有刺如棘針一房數百實皆有皮殼痰涎為害末服之驗方第一嘔吐痰水同陳皮服第二醋心吐水方同上蜜湯下第三傷寒痞滿同枳實為末黃連湯下第四傷寒結胸酒煎服第五蛔厥腹痛同上腹痛脈浮洪是蟲痛也第六寸白蟲病末服之第七大腹皮黑豆水洗曬乾入灰火燒煨切用大腹子皮也辛微溫無毒解水氣之浮腫除諸氣之上攻止霍亂而通二腸理腳氣而消痞滿出嶺表滇南與檳榔相似是檳榔中之一種但小異耳彼處通呼檳榔今所用即檳榔皮也川椒紅二百五十九去閉口者辛溫有毒入手足太陰右腎命門溫中散寒祛風除濕下氣逐水消食除痹止寒嗽而療久痢消水腫而破癥結解蠱毒而殺蛔蟲止咳逆而除腹痛療腰腳之痿痹治精溺之滑數除産後之宿血止歷節之風痛堅齒髮而明目下乳汁而滅瘢花椒紅治同即近時花椒蜀川者勝椒目苦辛有小毒治水腫而利小便止崩帶而除氣喘手足心腫風也花椒食鹽為末醋合敷驗方第一風牙痛花椒醋煎含漱第二囊癢同蔥頭煎洗之第三水氣腫滿杵研酒下第四崩中帶下同上第五痞滿腫痛同上水下第六胡椒二百六十辛大溫無毒溫中下氣祛痰除濕止心腹之寒痛暖腸胃之冷痢解齒痛之浮熱除胃寒之吐逆消宿食而止霍亂破冷積而消陰毒殺一切魚肉毒解諸般風冷氣畢澄茄主治略同一類二種耳胡椒生西戎今南番諸國及交趾滇南諸地皆有之蔓生附樹葉如扁豆山藥正月開黃白花結椒纍纍纏藤而生心腹冷痛一歲一粒酒下驗方第一心下大痛同乳香薑水下第二虛寒反胃醋丸服第三發散寒邪同丁香為末蔥白搗合敷兩手心合掌握定夾大腿內側發汗第四風蟲牙痛同緑豆搗碎綿包咬痛處第五吳茱萸二百六十一湯浸炒用蓼實為使惡丹參硝石白堊畏紫石英辛溫有小毒入足陽明太陰少陰厥陰經溫中下氣止痛除濕開鬱化滯祛痹殺蟲止心腹之冷痛除腰腳之痿弱住胃冷之吐瀉解遍身之痹痛下産後之餘血退心中之吞酸平轉筋而療腳氣消水腫而除疝氣腸風痔血最靈舌苦口瘡亦效咽膈不通之疾胸脅痞滿之疴生上谷冤句九月採實今處處有之木高丈餘葉似椿而闊厚紫色三月開紅紫細花七八月結實於梢頭似椒子酸心上攻水煎服或嚼數粒大效驗方第一轉筋入腹酒煎服第二霍亂乾嘔水煎服第三赤白痢下同黃連丸服第四腹中症塊搗末酒煮布包尉之更番消乃止第五小兒口瘡醋合敷足心第六咽痛同上第七陰下濕癢水煎洗之第八吳茱萸湯吳茱萸生薑人參大棗治食谷欲嘔諸方第一當歸四逆加茱萸薑湯當歸白芍桂枝通草細辛甘草大棗吳茱萸生薑酒水煎服治手足厥冷脈微欲絶內有久寒者第二溫經湯當歸阿膠白芍川芎桂枝丹皮人參甘草乾薑半夏麥冬吳茱萸水煎服治婦人帶下下痢不止暮即發熱腹滿裡急掌熱口乾第三茶葉二百六十二茗五月採葉苦甘微寒無毒入手足厥陰利小便而下痰熱止燥渴而消酒食清頭目而醒眠睡止瀉痢而解熱毒熱毒下痢赤白好茶一斤炙搗末煎服亦治久痢又赤痢蜜水下白痢薑水下又同烏梅丸服又醋煎熱服驗方第一腳丫濕爛嚼敷之第二霍亂煩悶為末煎水調幹薑末服第三月水不通茶清一瓶入沙糖少許露一夜服雖三個月亦通不可輕視第四腰痛難移煎茶五合同醋二合服之第五瓜蒂二百六十三吐人苦寒有毒逐水滌痰湧腐吐濁除水腫黃疸蕩宿食停飲止嗽逆齁喘通腦悶鼻齁風眩頭痛痰涎喉痹一切癲癇諸般蠱脹齁喘痰氣瓜蒂三枚為末水下吐痰即止驗方第一十種蠱氣為末棗肉為丸每三十丸棗湯下第二急黃喘息胸中堅欲飲者同赤小豆為末水下取吐不吐再服吹鼻取吐亦可第三遍身如金瓜蒂四十九枚丁香四十九枚燒末吹鼻取黃水出第四身面浮腫同上第五瓜蒂散瓜蒂赤小豆等分為散香豉湯下取吐治病如桂枝症頭不痛寸脈微浮心中痞硬氣衝咽喉不得息者又治胸中煩躁飢不得食厥逆脈緊者又治宿食在上膈者諸方第一西瓜二百六十四甘寒無毒消煩止渴解暑退熱寬中下氣利水解酒治血痢療喉痹不可多食閃挫腰痛西瓜青皮陰乾為末鹽酒下三錢驗方第一食瓜過傷瓜皮煎湯解之諸瓜皆然第二葡萄二百六十五甘酸澀平無毒逐水利尿益氣治淋除筋骨濕痹起痘瘡陷沒根及藤葉止嘔噦而除惡心利小便而消腫滿洗腰腿之疼痛安胎孕之逆沖胎氣衝心葡萄煎服藤根亦可驗方第一除煩止渴葡萄取汁熬稠入蜜少許點服第二紅糖二百六十六甘咸無毒和中助脾緩肝潤腸除心腹緊張卻心腹燥熱口乾必用酒毒亦解白糖略同多食助熱損齒生蟲下痢噤口白糖半斤烏梅一個水煎時時服之驗方第一腹中緊張白糖酒煎再服愈也第二痘不落痂紅糖調新汲水下白糖亦可第三喘嗽煩熱紅糖同薑汁合服白糖亦佳第四冰糖二百六十七多食助熱損齒生蟲甘冷無毒消痰止嗽緩肝助脾解渴生津明目解酒除心腹熱脹潤心肺燥熱蓮肉二百六十八蒸去皮心即蓮蓬殼內子也今藥肆一種石蓮子形極大不知何物也甘澀微寒無毒補中益氣解渴除熱清心止痢固精強筋交心腎而厚腸胃補虛損而利耳目療男女赤白濁帶達君相上下火邪蓮鬚清心固精益血止血蓮殼止一切下血噤口久痢蓮肉炒末每服二錢陳米湯下數劑則思食矣驗方第一脾瀉腸滑同上第二赤濁蓮肉六兩炙草一兩為末每一錢燈心湯下第三遺精同龍骨益智末服米湯下第四噦逆不止炒末陰陽水下即止第五反胃吐食為末入少肉蔻末米湯下第六諸般崩漏便溺諸血蓮蓬殼燒末或酒或水下第七藕節二百六十九澀平無毒止諸般血逆吐血衄血咳血除一切血瘀溺血淋血痢血崩血藕根甘平無毒除煩熱燥渴療金瘡折傷散留血瘀血解蟹毒酒毒生肌肉而止疼痛治霍亂而平嘔瀉一切吐衄下血藕根數兩取汁服煎服丸服俱可驗方第一一切煩渴燥干生藕取汁服第二荷葉二百七十止諸般吐衄下血除一切陽水浮腫産後惡血損傷敗血消癰腫而發痘瘡止乾渴而下胞衣産後心痛荷葉炒末或湯或童尿服或燒灰或煎汁皆可驗方第一胎衣不下同上第二胎動見黃水炙末糯米泔水下第三陽水浮腫焙乾米飲下每二錢日三第四腳膝浮腫荷葉心同藁本煎洗之第五痘瘡黑陷同殭蠶末服酒荽湯皆可第六吐血不止焙末擂汁煎丸皆可第七吐血咯血同上又同蒲黃服麥冬湯下第八崩血同蒲黃黃芩末酒下第九血痢不止荷葉蒂水煎服第十下痢赤白焙研每二錢紅痢蜜下白痢白糖下第十一芡實二百七十一蒸熟取仁用入澀精藥連殼亦可甘澀無毒補精強志聰耳明目退腰膝痹痛收小便遺數澀遺精而止帶除白濁而益腎處處有之苗生水中葉大如荷皺而有刺花子若拳大形似雞頭實若石榴皮青黑而肉白也柏子仁二百七十二蒸熟曝烈舂簸取仁炒研用畏菊花甘平無毒養心神而潤腎安魂魄而益智療驚癇而除風濕息頭風而暖腰冷益血止汗聰耳明目興陽補虛驅邪潤肝最潤肌發亦治癢癬側柏葉二百七十三或生或炒苦辛澀平無毒吐血衄血痢血溺血赤白崩中風冷歷節敷湯火而止痛解蠱痢而殺蟲滅瘢痕而生肌潤鬢髮而黑頭頭髮黃赤生柏葉為末一升豬膏一斤合丸彈大每布裹一丸納泔汁中化開沐頭一月色黑而潤驗方第一頭髮不生柏葉為末香油合敷第二湯火傷生搗敷之三二日止痛滅瘢第三月水不斷同白芍炙末每酒下三錢室女同木賊炒末服米飲下第四蠱痢下黑血大腹或膿血如澱色焙末與黃連煎服第五酒毒下血同槐花蜜丸服第六尿血同黃連為末酒下第七憂恚嘔血為末米湯下第八吐血不止同上或蜜丸或水煎第九霍亂轉筋搗敷腳上煎汁淋之第十柏葉湯柏葉乾薑阿膠水煎去渣再入馬通汁頓服治吐血不止諸方第一松香二百七十四苦甘平無毒療一切癰疽惡瘡除諸般膿血死肌生肌止痛排膿抽風強筋骨而利耳目潤心肺而止崩帶除咽乾而解消渴療白禿而平疥瘙塞牙孔而殺蟲除伏熱而清胃一切腫毒松香八兩銅緑二錢萆麻子五錢同搗膏貼甚妙驗方第一小兒禿瘡松香五錢豬脂油一兩熬搽一日搽數次數日愈第二小金絲膏松香白膠香各二兩沒藥一兩乳香二錢黃蠟三錢香油三兩熬至滴水不散治一切瘡癤腫毒諸方第一千捶膏木鱉五個去殼松香四兩銅緑一錢研乳香三錢沒藥二錢萆麻子七錢去殼巴肉五粒杏仁一錢石臼內搗三千餘下即成膏瘡瘍疔毒初起貼之即消貼瘰癧連根拔出第二松節二百七十五苦溫無毒治歷節風痛療腳弱痛痹燥血中之濕寒漱風蛀之牙痛一切筋痛松節一兩乳香一錢細火炒焦為末每木瓜酒下一二錢驗方第一歷節風痛松節三斤酒浸服又方松毛搗汁酒浸七日服第二肉桂二百七十六去外粗皮用厚而極辛者甘辛大熱有小毒溫中行血益火消陰斂汗止痛除煩墜胎生南海合浦交趾桂陽等處此有數種葉長如枇杷堅硬有毛及鋸齒其花白色其皮多脂者牡桂也葉如柿葉而尖狹光淨有三縱紋而無鋸齒花有黃有白其皮薄而卷者菌桂也即筒桂今商人所貨皆此二種但以卷者為菌桂平卷及板者為牡桂又有以丹陽木皮偽充桂者不可不知桂心肉桂去內外皮即肉桂心也苦辛無毒療一切風氣除九種心痛暖腰膝而治腳痹利骨節而舒筋攣消瘀血而破症癖通月經而下胞衣桂枝二百七十七辛溫無毒入足厥陰太陽膀胱經開腠理而解肌通經絡而斂汗去皮膚之風濕止上氣之咳逆散下焦之蓄血退手臂之風痛能止奔豚更除氣結九種心痛桂心為末每酒下二錢桂枝亦可驗方第一心腹脹痛氣短肉桂二兩水煎分服第二心痛厥逆桂心末每酒下一錢第三産後心痛症痛桂末酒下第四桂枝湯桂枝白芍甘草大棗生薑治頭痛發熱汗出脈緩諸方第一桂枝人參湯桂枝人參炙草白朮乾薑治因數下後下利心下痞硬第二桂枝甘草湯桂枝甘草治發汗過多叉手自冒心心下悸欲得按者第三柴胡桂枝湯柴胡黃芩半夏甘草白芍桂枝生薑大棗治心下支結微嘔肢節煩痛又治心腹猝痛第四桂甘麻附湯桂枝甘草麻黃附子細辛生薑大棗治心下堅如盤症脈虛者第五桂枝茯苓丸桂枝白芍丹皮桃仁茯苓治妊娠宿有症病胎動漏血第六桂芍知母湯桂枝白朮知母防風白芍生薑麻黃甘草附子治肢節疼痛腳腫頭眩欲吐第七沉香二百七十八沉水下者上半沉者次之磨汁用或研粉干之辛苦微溫無毒下氣補腎益精壯陽除惡氣而定霍亂暖腰膝而止轉筋解麻痹而卻瘙癢破症癖而住吐瀉生天竺國皮青色葉似橘經冬不凋海南交廣亦有之有青桂雞骨馬蹄煎香等異大抵其木沉水者為真今藥肆所用盡偽也
