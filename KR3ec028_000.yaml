body:
  text: 附記治老人眼疾青盲昏花等屬內障蟹睛旋螺厚翳胬肉攀睛等屬外障初發紅腫疼痛不已宜除風散熱之劑若日久不痛又非此法所能治也若日久成外障厚翳蟹睛等症內障青盲等症宜用開竅滋肝補腎引神為主宜先用開竅菖蒲君穀精臣枸杞佐甘菊使有火加元參水煎食後服日二次藥均用酒洗內服五六劑外用熏洗之法開其竅石菖蒲錦地草水煎熏洗四五日繼服稠枸杞粥芡實七錢枸杞三錢大米半碗先燒水滾下芡實次下枸杞晚下大米煮爛空腹食之以養胃氣服十四日次用補腎劑猔豬肝一具不用水洗竹刀切片穀精二兩枸杞七錢菊花一兩均酒洗秋石三錢有紅絲加元參如紅絲雲翳不退加川椒四十九粒用瓷器一個一層肝一層藥三四層入黃酒三盅封固不透氣重湯煮去藥存肝日食三四次若氣血大虛者加八物湯同煮食肝三四具若數年不通道路者尚隱隱見燈火日月同地黃丸料加枸杞全歸牛膝菊花同煮如仍不見明是氣不行血用十全大補湯同煮目中有翳其目不癢用菊花菖蒲生礬煎湯浸青絹搽之若雲翳自根而退必待目中神光外射方退雲翳久閉覆神光必引而出之宜用引神丹穀精菖蒲君枸杞臣草決明佐元參蟬皮使木賊草河水煎湯納瓷器中封固重湯煮黏為度入京墨末白礬末調勻曬乾再研廣膠水些須作錠子人乳磨點一日三四次大約墨一頂白礬一分若目內雲翳退時必有熱氣再用生白礬三分雪梨一枚去皮核先以礬研細入梨片內共研絹濾過成汁加淨蜜些須攪勻封固重湯煮待冷掃眼皮內外一日五七次原方盡止避生客戒有語絶嗜欲清淡口味閉目靜養庶幾成功附記吹沖目疾法方見文蛤三百四十九障翳遮睛瞳人歪小瞳人不正或下陷或倒側或不動青光內障紅絲纏繞黑白睛大小眼角風癢拳毛倒睫赤眼爛弦羞明怕光螺蠣突旋蟹眼胬肉攀睛頭風患目等症均宜吹宜吹者用大襯單矇頭不透風筒入藥中先淺吹後深吹藥涼即止取水珠沖目也秋冬用薄被傷寒後産後痘疹後癆病後咳嗽後遺精腰腿疼病目者均不宜吹中年以後不敢輕吹如不得已少吹幾次云膜活動好點外障四十九症不宜吹者瞳人散大枯黃繞睛視物昏花睹一如二瞳人黑色短視瞳人焦小怒氣傷肝散而不聚內障二十三症不宜吹者吹沖半途頭眩眼皮不睜少精神宜用黃耆八分當歸五分升麻三分炙草五分白朮八分柴胡三分川芎四分陳皮四分參三分枳實四分黃柏六分姜三棗二細辛二分荊子二分如翳膜退淨減去細辛荊子晚服早服熟地二錢山藥一錢萸肉一錢川膝枸杞子一錢東膠一錢菟絲子一錢湯丸均可
