body:
  text: 本草易讀卷一汪訒庵先生秘本清御醫吳謙審定中風部一中風口噤白朮第九驗方十四中風口噤荊芥七十三驗方四中風口噤竹瀝三百三十八驗方一諸風口噤南星一百四十驗方三牙關不開南星一百四十驗方四口噤身冷獨活三十三驗方一口噤痰壅皂角三百零四驗方一中風不語獨活三十三驗方四中風舌強黑雌雞三百八十七驗方一中風不遂黃耆第二諸方六卒風不語黑豆二百零七驗方三中風失音槐米三百零一驗方八中風痰壅上膈鉛四百二十二黑錫丹中風口斜黑豆二百零七諸方一中風口斜皂角三百零四驗方二中風口斜白附一百三十九驗方一口目斜歪乳香二百八十四驗方一口目斜歪南星一百四十驗方八口目斜歪蓖麻一百三十四驗方五一切偏風荊芥七十三驗方三手足不舉蓖麻一百三十四驗方四半身不遂蠶砂三百五十二驗方一諸風有痰藜蘆一百三十六驗方二暗風卒倒細辛四十三驗方三中風不蘇藜蘆一百三十六驗方一中風身直槐皮三百零二驗方九中風不省木香五十三驗方二中風中氣南星一百四十驗方十二老人中風雞三百八十七驗方三一切卒中生薑二百二十八驗方二中風主方麻黃一百零二諸方十一中風續命湯麻黃一百零二諸方十二風寒部二發熱身痛脈緊無汗為傷寒麻黃一百零二諸方二發熱頭痛脈緩有汗為中風桂枝二百七十七諸方一傷寒頭痛發熱脈洪葛根一百七十一驗方九頭痛如破蔥二百二十一驗方一時疾頭痛蔥二百二十一驗方二數種傷寒蔥二百二十一驗方三發熱頭痛無汗胡桃二百五十四驗方一一切傷寒白芷五十驗方十三傷寒腳攣便癃白芍五十一諸方二傳陽明經表在脈洪不飲葛根一百七十一驗方九傳陽明經表去脈洪大渴飲知母第七諸方一傷寒傳胃谷入即吐吳茱萸二百六十一諸方一傳少陽見下柴胡三十諸方二傳府腹痛腹滿大便燥結脈實大黃一百二十八諸方一發熱身痛脈緊無汗煩躁麻黃一百零二諸方三寒熱往來胸脅滿喜嘔柴胡三十諸方一傷寒氣喘紫蘇七十六驗方十一傷寒痞滿檳榔二百五十八驗方四汗後惡寒白芍五十一諸方三下後胸滿白芍五十一諸方四溫熱部三溫熱症表具飲水元參十八驗方十二溫症表具脈洪不飲葛根一百七十一諸方一傷寒勞復二便如血胡連二十七驗方十二勞復食復紫蘇七十六驗方十食復神麯二百十四驗方十二女勞復蔥二百二十一驗方四女勞復病竹葉三百三十八驗方三喘咳乾嘔麻黃一百零二諸方四心下支結肢節痛桂枝二百七十七諸方四陰陽易病褲襠三百四十一諸方一男病易於女女病易於男陰症傷寒腹痛肢冷白芥子二百二十四驗方二十一感冒部四風寒流涕白芷五十驗方十四感寒上氣紫蘇七十六驗方十二傷感風寒胡麻一百九十五驗方十三身熱頭痛豆豉二百十二驗方一發散寒邪胡椒二百六十驗方四感冒風寒綠豆二百一十驗方七春夏秋感冒有汗者羌活三十四驗方九春夏秋感冒無汗者羌活三十四諸方一瘟疫部五四時瘟疫熱毒表裡俱者人參第三諸方十四溫病熱噦茅根四十一驗方十一闢除瘟疫稷米二百零二驗方一疫癘發腫黑豆二百零七驗方二十風溫自汗身重多睡鼻鼾語難葳蕤第六諸方一傷暑部六伏暑水瀉滑石四百三十五驗方四伏暑吐瀉滑石四百三十五驗方五伏暑瀉泄火硝四百五十五諸方一水瀉不止巴豆三百十二驗方五暑月吐瀉藿香七十驗方二水瀉滑石四百三十五益元散暑月暴瀉蒼朮第十驗方十冒暑霍亂澤瀉一百七十五驗方一霍亂及瘧滑石四百三十五驗方六傷暑一切香薷七十二諸方一中暑不省皂角三百零四驗方三注夏病枸杞三百二十六驗方六即枯夏也批夏月無他症但不欲食名注夏每年如此是也熱傷元氣短氣口渴出汗人參第三諸方十二癱瘓部七一身癱瘓牛肉三百九十五倒倉法中風癱瘓手足不舉山甲三百六十八諸方一似癱瘓人參第三諸方十六癱瘓附子一百三十七諸方八痿部八兩腳痿廢附子一百三十七諸方九痿症木瓜二百四十七諸方一骨痿不能起床豬腎三百九十二諸方一風濕身痛部九中濕骨痛白朮第九驗方十七一身煩痛白朮第九諸方三濕氣身痛蒼朮第十驗方九遍身痛甚元胡三十八驗方三風濕走痛牛膠三百九十五驗方五渾身骨痛草鞋三百四十二驗方一歷節風痛獨活三十三驗方二白虎歷節米醋二百十七驗方一歷節風痛松節二百七十五驗方二走注痛急柳枝三百零七驗方四走注風痛白芥二百二十四驗方十六氣走作痛麥面一百九十七驗方二走注氣痛木香五十三驗方一血氣走痛莪朮六十六驗方三骨節痛癃附子一百三十七諸方五身痛而癃白朮第九諸方三骨痛短氣汗出而癃甘草第一諸方七汗後身痛脈沉人參第三諸方六身痛大便堅白朮第九諸方一身痛寒熱晡劇麻黃一百零二諸方八身痛腫汗麻黃一百零二諸方九身痛而厥附子一百三十七諸方一一切急痛柳枝三百零七驗方三膜外氣痛元胡三十八驗方七右臂疼痛南星一百四十驗方十三四肢拘攣桑枝三百十五驗方四一切筋痛松節二百七十五驗方一如風濕部十腹滿身重譫語有汗知母第七諸方一身重懶食浮腫白朮第九諸方七厥部十一手足逆冷之謂厥利清穀甘草第一諸方四厥利肢痛甘草第一諸方三厥利出汗甘草第一諸方四厥利下重甘草第一諸方五厥利脈細人參第三驗方十六厥利豬膽三百九十二諸方一厥而煩躁吐逆甘草第一諸方六厥而煩躁脈微人參第三驗方六厥而脈滑汗渴知母第七諸方一厥而脈絕當歸四十六諸方一厥而脈微欲絕吳茱萸二百六十一諸方二厥冷極躁硫黃四