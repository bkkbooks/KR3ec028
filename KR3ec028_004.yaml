body:
  text: 本草易讀卷四草豆蔻五十七麵包煨去皮用辛溫無毒性浮入足太陰陽明下氣開鬱燥濕驅寒消食醒酒化痰攻積解霍亂而止瀉痢闢瘴癘而退寒瘧除口氣之臭殺魚肉之毒生南海今嶺南皆有之苗似姜二月開花作穗時珍曰今建寧所產草豆蔻大如龍眼而形微長皮黃白薄而稜峭其仁大如砂仁滇廣所生草果長大如訶子皮黑厚而稜秘其子粗而辛臭蓋草蔻草果雖是一物而微有不同爾南人復用一種大楊梅偽充草果其形圓而粗氣味辛猛而不和不可不辨口氣臭同細辛末含之驗方第一心腹脹滿短氣為末木瓜生薑湯下第二脾痛脹滿酒煎服第三瘧疾寒多或單寒不熱同附子薑棗煎服第四白豆蔻五十八去皮炒用辛溫無毒性浮入手太陰行氣溫胃消食解酒止嘔寬膨補肺益脾治噎膈而除寒瘧療反胃而收脫氣退白睛之翳膜除紅筋於目眥大實者名紫蔻出伽古羅國呼為多骨其草形如芭蕉長八九尺而光滑冬夏不凋花淺黃色子作朵如葡萄初出微青熟則變白七月採今廣州亦有之不及番舶來者佳脾虛反胃同揀砂公丁陳皮各米炒焦薑汁丸服驗方第一小兒虛寒吐乳同揀砂甘草炙草為末撒口中第二食即欲吐酒末服或嚼服第三噁心嚼服第四砂仁五十九炒用辛溫苦澀無毒性浮入手足太陰陽明太陽足少陰七經行氣調中消食醒酒止痛安胎除嘔住瀉噎膈脹痞之疾崩帶喘痰之疴上氣咳嗽之劑霍亂轉筋之藥散咽喉口齒之熱化銅鐵骨哽之堅除腹痛而通結滯治奔豚而療驚癇為溫燥肝腎之良劑乃補益脾胃之靈丹生西海及西戎波斯諸國今惟嶺南山澤間有之苗莖似高良薑高三四尺三月四月開花在根下秋月採實味辛香食品家多用之今市肆所貨砂仁米多用草蔻米充之不可不知一切食毒末服驗方第一誤食銅錢金銀煎服第二魚骨哽咽同甘草末綿包含咽第三口吻生瘡砂仁殼煅研末搽之第四牙痛常嚼第五血崩末服第六胎損極痛焙末酒下第七子癇昏冒同上第八大便血末服第九身腫連陰同土狗為末酒下第十氣上咳逆為末同生姜搗爛酒服十一益智仁六十辛溫無毒益氣安神補脾和胃理小便之頻數調遺精之虛滑夢泄赤濁之疾吐血崩中之疴遺尿因熱者勿用出崑崙及交趾嶺南苗葉花根與豆無異惟子小爾二月花連著實五六月熟子如筆頭而兩頭尖長今之益智子形如棗核而皮及仁皆似草豆蔻云小便數同烏梅末酒煎山藥丸服驗方第一赤白濁同茯苓末服第二腹脹忽瀉諸藥不效此氣脫也水煎服一兩立已第三崩中為末米湯下第四香口同甘草末舐之第五漏胎下血同砂仁末服第六蓽茇六十一去挺用頭醋浸焙用辛大溫無毒性浮入手足陽明經溫中下氣消食除冷解虛冷之腸鳴退逆冷之口酸止風蟲之牙痛驅冷痰之噁心水瀉虛之疾頭痛鼻淵之疴定霍亂而暖陰疝補腰腳而殺腥氣多用令人上氣生波斯國根名畢勃沒似柴胡而黑硬今嶺南亦有之多生竹林中正月發苗作叢高三四尺三月開花白色在表七月結子如小指長二寸許九月採實味辛烈如胡椒風蟲牙痛為末揩之煎蒼耳漱之驗方第一鼻流清涕為末吹之第二偏頭風痛為末口含溫水隨左右痛以左右鼻吸一字第三冷痰噁心米湯下末第四暴瀉身冷自汗尿清脈弱同肉桂良薑乾薑丸服第五肉豆蔻六十二煨熟去粉用忌鐵辛溫無毒入手足陽明經溫中消食下氣止瀉開胃醒酒暖脾固腸利老人之虛瀉駐小兒之乳霍療心腹之脹痛兼療蟲痛調赤白之下痢兼調氣痢霍亂中惡之疾痰飲吐沫之疴生胡國今嶺南人家亦種之春生苗夏抽莖開花結實似草豆蔻六七月採最易生蛀惟烘乾密封則稍可留霍亂吐利煨末薑湯下驗方第一久瀉不止虛寒者稍佐木香末棗肉丸服第二小兒瀉稍佐乳香姜水丸服第三冷痢腹痛煨末服第四破故紙六十三酒浸蒸用或鹽同炒惡甘草忌蕓薹及諸血得胡桃胡麻良即補骨脂苦辛大溫無毒治諸勞傷逐諸冷痹腎寒精流之疾腰痛膝冷之疴通命門而暖丹田興陽事而斂精氣禁小便之頻數兼除囊濕開兩耳之聰聽並令目明生嶺南及波斯今四川合州亦有之莖高三四尺葉小似薄荷花微黑色實如麻子圓扁而黑九月採腎虛腰痛酒炙故紙炒末酒下驗方第一妊娠腰痛酒下末先嚼胡桃肉第二精氣不固同青鹽末服第三小便無度同茴香丸服第四玉莖不倒精滑同韭子炒末服第五水瀉久痢同蜜炙米殼丸服第六牙痛日久腎虛也稍佐青鹽末敷之第七風蟲牙痛連頭腦佐乳香末敷之第八打墜腰痛同茴香肉桂末服第九故紙丸故紙四兩菟絲子四兩胡桃肉一兩乳香沒藥各錢沉香一錢蜜丸服治因縱欲所致下元虛敗手腳沉重夜多盜汗諸方第一養血還精丸故紙二兩茯苓一兩沒藥五錢酒丸服定心補腎養血固精第二薑黃六十四辛苦無毒下氣破血攻積消症平癰退腫祛邪辟惡通月經之凝滯逐產後之敗血治風痹之臂痛療撲損之血瘀江廣蜀川多有之根葉卻似鬱金其花春生於根與苗並出次方生葉根盤曲黃色類生薑扁如乾薑形者為片子薑黃圓如蟬腹形者為蟬肚鬱金並可染色與鬱金莪朮三物形狀功用頗相同也產後血痛有塊同桂心末酒下驗方第一癬瘡初起為末摻之第二心痛難忍同肉桂末醋下第三鬱金六十五辛苦寒無毒開結氣破惡血駐血淋已金瘡治癲狂之失心止血氣之刺痛療婦人月經之逆行除產後敗血之上攻最涼心熱亦散肝鬱生蜀川及西戎苗似薑黃今廣南江西亦有之不及蜀川者佳產後心痛欲死燒末醋下驗方第一吐衄血為末井水下第二自汗不止為末臥時敷乳上第三尿血不定蔥白煎末服第四中砒毒蜜水下末第五痔瘡腫痛水合敷之第六耳內作痛為末水合入耳急出之又炒鹽布包熨之良效第七白金丸鬱金七兩白礬三兩水丸服治失心癲狂諸方第一莪朮六十六醋炒用辛苦氣溫無毒破血行氣消積去瘀開胃化食通經解毒療心腹諸痛解氣血諸結奔豚痃癖之疾霍亂吐酸之疴生西戎及廣南諸州今浙省或有之三月生苗在田野中莖如錢大高二三尺葉青白長一二尺大五寸以來頗類蘘荷根如雞鴨卵大小不常九月採一切冷氣搶心切痛發即欲死醋煮莪朮二兩木香兩為末醋下驗方第一久患心腹痛時發時止同上第二血氣遊走作痛及腰痛同乾漆末酒下第三三稜六十七醋炒用甘平溫苦無毒散一切血瘀開諸般氣結有通經墜胎之能擅止痛消腫之權積聚固結非此莫療瘡腫堅硬少此無力荊襄江淮濟南河陝間皆有之多生荒廢陂澤濕地春時叢生夏秋抽莖莖端復生數葉花開六七枚皆細碎成穗黃紫色中有細子其莖葉花實俱有三稜並與香附苗葉花實一樣但長大爾其根多須削去須皮恰似鯽魚今舉世所用皆淮南紅蒲根也其體至堅莖葉花實不復有三稜刻削魚形因緣差失不復辨別痃癖氣塊同青皮陳皮木香肉蔻檳榔少加硇砂丸服驗方第一痃癖不瘥脅下如石同大黃為末醋熬膏生薑陳皮湯下以利為度第二小兒氣癖煎汁作羹粥食第三三稜煎三稜一斤水煮去渣再熬如稠糖狀每旦酒下一匕治癥瘕腹脹諸方第一香附六十八去毛醋酒童尿鹽水四制甘苦微寒無毒足厥陰手少陰藥也理一切氣血止諸般疼痛解情思之結郁除胸腹之客熱霍亂吐瀉之疾痰飲痞滿之疴消飲食而攻積聚治崩漏而止帶下調月經而理胎產平癰疽而解瘡瘍處處有之葉如老韭而硬有稜可作雨衣五六月抽一莖三稜中空莖端復出數葉開青花成穗如黍中有細子其根有須須下結子轉相延生多生田野二月八月採取為婦科要藥氣虛浮腫制末丸服驗方第一痃癖往來痛同南星薑汁丸第二㿗疝脹痛同海藻酒煎第三消渴積年同茯苓末陳皮水下第四蜈蚣傷嚼敷第五諸般牙痛同艾葉煎漱第六耳猝聾炒末萊菔子湯下第七睛痛冷淚羞明同夏枯草末下第八婦人頭痛為末茶下第九氣鬱頭痛同川芎末茶下第十偏正頭風香附一斤烏頭一兩甘草二兩密丸彈大茶下十一脫肛同荊芥末水煎洗十二諸般下血四製為末或丸宜婦人十三淋血痛甚同陳皮赤苓末下十四尿血先煎服香附後服地榆十五肺破咯血米飲下末十六氣鬱吐血童尿下末十七產後狂渴薑棗下末十八臨產順胎同砂仁炙草末服十九妊娠惡阻同藿香甘草末服二十安胎蘇梗湯下末二十一赤白帶同赤芍末下二十二下血血崩酒下焦末二十三婦人腹脹頭暈佐茯苓甘草橘紅末下二十四九氣湯香附鬱金甘草姜引水治九種心痛膈氣風氣寒氣憂氣驚氣喜氣怒氣山嵐瘴氣積聚痞氣心腹刺痛不能飲食時發時止攻則欲死煎治神效諸方第一黃鶴丹香附一斤黃連半斤丸服內傷米飲下氣病木香湯下血病酒下痰病薑湯下火病白湯下第二青囊丸香附一斤烏藥五兩醋丸頭痛茶下痰氣薑湯下血病酒下第三一品丸香附焙末蜜丸彈大水下治熱氣上攻頭目昏眩與偏正頭痛第四快氣湯香附一斤砂仁半斤炙草四兩每末服二錢治一切氣痰心腹脹滿噎塞噫氣吞酸痰逆嘔惡酒醉第五小烏沉湯香附二十兩烏藥十兩甘草一兩每末下二錢治心腹刺痛第六艾附丸香附三兩艾葉半兩醋湯同煮去艾炒末丸服治心腹血氣諸痛第七四制香附丸酒醋童尿鹽水各制一分為丸治婦科一切兼調經候第八五香丸靈脂一斤香附一斤黑醜二兩白醜二兩醋丸綠豆大或黍粒大消食消積消痞消痰消氣消滯消腫消水消痛消血消痢消蠱消膈消脹消悶消心下一切鬱滯第九排草香六十九辛溫無毒闢臭氣祛邪惡芳烈如麝香諸香藥俱不及之出交趾草根也白色狀如細柳根芳烈如麝香人多偽雜之藿香七十辛甘微溫無毒入手足太陰經除惡氣定霍亂解心腹之疼痛止脾胃之嘔逆溫中開氣開胃進食出海邊國今嶺南多有之亦多種者二月生苗方莖有節中虛葉似茄葉潔古東垣輩惟用葉不用枝莖今人並梗枝用之因葉多偽故耳七月採霍亂欲死同陳皮服驗方第一暑月吐瀉同滑石末米泔下第二胎前嘔酸同甘草末下第三去口臭煎漱第四冷露瘡爛同細茶燒灰香油合敷第五藿香正氣散藿香蘇葉雲苓白芷檳榔厚朴陳皮桔梗半夏炙草姜棗水煎治四時不正之氣內停飲食頭痛寒熱霍亂吐瀉或作瘧疾諸方第一澤蘭七十一絹盛風千用防己為使甘苦微溫無毒入足太陰厥陰療婦科百病除產後諸症利竅通關養血補氣祛痰消症長肉生肌止吐衄而清頭風平癰腫而療撲損婦人勞瘦之疾丈夫面黃之疴生汝南諸澤今在處有之多生下地水傍葉如蘭二月生苗赤節四葉相植枝節間產後諸腫同防己末酒下驗方第一瘡腫初起搗敷第二損傷瘀腫同上第三產後陰翻煎四兩入枯礬熏洗第四香薷七十二勿犯火辛溫無毒止吐瀉之腹痛散氣水之腫滿解皮膚之風熱開心腹之凝結除腳氣之寒熱療霍亂之轉筋降氣逆而平嘔吐去口臭而止鼻衄為清暑之主劑乃利濕之良藥在處有之有野生有家蒔中州人三月種之呼為香菜以充蔬品朱震亨惟取大葉者為良而細葉者香烈更甚今人多用之方莖尖葉有刻缺九月開紫花成穗有細子細葉者佳高數寸葉如落帚葉即石香薷也舌上出血有孔水煎服驗方第一口臭煎含第二小兒發退煎汁入豬脂常塗之第三白禿慘痛上方用胡粉敷之第四香薷飲香薷一斤厚朴半斤白扁豆半斤為末每冷服五錢治一切傷暑或吐痢或發熱頭痛身痛或心腹痛或轉筋或乾嘔肢冷或煩悶欲死諸方第一香薷煎香薷十斤水熬去渣再熬成膏丸豆大每十丸以尿利為度治水病洪腫第二薷術丸薷葉一斤水熬去渣再熬成膏入白朮末七兩丸豆大每十五丸治通身水腫第三荊芥莖穗七十三炒用反驢肉無鱗魚陳久者良一名假蘇辛溫無毒入足厥陰肝經祛風發表理血散瘀清頭利咽消毒散瘡治中風口噤項直口面喎斜療諸血吐衄腸風崩漏血痢除目中之黑花息產後之血暈疔瘰疥痔之毒背脊筋骨之痛在處有之原生田野亦多栽蒔方莖細葉似獨帚葉而狹小八月開小花作穗成房房如紫蘇房內有細子如葶藶狀風熱頭痛同石膏末茶下驗方第一小兒一切驚癇佐枯礬丸服硃砂為衣薑湯下第二一切偏風口目斜同薄荷熬膏丸服第三中風口噤酒下炒末立愈第四產後血暈昏倒童尿下末第五產後衄血童尿下末第六九竅出血酒煎服第七口鼻血湧因酒色過者燒末陳皮湯下第八吐血不止末服第九尿血同砂仁末糯米湯下第十血崩麻油燈上燒焦末童尿下十一痔瘻腫痛煎洗十二大便血米飲下末十三小兒脫肛同皂角煎洗十四㿗疝腫痛酒下末十五小兒臍腫煎洗以煨蔥刮薄出火毒帖之十六瘰癧潰爛用下段煎洗樟腦雄黃香油掃之十七疔腫諸毒水煎服十八一切瘡疥同地黃熬膏丸服十九腳椏濕爛荊葉搗敷二十纏腳生瘡燒灰蔥汁合敷先以甘草水洗之二十一頭目暈痛酒下末二十二癃閉不通同大黃末小便不通大黃減半大便不通荊芥減半水煎二十三愈風散芥穗焙末每童尿下三錢治產後中風口噤瘛瘲或產後血運昏迷強直諸方第一薄荷莖葉七十四辛平無毒入手太陰足厥陰經消風散熱清頭利目解癮疹瘰癧瘡疥驚熱利咽膈口齒痰嗽瘙癢含漱去舌苔語澀挼葉塞鼻衄蛇傷治中風之失音祛心腹之膨脹破血止痢亦療消食下氣尤良處處有之人家多栽蒔之二月宿根生苗清明前後分之方莖赤色其葉對生初蒔形長而頭圓及長則尖蘇產者良血痢不止薄荷葉煎常服驗方第一入水耳中取濃汁滴入立效第二清熱化痰蜜丸豆大含之第三皮膚瘙癢同蟬蛻末酒下第四眼弦赤爛以薑汁浸一宿曬乾為末沸湯泡洗第五舌苔語蹇取汁合蜜姜搽之第六唇瘡一切為細末香油合敷第七龍腦薄荷七十五即水蘇也一名雞蘇辛平無毒理氣散熱平肺下氣消穀辟惡清利頭目療一切血症吐衄咳唾之疾淋痢崩帶之疴處處有之多生水邊三月生苗方莖中虛葉似紫蘇而微長背面不紫密齒面皺色青對節生氣甚辛烈六七月開花成穗如蘇穗水紅色穗中有細子狀如荊芥子可種宿根亦自出一切吐衄咳唾血或湯或末驗方第一香發煎汁沐之第二頭生白屑同上第三中諸魚毒煎汁飲之第四蛇虺毒酒末下並敷之第五龍腦雞蘇丸水蘇一斤生地六兩黃芩蒲黃麥冬阿膠臺參木通柴胡各二兩甘草黃連各一兩煉蜜丸治上焦熱除煩解勞一切吐衄咳唾諸血並治五淋血崩諸方第一紫蘇梗葉七十六忌鯉魚辛溫無毒發表散寒下氣去脹消痰和血驅風定喘利大小腸解魚蟹毒有通心利肺之能擅開胃益脾之長溫中止痛亦效安胎順氣最靈發表宜葉安胎用梗在處有之或下種栽蒔或宿子自生其莖方葉圓而尖四面鋸齒背面皆紫者良咳逆短氣同臺參煎服驗方第一乳癰腫痛煎湯服並搗敷第二食蟹中毒煎汁服之第三蛇傷人搗葉敷之第四瘋犬咬嚼葉敷之第五損傷血出以葉蘸所出血挼爛敷之愈後無瘢甚妙第六金瘡出血以嫩葉同桑葉搗貼第七諸失血熬膏入赤小豆炒末丸服第八霍亂未吐瀉脹滿水煎服第九勞復食復欲死煎服第十傷寒氣喘水煎服十一感寒上氣同陳皮服十二蘇子炒用辛溫無毒與葉同功降氣開鬱消痰定喘利二便而破癥結止霍亂而定嘔吐氣虛少者勿用夢中失精熬杵酒下驗方第一痰喘咳逆短氣水研取汁煮粥服第二順氣利腸同麻仁濾引作粥食第三蘇子降氣湯蘇子陳皮厚朴前胡肉桂半夏當歸甘草姜棗水煎服治氣不升降上盛下虛痰涎壅盛喘促氣滿咳嗽諸方第一甘菊七十七二朮枸杞雙皮為使色白者尤良花小味苦者名苦薏非真菊也甘平無毒治頭風眩暈除遊風濕痹明目去翳補肺益腎處處有之以單葉味甘者入藥今市所貨皆野菊山菊耳膝蓋疼同陳艾作護膝驗方第一女人陰腫以梗搗爛先熏後洗第二疔腫垂死以梗取汁入口即活第三風熱頭痛同石膏川芎末茶下第四醒酒末服第五眼目昏花真菊一斤紅椒去目六兩生地汁丸服第六雲翳兼癢同菖蒲白礬煎水青布搽之第七眼癢防風菊花膽草甘草細辛等分水煎熏洗又翳而癢菊花菖蒲白礬煎湯浸青絹搽之第八艾葉七十八陳久者良入丸散醋煮搗餅烘乾用火灸揉爛用香附為使苦溫無毒入足太陰厥陰少陰溫中暖宮調經安胎理氣止血逐寒除濕治吐衄崩帶血痢療腹痛霍亂筋轉用以火灸通治百病處處有之自明成化以來則以蘄州者為勝相傳他處艾灸酒罈不能透蘄艾一灸則直透為異耳五月五日採之鼻衄不已為灰吹之或煎服驗方第一盜汗不已同茯苓烏梅煎服第二火眼腫痛燒煙碗覆之碗上刮煤溫水調洗目或加入黃連第三面上皯𪒟艾灰桑葉灰淋水三遍以五色布納入同煮如膏每以少許敷之自爛脫第四鵝掌風手心斑點燥裂用四兩入大口瓶內火之用麻布兩層縛之將手心放瓶口上熏之如冷再熱如神第五小兒爛瘡燒末敷之第六臁瘡不斂燒煙燻之第七腫毒初起以濕紙拓之先乾者是頭燒艾灸之第八骨哽咽水煎數兩取服第九吞銅錢同上第十諸蟲蛇傷團艾灸之十一風蟲牙痛化蠟少許攤紙上鋪艾以箸捲成筒燒煙燻鼻吸菸令滿口呵氣即疼止十二產後瀉血同生姜煎服每半兩十三產後腹痛欲死因寒艾葉一斤焙乾鋪臍以熨斗熨之口有艾氣疼止矣十四崩中不止同阿膠佐乾薑水煎服十五胎動迫心痛醋煎服十六胎動或腰痛搶心酒煎服十七倒產子死同上十八心腹冷痛為末湯下十九蛔心痛如刺口吐清水水煎數兩服當吐蛔二十口吐清水水煎服二十一霍亂吐下不已水煎服二十二諸痢久下同陳皮煎服二十三暴瀉不止同生姜煎服二十四糞後血同上二十五痔忽如胡瓜先以槐柳枝湯洗過次以艾灸五壯二十六妊娠傷寒壯熱赤斑變黑尿血酒煎半兩服二十七妊娠猝中風寒不省醋炒絹包熨臍下二十八中風口噤灸承漿一穴頰車二穴各五壯二十九口斜欲正以葦筒入耳以面密封用艾一頭七壯患左灸右右灸左三十癲癇諸風於陰下穀道正門當中隨年歲灸之三十一忽然胸腹痛甚或即吐衄下血乃鬼擊病也水煎半兩服三十二頭風面瘡癢出水醋熬取汁薄紙貼之三十三頭風久痛陳艾揉丸時時嗅之以鼻中出水為度三十四膠艾湯阿膠艾葉川芎甘草當歸地黃白芍酒煎治妊娠下血漏下血半產後下血不止諸方第一艾姜丸艾葉乾薑醋煮陳米湯為丸治老少白痢第二茵陳七十九取葉用之苦平微寒無毒入太陰脾太陽膀胱經發汗利水除濕退熱解黃疸之鬱熱療時疾之熱狂頭旋頭疼皆治瘴瘧疝瘕悉醫生太山及丘陵五月及立秋日採今處處有之二月生苗其莖如艾其葉如淡色青蒿葉歧緊細而扁整九月開細黃花結子如艾子昔人多蒔為蔬故入藥用山茵陳所以別家茵陳也經冬不死立春又生一身風癢瘡疥水煎洗之驗方第一癇黃好眠吐涎同白鮮皮煎服第二一身悉黃同生姜搗爛遍身日搽之第三眼熱赤腫同車前子末茶下第四茵陳蒿湯茵陳山梔大黃治身黃腹滿尿不利諸方第一茵陳五苓散五苓散五分加茵陳十分治黃疸第二茵陳羹以茵陳煮羹食之除大熱黃疸風熱瘴瘧第三青蒿八十童尿浸曬乾用雷斆曰凡使惟中為妙到膝則仰到腰則俯使子無使葉使根無使莖四件皆同使翻然成痼疾苦寒無毒退骨節之蒸熱除風毒之熱黃療纏綿之痢瘧平頑惡之瘡疥生華陰川澤今處處有之二月生苗莖粗如指而肥軟其葉微似茵陳而背面俱青秋月開細黃花頗香結子如麻子中有細子益母草八十一辛苦微寒無毒入手足厥陰經消水行血祛瘀生新退疔腫而平乳癰調經脈而通二便血風血暈血痛血淋之苦崩中帶下胎疼難產之疴生海濱池澤今處處有之五月採春生苗如嫩蒿夏長三四尺莖方如麻其葉如艾而背青一莖三葉葉有尖歧寸許一節節生穗叢簇抱莖四五月開小花紅紫色亦有微白色者每萼內有細子四粒如同蒿子紅花者入血分白花者入氣分益母子炒用甘辛無毒明目益精調經活血一切胎產諸症余治略同益母草夏枯草八十二辛苦微寒無毒散癭破症平瘰治瘻止目睛之夜疼解腳氣之腫滿生蜀郡川穀五月便枯四月採之今處處原野有之高一二尺其莖微方葉對節生似旋覆葉而長大有細齒莖端作穗長一二寸一穗有子四粒目睛疼冷淚同香附末服驗方第一赤白帶為末飲下第二血崩不止同上第三撲傷金瘡嚼封之第四汗瘢白癜日日煎洗第五瘰癧馬刀已潰未潰或成漏水煎服第六夜間珠疼連梭骨同香附甘草湯散均可第七寄奴草八十三莖葉花子同宋祖劉裕小字寄奴苦溫無毒破血通經除症消脹金瘡止血極效產後余疾亦療忌多服生江南今河中孟州漢中滁州皆有之一莖直上葉似蒼朮九月莖端分開數枝一枝攢簇十朵小花白瓣黃蕊如小菊花花罷有白絮結子細長大小便血為末茶下驗方第一折傷血瘀在腹同骨碎補元胡酒煎服第二風入瘡口腫疼為末摻之第三旋覆花八十四去蕊並殼皮及蒂子蒸之入湯絹包用即金沸草俗名野菸花甘寒微溫無毒入手太陰肺足陽明胃經下氣行水消痰軟堅解大腹之腫去頭面之風除噫氣而止嘔逆利大腸而通血脈所在水澤邊有之葉似柳莖凹六月開花如菊而小如銅錢深黃色中風壅滯蜜丸服驗方第一金沸草湯沸草二兩蔥白十四枚新絳少許治婦人半產漏下諸方第一旋覆代赭湯旋覆三兩代赭石一兩甘草三兩參二兩姜棗治心下之痞硬噫氣不除第二青葙子八十五味苦微寒無毒入足厥陰肝祛風退熱鎮肝明目治青盲除障翳療唇口之青解瘡疥之毒生田野間嫩苗似莧可食長則高三四尺葉苗花實如雞冠花一樣但雞冠花穗有大小而扁或團者此則梢間出花穗尖長四五寸狀如兔尾水紅色亦有黃白色者子在穗中與雞冠花一樣雞冠八十六甘涼無毒赤白帶痢皆醫痔漏崩中悉療子同治處處有之苗高五六尺矬者才數寸六七月梢間開花有紅白黃三種其穗圓長而尖小者儼如青葙之穗扁卷而平大者儼如雄雞之冠花大有圍一二尺者層層卷出可愛子在穗中黑細光滑如青葙子一樣大便血同椿根皮丸服驗方第一糞後血用白者炒煎服第二下血脫肛用白者同防風丸服第三經水不止紅者炒末酒下第四產後血痛白者酒煎第五白帶白者炒末酒下第六赤白痢炒酒煎服赤赤白白赤白煎俱用第七赤白帶用紅花炒末酒下第八白帶沙淋白者同苦壺盧燒末酒下第九紅花八十七辛甘苦溫無毒足厥陰藥也除產後之惡露通經脈之滯瘀活血潤燥悉靈止痛散腫良效生梁漢及西域今處處有之二八十二月皆可下種雨後布子初生嫩葉苗亦可食其葉如小薊葉五月開花如大薊花而紅花清晨採花一切腫疾絞汁服三次驗方第一喉痹壅塞同上第二熱病胎死酒煎服第三胎衣不下同上第四產後血暈心悶氣絕為末酒下第五耳出黃水同枯礬末吹之第六紅花酒治六十二種風兼治腹內血氣疼者胭脂八十八起自商紂以紅花汁凝作之甘平無毒活血脈而解豆毒塗鵝口而滴聤耳乳頭破裂同蛤粉敷驗方第一小兒鵝口白厚如紙以乳汁合敷之第二胭脂膏同升麻煎湯去渣於湯內揉出紅汁再加雄黃細末調勻塗之治毒痘鎖眼蒙骩抱鼻銷口銷唇聚背燕窩疊錢諸方第一大小薊八十九大者生山谷之中小者生平澤即俗所謂刺刺菜是也甘平無毒大薊根治吐衄崩漏兼治女子赤白之沃葉療腸癰撲損兼療惡瘡疥癬之疴善消瘀血尤能安胎小薊力微破瘀生新保精養血又退熱補虛開胃下食解胸膈之煩悶止金瘡之血出搗汁除夏日之熱煩作菜療一身之風熱猝瀉鮮血小薊葉取汁服驗方第一墜胎下血小薊根葉同益母草煎服第二金瘡血出小薊苗搗敷第三鼻塞不通水煎小薊服第四癬癢小薊葉取汁服第五婦人陰癢小薊煎洗之第六續斷九十酒浸焙用地黃為使惡雷丸辛苦微溫無毒理筋骨折傷治崩中漏下破瘀血而止腰痛暖子宮而縮小便漏胎遺精之疾腸風血痢之疴為胎產要劑亦外科良藥所在山谷皆有苗干四梭似苧麻葉兩兩相對四月開花似益母花根如大薊自漢以後皆以大薊為續斷相承久矣又曰色赤而瘦折之有煙塵起者為良川產者為勝血痢不愈為末二錢入平胃散兩水煎服驗方第一產後諸疾血運心悶煩熱氣欲絕心頭硬乍寒熱水煎服第二漏蘆九十一甘草拌蒸乾用連翹為使苗根皆可咸寒無毒入足陽明經散熱解毒通經下乳排膿止血續筋長肉疽痔瘡瘰皆療泄精尿血悉醫生喬山山谷曹兗汴東及秦海諸州皆有之苗類油麻高六七尺秋深黑枯如漆採時用苗八月採根冷勞瀉痢一兩艾葉四兩醋熬膏丸之驗方第一產後帶下同上第二白禿頭瘡燒灰豬油合敷第三苧根九十二甘寒而滑無毒瀉熱散瘀補陰潤燥治天行熱疾大渴大狂療胎動下血熱淋血淋貼丹毒而愈骨哽療金瘡而平折傷閩蜀江浙曹兗諸州皆有之產後腹痛以苧皮按腹上驗方第一痰哮咳嗽苧根焙末生豆腐蘸食良效如未痊可再以豬肉二三片蘸食甚效第二小便不通為末同蛤粉新水下第三血淋熱淋苧麻煎服大妙第四肛門腫痛搗爛坐之良第五癰疽腫痛初起者搗敷之第六五色丹毒煎汁浴之第七雞魚骨哽取汁灌之第八大青九十三甘咸大寒無毒除時疾之大狂消陽毒之發斑療血痢而息黃疸平丹毒而解喉痹處處有之高二三尺莖圓葉長三四寸面青背淡對節而生八月開小紅花成簇結實大如椒胡蘆巴九十四酒浸炒用味苦大溫無毒補命門暖丹田治冷氣疝瘕療寒濕腳氣腹脅脹滿之寒面色青黑之陰出廣州或云種出海南諸番其國中蘿蔔子也舶客將種蒔於嶺外亦生然不及番中來者腿膝痛行無力同故紙木瓜丸服驗方第一冷氣疝瘕酒製蘆巴蕎麥炒研面各四兩小茴一兩炒丸服大便下白則愈少腹冷痛是也第二沉香內消丸沉香木香蘆巴小茴酒丸服治偏墜痛或小腸疝氣諸方第一馬藺子九十五炒用治疝醋炒即蠡實北人呼為馬楝是也甘平無毒治寒疝消水痢平癰腫愈瘡癤利大小腸止吐衄血除婦人血氣煩悶調婦科產後血運經脈不止之疾崩中帶下之疴根葉略同生荒野中就地叢生一本二三十莖苗高三四尺葉中抽莖葉似韭而長厚三月開紫白花五月結實作角子喉痹腫痛同升麻煎入蜜少許驗方第一水痢一切同白麵各炒米飲下第二睡死不寤用根取汁服之第三喉痹腫痛喘息欲死用根葉煎服第四小便不通用花同茴香葶藶炒末酒下第五牛蒡子九十六酒蒸焙乾研粉用大力子惡實鼠黏子辛苦無毒性降除癮疹之風濕解咽喉之風熱平瘡瘍之腫毒開腰膝之凝滯處處有之三月生苗高三四尺四月開花成叢淡紫色結實如楓梂而小萼上細刺百十攢簇之一梂有子數十顆其根大者如臂長者近尺其色灰黔七月採子十月採根浮腫咽塞酒下末驗方第一頭痛連睛同石膏末茶下第二頭痛有痰同旋花末茶下第三咽膈壅涎同炙草荊穗末湯下緩之第四喉痹腫痛同馬藺子末服第五咽中痘疹同桔梗甘草煎第六風熱癮疹同浮萍炒末薄荷湯下第七痘熱狂咽塞便秘同荊穗甘草煎第八便癰腫痛炒末同芒硝蜜水下第九蛇蠍蟲毒煎服第十水腫腹大炒末丸服十一手脂腫疼麻木或連肩膝同羌活末服十二牛蒡根葉苦寒無毒療一切癰疽惡瘡杖瘡金瘡反花治諸般風疾中風弱風勞風弱風燥熱發狂取根汁服驗方第一心煩熱恍惚同上第二一切風疾同生地枸杞牛膝浸酒服第三筋牽骨痛同地黃黑豆浸酒服第四面忽腫痛用根酒煎膏貼之仍酒服第五頭風白屑同葉熬稠塗之至明皂角水洗下第六咽熱腫用根煎服第七項上癭疾用根或煎或丸第八小便不通臍腹急痛同生地滑石蜜水煎下第九瘡癤以葉貼之第十諸瘡腫毒取汁入米煮粥服十一積年惡瘡以根取汁合豬脂油封之十二漏瘡同上十三蒼耳九十七炒去刺或酒蒸忌豬肉馬肉米泔甘苦微溫無毒發表汗散風濕通腦頂達足膝浴一身之瘙癢止四肢之拘攣除頭痛而去目暗療齒痛而止鼻淵周痹喉腫之疾瘰癧瘡疥之疴處處有之今多生豆田中不見開花秋後結子而多刺者是也赤目生瘡稍加乳香為末紙卷燒煙㗜鼻止痛驗方第一婦人積乳蒼耳七個針扎著豆油燈上燒焦為末水沖服發汗神效第二莖葉苦辛微寒除大熱癲癇去頭風濕痹追骨髓腰膝之風毒解中風傷寒之表邪燒灰合脂封疔腫之頑惡以根煮酒治狂犬之咬傷疔溪毒而息毒螫殺蟲疳而除濕䘌久瘧酒炙酒丸服驗方第一水腫尿澀燒灰同葶藶末服第二攣痹炒末服第三牙腫痛水煎漱吐之第四鼻淵湯下炒末第五目昏暗子莖葉為末合米粥丸或食第六嗜酒欲解用蒼耳七個燒灰投酒中服之即不飲酒第七赤白痢用莖熬稠去渣入蜜熬膏服第八產後諸疾用葉絞汁服第九鼻衄同上第十牙動痛用莖以漿水煎入鹽漱之十一一切疔腫危者根葉搗合童尿絞汁冷服日三十二反花瘡用葉取汁服並敷之十三大麻風用葉為末大楓油丸茶下十四面上黑斑用葉焙末米飲下一月愈也十五赤白汗斑用葉搗爛同青鹽搽之五七次十六風瘙癮疹身癢子莖葉為末豆淋酒下二錢外洗之十七手足腫痛欲斷搗汁漬之以渣敷之十八頭暈用葉或末或蜜丸十九萬應膏蒼耳連莖根葉水熬去渣再熬成膏或貼或含化或酒下治一切癰疽發背無頭惡瘡腫毒疔癤一切風癢臁瘡杖瘡牙疼喉痹諸方第一杜牛膝九十八地黃為使即天名精根甘寒無毒破瘀止血殺蟲解毒吐痰除熱利水通淋療腫疼之乳蛾息急慢之驚風敷蛇蟲螫傷漱齒牙之疼痛吐瘧疾之老痰揩身癢之癮疹生平原川澤江湖間皆有嫩苗綠色似皺葉菘芥長則起莖開小黃花如小菊結實如同蒿子最黏人衣狐氣尤甚炒熟則香鶴蝨天名精實也辛苦有小毒殺五臟諸蟲療心腹蟲痛蛔咬心痛時發時止痛則面白唇紅是也用鶴蝨蜜丸豆大每蜜湯四十丸驗方第一小兒蛔咬心痛鶴蝨為末以肥豬肉汁下之第二大腸蟲出鶴蝨為末水下半兩第三乳蛾癰用杜牛膝絞汁服以渣敷之第四急慢驚風牙緊同上第五產後尿澀渴咈面赤大便瀉行血利水不效者以杜牛膝煎服第六豨薟九十九豬膏莓火鍁草苦寒有小毒治腎肝風氣療四肢麻痹筋骨冷痛之風腰膝無力之濕解風濕諸瘡金瘡惡瘡敷蜘蠶諸傷虎咬犬傷處處田野有之節葉相對頗同蒼耳瀉因風者為末醋丸服驗方第一癰疽腫毒一切惡瘡同乳香枯礬末每酒下二錢汗出第二蘆根一百甘寒無毒除反胃之嘔噦止小便之頻數傷寒內熱最良消渴客熱至效蘆筍利客熱煩渴之火且利小便解魚蟹河豚之毒並解諸肉毒處處有之多生下濕陂澤中其狀都似竹而葉抱莖生無枝花白作穗其根浮水者不堪用嘔噦不止蘆根一斤水煎濃汁服驗方第一氣滯胸膈噎食水煎五兩服第二反胃上氣同茅根各二兩煎服第三霍亂煩熱佐麥冬服第四食犬肉毒心下堅或脹水煎服第五食馬肉毒食蟹魚毒中藥箭毒俱同上第六霍亂煩悶渴脹水煎蘆葉服第七發背潰爛陳蘆葉為末用蔥椒湯將瘡洗淨敷之第八癰疽惡肉蘆莖灰煎膏敷之第九蘆根飲蘆根麥冬骨皮生薑陳皮茯苓水煎取汗治骨蒸肺痿諸方第一葦莖湯蘆莖二升水入煎汁五升入桃仁五十粒薏仁瓜瓣各半升取二升服之當吐膿血治肺癰咳嗽第二芭蕉根百零一甘寒無毒治天行之熱狂除產後之血脹塗癰腫結熱療煩悶消渴一切腫毒搗敷之驗方第一赤遊同上第二風熱頭痛同上第三天行熱狂搗汁服第四消渴煩熱同上第五血淋痛同上第六產後血脹同上第七瘡口不合取汁抹之第八麻黃百零二去根節厚朴白薇為使惡辛夷石葦凡服麻黃須避風一日辛溫微苦無毒入足太陽膀胱手太陰肺解傷寒頭痛身熱止咳嗽上氣喘息去營中之寒邪泄衛中之風熱治風濕之身痛療寒濕之腳氣理溫瘧而破癥結開毛孔而通九竅平疹痹而去麻木消斑毒而退痰哮目赤腫痛之疾水腫風腫之疴有汗者勿用生晉地及河東立秋採鄭州鹿臺關中沙苑等處皆有之梢端有黃花結實如百合瓣而小凡煎宜去上沫再煎常患吼喘麻黃一錢生軍二錢巴霜一錢陳皮一錢五分南星一錢五分為丸豆大每服三丸水煎服驗方第一半夏麻黃丸半夏麻黃丸服治心下悸動以傷寒邪未盡故也諸方第一麻黃湯麻黃桂枝炙草杏仁治傷寒身熱頭痛惡寒無汗身痛脈浮緊第二大青龍湯麻黃湯原方加石膏姜棗治發熱頭痛惡寒無汗身痛脈浮緊而煩躁者第三小青龍湯麻黃桂枝白芍炙草半夏五味細辛乾薑治喘咳乾嘔發熱第四麻杏石甘湯麻黃杏仁石膏炙草治汗出而喘身無大熱第五麻附細辛湯麻黃細辛附子治發熱脈沉少陰傷寒第六麻黃升麻湯麻黃升麻葳蕤石膏知母天冬當歸白芍黃芩白朮桂枝茯苓甘草乾薑治咽不利吐膿血瀉利不已者第七麻杏薏甘湯麻黃杏仁薏仁甘草治身痛寒熱日晡所劇者第八越婢湯麻黃石膏甘草姜棗治浮腫身痛脈浮汗出惡風者第九麻附甘草湯麻黃附子甘草治腰以下腫脈沉小者第十小續命湯麻黃防己人參黃芩桂心白芍甘草川芎杏仁防風附子生薑治中風欲死身體緩急口目不正舌強不言諸風悉驗十一續命湯麻黃桂枝當歸人參石膏乾薑炙草川芎杏仁治中風口不能言冒昧或拘急不轉側又治咳逆上氣面目浮腫不得臥十二麻黃根甘平無毒止汗盜汗同牡蠣粉撲之驗方第一諸虛自汗同牡蠣小麥黃耆服第二產後虛汗同當歸黃耆服第三陰囊濕疹同硫黃米粉末敷之第四木賊百零三味甘微苦無毒除目翳消積塊止崩中赤白療腸風瀉痢提月水滑流收大腸脫肛解肌止淚而澀血祛風除濕而治疝出秦隴華成諸郡近水處今所在近水地有之苗長尺許叢生每根一杆無花寸寸有節色青凌冬不凋採無時目昏多淚與蒼朮末服或丸驗方第一舌硬出血煎漱第二血痢不已煎服第三脫肛為末摻之第四月水不斷炒煎服第五吞錢為末雞子白合服第六木賊散木賊香附芒硝等分為末每二錢治血崩黑色酒下紅色水下痛加乳沒當歸諸方第一燈草百零四以大米粉漿染過曬乾為末入水澄之浮者是燈心也曬乾用以管收貯連管燒則成炭甘寒無毒煎湯除水腫之癃閉燒灰吹厄急之喉痹通水氣而利陰竅降心火而治諸淋最宜止血善解消渴生江南澤地陝西亦有之叢生莖圓細而長直破傷出血嚼敷立止驗方第一鼻衄不已為末佐硃砂飲下第二喉風痹塞為末佐硼砂吹之第三夜不合目代茶飲之第四濕熱黃疸四兩水酒入瓶煮半日露一夜溫服第五生地黃百零五得酒麥冬良惡貝母畏蕪荑甘寒微苦無毒入太陰脾厥陰肝手足少陰厥陰涼血滋肝清風潤木消瘀通經潤燥開結解溫病之陽旺退痘瘡之熱盛除咳嗽火動調崩中之血熱溺唾吐衄之血驚悸痿痹之疴填骨髓而長肌肉平折跌而續絕筋最損脾胃尤瀉大腸處處有之懷慶出者力大江浙出者力微初生塌地葉如山白菜而毛澀葉面深青色又似小芥葉而頗厚不叉丫葉中竄莖上有細毛莖梢開小筒子黃紅花結實如小麥粒熟地黃酒洗良忌萊菔蔥蒜諸血甘平無毒入手足少陰厥陰滋腎益陰填髓生精黑鬚烏髮聰耳明目經候胎產之疾五勞七傷之疴取肥地黃洗淨以揀下瘦短者搗絞汁投石器浸漉甑上蒸數次光黑如漆也近時造法取肥大地黃以好酒入砂仁末在內拌勻入柳木甑內蒸曬數次今布中惟以酒煮熟耳咳而唾血勞瘦骨蒸生地末煮粥食驗方第一吐血咳嗽每酒下熟地末一錢第二鼻血不已生地同薄荷末服第三腸風下血生地同五味子蜜丸服第四疔腫乳癰生地搗敷熱另易之第五一切癰疽未破疼痛生地杵泥攤在上摻木香末於中又攤生地泥一重貼之三五次即內消第六打撲損傷未破痛疾同上第七物傷睛突生地泥綿包敷之第八目暴赤痛生地黑豆杵膏罨之第九血熱牙痛切生地咬之第十牙動欲脫生地綿包咂之令汁漬根且咽之十一耳中常鳴生地塞之數易十二竹木入肉生地杵爛敷之十三骨蒸勞熱生地或膏或蜜丸十四睛被物傷珠脹痛腫外敷搗爛生地膏內服川芎生地羚羊角大黃赤芍枳殼木香十五腎氣丸乾地黃山茱萸肉茯苓澤瀉丹皮肉桂附子治虛腰痛小腹拘急小便不利又治婦人轉胞不得小便短氣又治男子消渴尿多諸方第一瓊玉膏生地十六分參末一分茯苓末三分入瓶內封固安鍋中煮三日取出浸井底一日再煮每用白湯下或酒下治虛勞乾咳或咳嗽帶血與一切血症第二六味地黃丸熟地山藥茱萸肉澤瀉茯苓丹皮治腎陰不足發熱作渴小便淋閉氣壅痰嗽頭目眩暈目花耳聾咽乾吞痛齒牙不固腰腿痿軟盜汗失血血虛發熱失音等症第三八味地黃丸六味原方加桂附蜜丸治虛勞腰痛少腹拘急小便不利又治婦人煩熱不臥轉胞不溺第四牛膝百零六酒浸用生用下行焙用滋補畏白前忌牛肉酸苦無毒入腎肝二經補肝腎益筋骨逐惡血破癥結強足補精療腰膝之實痛祛濕解痹伸筋骨之拘攣淋痛尿血之劑喉痹齒痛之藥癰腫惡瘡悉療金瘡折傷皆醫操通經落胎之權擅補中續絕之能同乳香止莖中之痛引諸藥至足膝之地處處有之以川中人家栽蒔者為良方莖暴節葉皆對生秋月開花作穗結子如小鼠負蟲有澀毛皆貼莖倒生九月取根宋時以懷慶者為良消渴不止為末五兩生地汁浸日曬夜浸蜜丸服驗方第一下痢先赤後白此腸蠱也酒漬二兩每服一兩第二女人血塊酒煎服第三女人陰痛酒每煎一兩服第四胞衣不下二兩冬葵一兩水煎服三服下第五產後尿血水煎常服第六口舌瘡爛酒漬含漱或煎服第七牙痛煎末漱之第八金瘡痛搗敷立止第九猝得惡瘡人不識者搗敷之第十風瘙癮疹及㾦㿔為末酒下十一萬病丸牛膝酒浸一宿焙末乾膝炒令煙盡用生地汁熬令可丸豆大每五丸治經淋經閉又治繞臍疝痛又治產後癥結諸方第一紫苑百零七蜜炙用冬花為使惡天雄瞿麥藁本雷丸遠志畏茵陳苦溫無毒消痰止渴潤肺下氣為痰嗽血勞之聖藥及咳吐膿血之靈丹驚癇喘悸之疾痿躄喉痹之疴近道處處有之春月採三月布地生苗其葉二四相連五六月開黃白紫花結黑子根如北細辛者為良今多以車前旋覆根赤土染過偽之不可不知久嗽不差同冬花百部末生薑烏梅下驗方第一肺傷咳嗽水煎服第二小兒咳嗽聲不出同杏仁蜜丸五味湯下第三產後下血水下末第四纏喉風痹不通用紫菀一莖納入喉中取涎出瘥更以馬牙硝津咽之第五婦人小便猝閉為末井水下三撮第六婦人小便血同上第七麥冬百零八湯泡去心酒浸滋補地黃車前為使惡款冬畏苦參青葙木耳甘平微寒無毒入肺胃二經潤肺清心瀉熱除煩消痰止嗽利水生津定肺痿吐膿解時疾熱狂嘔吐痿痹之疾經枯乳閉之疴所在有之葉如韭冬夏長生今多栽蒔而成其法四月初採根栽之每六月九月十一月三次上糞及耘灌夏至前一日取根曬收其子亦可種但成遲耳浙中來者甚良血衄不已同生地煎三錢立已驗方第一齒縫出血煎漱之第二咽中生瘡佐黃連蜜丸服第三麥冬湯麥冬半夏大米人參甘草大棗治咳而火逆上氣喉不利諸方第一麥冬煎麥冬絞汁合蜜重湯煮攪不停手如飴溫酒每日化下補中益心悅顏安神令人肥健第二淡竹葉百零九甘寒無毒入手太陰肺利小便而清心除寒熱而涼肺根主催生墮胎處處原野有之苗高數寸細莖綠葉其根一窠數十須須上結子與麥冬一樣但堅硬耳隨時採之八九月抽莖結小長穗竹葉湯竹葉桔梗生薑附子葛根桂枝甘草防風人參大棗治產後中風發熱面赤喘而頭痛諸方第一石膏湯竹葉石膏麥冬大米人參半夏治大病瘥後虛羸少氣氣逆欲吐者第二冬葵子百一十甘寒淡滑無毒潤燥利竅下乳墜胎通營衛而滋氣脈行津液而通關格最利二便兼消水腫處處有之有紫白二種以白莖為勝大葉小花紫黃色最小者名鴨腳葵其實大如指頂皮薄而扁實內有子輕虛如榆莢仁四五月種者可留子六七月種者為秋葵八九月種者為冬葵經年收採正月複種者為春葵而宿根至春亦生古人種為常食而今人不復食亦無種者矣蜀葵花赤者治赤帶白者治白帶蜀葵似冬葵處處人家種植初春布種宿根亦生嫩苗時亦可食高五六尺花似木槿而大有紫黑紅白之異惟紅白二色入藥天葵治五淋症天葵即菟葵狀如冬葵葉大如錢而厚面青被紫敗醬百十一俗名苦菜子辛苦微寒無毒入足厥陰肝調產後之惡露解帶下之赤白止吐衄之血逆卻心腹之瘀痛兼排癰膿最破瘀血處處原野有之春生苗葉布地夏秋莖高一二尺而柔弱數寸一節節間生葉四散頂開白花成簇其根白紫頗似柴胡產後腰疼同芎歸肉桂服驗方第一產後腹痛如刺水煎四兩服第二迎春花葉百十二苦澀無毒為末酒下最消腫毒惡瘡處處人家皆插之叢生亦有栽植成小樹正月開小黃花不結實花後方出葉款冬花百十三甘草水浸杏仁為使得紫菀良惡皂角硝石元參畏貝母辛夷麻黃黃耆黃芩黃連青葙子辛溫無毒入手太陰肺潤肺瀉熱消痰定喘止咳逆上氣煩渴療肺癰咳吐膿血驚癇喉痹之疾肺痿目暗之疴生常山及上黨水旁十二月採花出高麗百濟者花大似菊亦有生蜀北者生雍州溪水及華山澗水者葉似葵而大叢生花出根下生關中者根紫色葉似萆薢十二月開花青黃紫萼去土一二寸初出如菊花正月旦採今有以枇杷蕊偽之者不可不知久嗽不已以三兩燒煙筆管吸入口咽之數作驗方第一痰嗽有血同百合蒸焙蜜丸彈大臥時姜下第二決明子百十四搗碎用惡火麻仁石決明見三百八十五甘苦咸平無毒入厥陰肝經瀉肝明目退熱除風一切目疾皆療頭風腫毒悉醫有二種一種馬蹄決明莖高三四尺葉大如苜蓿而本小末大晝開夜合兩兩相帖秋開淡黃花五出結角如初生細豇豆長五六寸角中子數十粒參差相連狀如馬蹄青綠色入眼目藥最良一種茳芒決明苗莖似馬蹄決明但葉之本小末尖正似槐葉夜亦不合秋開黃花五出結角如小指長二寸許角中子如黃葵子救荒本草所謂山扁豆是也積年失明為末每食後粥下驗方第一青盲雀目同地膚末米飲丸服第二補肝明目同酒煮蔓荊子末服第三目赤腫疼炒末茶合敷太陽穴干則易之第四頭風熱痛同上第五癬瘡延蔓為末一兩入水銀輕粉少許研不見星刮破上藥第六發背初起佐甘草大劑煎服第七地膚子百十五俗名掃帚是也甘寒無毒益精強陰聰耳明目除膀胱之濕熱解皮膚之風熱利小便而通淋瀝治㿗疝而洗瘡疥處處有之其嫩葉作菜茹極甘美風熱目赤焙末生地汁合餅曬乾為末酒下驗方第一脅下疼酒下末第二狐疝陰㿗佐白朮稍加桂心末酒下第三積年腰痛酒下末第四血痢不止佐地榆黃耆末酒下第五妊娠淋痛水煎八兩分服第六疣目同白礬煎洗第七地膚苗葉苦寒無毒搗汁服治赤白下痢燒灰亦良水煎服療手足煩痛諸淋亦通洗目去熱暗亦洗雀盲澀痛固腸止瀉痢併除惡瘡疥癢瞿麥百十六竹瀝浸用丹皮為使惡螵蛸即石竹子苦寒無毒逐膀胱之邪熱熱淋血淋主月經之結閉破血墜胎降心火而利小腸決癰腫而排膿瘡明目去翳亦能開關利竅亦效處處有之熱淋或血同炙草山梔末蔥頭燈草生薑下驗方第一石淋酒下末當下石也第二子死腹中煎服第三九竅出血同山梔生薑炙草大棗燈草服第四骨哽水下末第五竹木入肉水煎末服第六箭刀在肉酒下末第七王不留行百十七蒸之漿水浸焙用苦平無毒入厥陰肝性行而不留下乳催生通經止衄除風祛痹行瘀調經平金瘡而止血利小便而除煩解瘡癰之毒出竹木之刺時珍曰多生麥地中高一二尺三四月開小花如鐸鈴紅白色結實如燈籠草子殼有五稜殼內抱實如豆大實內細子圓如細珠鼻血不止連莖葉煎服驗方第一糞後下血末服每一錢第二竹木入肉末服以根敷之第三留行散留行蒴藋雙皮厚朴黃芩白芍乾薑甘草川椒治金瘡刀斧傷亡血大瘡飲服小瘡粉之諸方第一湧泉散留行穿山甲龍骨瞿麥穗等分為末每酒下二錢治因氣無乳仍以木梳梳之第二葶藶百十八拌糯米炒用榆皮為使得酒良惡殭蠶辛苦大寒無毒入足太陽膀胱經下氣行水消腫除痰止咳定喘通經利便破積聚癥結解風熱痱癢虛人忌之生田野間春生苗葉高六七寸似薺三月開花色黃淡結角粗且短角中細子色黃一種狗芥葉似芥近根下作歧生角細長蓋甜葶藶也通身腫滿苦葶藶棗肉丸雙皮湯下驗方第一水腫喘滿面赤煩渴小水不利甜葶藶漢防己豬苓丸服白湯下第二水腫尿澀先煮大棗去渣入葶藶末再熬丸服第三積聚腹脹一升熬之酒五升浸七日服第四痰飲咳嗽同知母貝母炒末棗肉砂糖丸彈大含咽之脈弦緊者第五痰喘棗肉丸服第六咳而上氣不臥或一身腫或面腫或足腫以微火熬研絹盛浸酒中三日每服兩棗許以利為度第七月水不通蜜丸綿包納陰中數易之未生子者不可用男不在家者不可用第八頭風疼為末以湯淋沐頭三四度第九白禿頭瘡為末塗之第十葶藶大棗湯葶藶搗丸彈大棗十二水三盅煎二盅入葶藶丸一枚煮取一盅諸方第一頓服治喘急不臥息又治肺癰不臥車前百十九入湯炒用入丸散酒煮研爛作餅曬乾焙用常山為使甘寒無毒利小便而止瀉益陰精而明目除障翳赤痛之眼疾解煩熱淋瀝之熱邪根莖甘寒滑利無毒消瘀解衄利水通淋治金瘡而止血除煩熱而下氣處處有之春初苗葉布地中抽數莖作穗長花甚細密實如葶藶子赤黑色園圃所種者大道邊生者小短小便不通車前草半斤煎服驗方第一鼻血不已同上葉亦可第二金瘡血出搗敷之第三熱痢不止葉取汁入蜜煎服第四產後血滲入大小腸車前草取汁入蜜煎服第五濕氣腰痛連根七科連須蔥七莖大棗七枚煮酒服終身不發第六目赤作疼取汁入芒硝末塗眼第七小兒目疼取汁合竹瀝點之第八目中微翳車前葉枸杞葉手中揉汁以桑葉兩重包之懸陰處一宿取點目五次愈也第九石淋作痛絹袋盛三兩水煮服須臾石下第十血淋作痛每車前葉煎湯下車前子末二錢十一馬鞭草百二十辛苦微寒無毒破血通經殺蟲消脹治氣血症結消癰毒陰腫村墟下地甚多衡山廬山江淮皆有之春生苗方莖葉似益母對生夏秋開細紫花作穗如車前男陰腫疼人不能治者搗敷之驗方第一鼓脹煩渴身乾黑瘦水煎服第二經閉瘕塊肋脹欲死煎汁作膏酒化下第三酒積下血為灰四分白芷灰一分丸服第四魚肉癥結在胸膈不化取汁服第五發背癰腫取汁服外敷之第六連翹百二十一微苦辛涼無毒入手足少陽手陽明少陰厥陰排瘡膿消腫毒通月經治五淋散諸經血結氣聚除心肺客熱濕熱瘻癧癭瘤之疾蠱毒白蟲之邪為十二經瘡家聖藥葉莖治心肺積熱處處有之有大小二種大者生下濕或山岡青葉狹長如榆葉莖赤高三四尺梢間開黃花秋結實似蓮內作房瓣小者生崗原之上花葉實皆似大者而細小瘰癧結核同芝麻末時時食之驗方第一痔瘡腫疼煎熏洗之第二青黛百二十二咸寒無毒除小兒驚癇疳熱丹毒療傷寒發斑頭痛吐血咯血敷癰瘡蛇犬之毒解陰瘡惡蟲之邪波斯國藍靛花也既不可得則中國靛花亦可今所用皆自福建來者心口熱痛薑汁下一錢驗方第一內熱吐血新水下第二小兒口瘡青黛黃柏末摻之第三小兒驚癇水下第四小兒夜啼同上第五小兒疳痢小兒雜病變成疳不問強弱男女煩熱毛焦鼻口乾燥皮膚枯槁四肢癱瘓腹中時時下痢青黃赤白色目赤面黃鼻孔赤穀道開張為末服之良效第六耳疳出汁同黃柏末摻之第七爛眼皮同黃連泡湯洗之第八產後發狂同四物湯煎服第九傷寒赤斑水研服第十瘰癧未破同馬齒莧常搗敷之十一諸毒蟲傷同雄黃新水下十二大頭瘟青黛三錢燒酒一盅雞子清一個合勻服之十三藍靛苦寒無毒解諸毒熱瘡熱腫治膈噎止血殺蟲小兒熱丹敷之驗方第一天行熱毒煩躁新水下第二誤吞水蛭水下第三蓼實百二十三辛溫無毒明目溫中耐風寒而下水氣除癧瘍而止霍亂解小兒之頭瘡平面上之浮腫蓼類甚多有青蓼香蓼水蓼馬蓼紫蓼赤蓼木蓼紫赤二蓼葉小狹而厚青香二蓼葉亦相似而俱薄馬水二蓼葉俱闊大上有黑點木蓼一名天蓼蔓生葉似柘葉六蓼花皆紅白子皆大如胡麻赤黑而尖扁惟木蓼花黃白子皮青滑諸蓼並冬死惟香蓼宿根扁竹百二十四甘苦無毒利小便而通淋澀治霍亂而除黃疸療女子之陰蝕殺小兒之蛔蟲生東萊山谷今處處有之春生布地蔓延道旁苗似瞿麥葉細綠如竹赤莖節間花出細微惡瘡痂癢痛搗敷痂落即愈驗方第一心頭急痛醋煎通口服第二熱淋澀痛常煎服之第三熱黃疸疾取汁服之第四蒺藜百二十五酒蒸炒去刺烏頭為使辛苦微溫無毒補腎益精祛風明目治諸風癧瘍身體瘙癢之疾療諸結症積喉痹乳閉之疴止遺尿泄精並止溺血帶下解頭痛咳逆並解肺痿奔豚平癰腫而消陰㿗醫痔漏而殺蛔蟲卻吐膿而平燥熱去胸滿而治腰痛有催生墜胎之能擅長肉生肌之功有二種一種杜蒺藜即今道旁布地而生者開小黃花結芒刺一種白蒺藜出同州沙苑牧馬處子無刺今補腎藥多用之而風家惟用刺蒺藜也一切積聚蜜丸酒下驗方第一心痛吐水末服第二牙動痛或因打動五錢為末漿水半盅入少鹽溫漱甚效或以根燒灰貼牙即固也第三齒牙出血動搖為末常摻第四打動牙痛同上第五面上瘢痕同山梔末醋合夜敷旦洗第六白癜風每末下二錢第七催生下胞同貝母末服以下為度第八月經不通同當歸末每三錢第九大便風秘同皂角末服第十通身浮腫煎湯日洗十一腰脊引痛蜜丸酒下十二補肝散蒺藜搗末每服一錢治三十年失明諸方第一不老丹每末服一錢發白變黑絕谷長生第二穀精草百二十六辛溫無毒治目翳目盲兼治喉痹瘡疥除頭風頭痛併除齒牙風痛此草收谷後荒田中生之江湖南北多有之一科叢生葉似嫩谷秧抽細莖高四五寸莖頭有小白花點點如亂星九月採花目中翳膜同防風末服驗方第一痘後目翳為末豬肝蘸食第二雀目為末竹刀開羊肺入煮食之第三小兒中暑吐瀉煩渴燒末服第四海金沙甘寒無毒治諸淋莖痛解濕熱腫滿江浙湖湘川陝黔中皆有之生山林下莖細如線引於竹木上高尺許葉細如芫荽而甚薄背面皆青上多皺紋皺處有沙子狀如蒲黃不開花細根堅強以沙拋燈火灼者真也傷寒狂熱同山梔牙硝硼砂服之驗方第一小便不通為末生薑甘草湯下第二膏淋如油同南滑佐甘草末麥冬湯下第三血淋痛澀新水下末第四海金沙散金沙二錢白朮四兩甘草半兩黑醜頭末一兩每服一錢倒流水下治腹脹如鼓喘不臥諸方第一紫花地丁百二十七俗云苦丁茶是也苦辛寒無毒治一切癰疽瘰癧惡瘡處處有之二三月生多布麥田中葉似柳而微細開紫花結小角疔瘡腫毒取汁內服杵爛外敷驗方第一瘰癧瘡疔發背諸腫同蒺藜末油合敷第二一切惡瘡以罐盛燒煙燻之出黃水盡愈第三稻芒黏咽嚼咽之第四黃疸內熱酒下末第五癰疽惡瘡同蒼耳葉搗酒下第六大黃百二十八得酒良黃芩為使無所畏忌冷水惡乾漆陳久者佳有錦紋者勝味苦大寒無毒入足陽明胃太陰脾厥陰肝瀉熱行瘀決壅開塞除陽亢之譫語解實結之滿痛下陽明之結燥除太陰之濕蒸通經脈而破癥結消癰疽而排膿血乃盪滌腸胃之峻劑通利二便之靈丹生河西山谷及隴西今蜀川河東陝西皆有之以蜀川錦紋者為佳其次秦隴來者謂之土番大黃正月生青葉似蓖麻大者如扇根如芋大者如碗長一二尺其細根如牛蒡四月黃花亦有青紅似蕎麥花者莖青紫色形如竹二八月採江淮出者為土大黃二月開花結細實癰腫熱痛醋合末敷之驗方第一腫毒初起同五倍子黃柏合末新水調敷第二火丹赤腫遍身磨水刷之第三湯火傷蜜合末敷第四凍瘡破爛水合末敷第五損傷內瘀脹痛同當歸服第六鼻中生瘡同杏仁搗勻豬脂合敷第七口瘡爛糜同枯礬末搽之吐涎第八牙痛齦血崩落口臭同生地各切片合貼之第九胃火牙痛為末口含涼水以紙捻蘸大黃末隨左右吹鼻立止第十目暴赤痛同四物湯服又吹鼻方乳者五分沒藥五分雄黃三分火硝一錢黃丹五分研細末吹鼻十一婦人陰腫痛酒煎一兩服十二產後血塊醋熬膏丸服十三食已即吐同甘草煎服每一兩十四熱利急痛脈實酒煎一兩服之十五赤白濁淋每末六分以雞子破頂入藥攪勻蒸熟食三服已也十六骨蒸積熱黃瘦大黃四分童尿煎服十七小兒諸熱煨熟同黃芩蜜丸服十八久患積聚二便不利上搶心腹脹滿同白芍丸服十九腹中痞塊醋蜜丸服二十婦人室女經脈不通大黃三錢燒存性有實熱者生地三錢為末空心酒下又大黃三錢藿香少許斑蝥五六個去頭足共為末每服五六分先熱水漱口令淨即食棗三枚將藥溫酒調服再食棗三枚忌驚擾待腹痛二三陣經即行不痛再服後服平胃散以平胃此二方必脈人壯強者可用二十一大承氣湯大黃芒硝厚朴枳實治臍腹滿痛大便燥結脈實諸方第一小承氣湯大黃厚朴枳實治同第二大陷胸湯大黃芒硝甘遂水煎治結胸心下石硬不按亦痛或硬至少腹脈沉緊或潮熱第三大陷胸丸大黃芒硝葶藶杏仁丸彈大每一丸症同上兼項強者第四大黃黃連瀉心湯大黃黃連以麻沸湯漬之須臾絞去渣服治心下痞按之自濡第五桂枝大黃湯桂枝白芍炙草姜棗大黃治腹滿實痛第六大黃硝石湯大黃硝石黃柏山梔水煎治黃疸腹滿自汗小水不利而赤第七大黃附子湯治脅下痛發熱脈弦緊第八抵當湯大黃桃仁水蛭虻蟲為末煎治少腹結滿小水自利發熱脈沉有力第九大黃䗪蟲丸大黃甘草杏仁白芍地黃桃仁乾漆虻蟲水蛭䗪蟲黃芩蜜丸服治腹滿而瘦目暗肌錯第十下瘀血湯大黃桃仁䗪蟲蜜丸彈大酒下治產後腹痛在臍下者亦治經水不利十一大黃甘遂湯大黃甘遂阿膠煎服治產後少腹滿小便微難十二大黃丹皮湯大黃芒硝桃仁丹皮治腸癰少腹腫痛小便不調自汗發熱脈遲緊者十三瀉心湯大黃黃連黃芩水煎治吐衄血十四備急丸大黃乾薑巴霜蜜丸豆大每三丸治猝痛心腹如錐刺十五金黃散大黃甘草等分為末酒熬成膏治一切腫毒癰癤初起內服酒下外敷貼之十六生軍散為末醋合敷治一切腫毒癰癤初起十七己椒藶黃丸生軍一兩葶藶一兩椒目一兩防己一兩蜜丸豆大每三丸日三服不知稍增之治腹滿口舌乾燥此水在腸間外症不必有水形也十八商陸百二十九黑豆同蒸用忌犬肉入湯宜用白花者辛甘有毒入足太陽經療水腫除癰腫解腹滿塗喉痹通二腸而墜胎孕除蠱毒而殺鬼物生咸陽川穀今所在有之多生人家園圃中春生苗高三四尺青葉如牛舌而長莖青赤至柔脆夏秋紅紫花作朵根如蘿蔔而長有赤白二種白者入藥赤者有毒八九月採一切腫毒入鹽少許搗敷之驗方第一石癰如石不作膿搗敷第二瘡傷水毒搗炙布包熨之數易之第三水氣腫毒水煎去渣入米煮服以利為度第四痃癖如石熬取汁同杏仁泥煎如飴每服棗許下惡物為度第五腹中有物如石痛刺呼啼炙熱晝夜熨之第六白聖散樟柳根三兩大戟兩半甘遂一兩每末服二錢熱湯下治產後腹大堅滿喘不能臥諸方第一大戟百三十水煮去骨用小豆為使惡山藥反甘草畏菖蒲蘆葦鼠屎苦寒有毒入足太陽經解諸水之腹滿下惡血之癖症散頸腋之癰腫洗腳氣之腫痛利二便而通月水消疹風而墜胎孕生常山十二月採今平澤中多有之直莖高二三尺中空折之有白漿葉長狹如柳葉而不圓其梢葉密攢而上以杭州紫大戟為上江南土大戟次之北方色白者能傷人服之或至吐血不可不知水腫喘急同乾薑末服以利為度驗方第一水腫同當歸陳皮各一兩服以利為度第二水腫腹大如鼓或一身浮腫用棗二斤與大戟六兩同煮食棗盡愈矣第三牙搖痛咬之第四百祥膏大戟煮熟去骨為末丸粟大每二十丸赤芝麻湯下治咳而吐綠水者又治痘瘡紫黑便秘不寒者諸方第一澤漆百三十一小豆為使惡山藥貓兒眼睛草也辛苦微寒無毒入足太陽經消痰退熱止嗽殺蟲解大腹而消腫滿利二便而行水氣江湖原澤平陸多有之苗一科分枝成叢柔莖綠葉葉圓而黃綠頗似貓眼莖頭凡五葉中分中抽小莖五枝每枝頭細花青綠色復有小葉承之齊整如一枝莖有白汁黏人或以此為大戟苗者誤也心下伏瘕如杯不得食者同大黃葶藶蜜丸服驗方第一十種水氣熬膏服酒下第二澤漆湯澤漆十半夏十白前三黃芩二人參二甘草二紫菀二桂枝二生薑三治咳而脈沉者諸方第一
