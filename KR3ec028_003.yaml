body:
  text: 本草易讀卷三甘草第一去赤皮切用蜜炙補中生用瀉火苦參乾漆為使惡遠志反大戟芫花甘遂海藻大而緊結者良味甘氣平性緩無毒入脾胃二經和諸藥解百毒養育二土培植中州上行宜頭下行宜梢生用瀉火熱熟用散表寒咽喉腫痛一切瘡瘍並宜生用生河西山谷積沙山及上郡枝葉如槐狀結角如相思子二八月採根滿家忌之嘔家無用按仲景治滿家諸症俱用之是滿家不忌甘草也甘草梢治胸中積熱止莖中疼痛陰頭生瘡蜜炙頻敷驗方第一代指腫痛煎湯漬之第二陰下濕癢煎湯常洗第三痘瘡煩渴蜜炙同花粉煎服第四一切癰疽熱酒沖不常服第五舌腫塞口煎湯熱漱頻吐第六癰疽發背熬膏服之第七口瘡發白同白礬嚼咽第八乳癰初起蜜炙煎服第九大人羸瘦小便煎服第十小兒尿血水煎服十一小兒羸瘦蜜丸黍米大每湯下二十丸十二心悸脈結水煎服十三一切咽痛水煎服十四肺痿多涎同乾薑煎服十五小兒熱嗽膽汁浸蜜丸薄荷湯下十六肺痿久嗽涕唾多骨節煩悶寒熱炙末小便調服十七下疳潰爛同黑豆槐枝蔥根水煎洗之十八代指初痛甘草朴硝各五錢水煎漬之十九代指潰爛同琥珀血餘輕粉銀硃花椒黃蠟麻油熬膏敷之二十復脈湯炙草桂枝人參生地阿膠麻仁生薑大棗麥冬酒水煎服治脈結代心動悸者諸方第一瀉心湯炙草大棗半夏黃連黃芩生薑治心下痞硬嘔煩雷鳴下利第二四逆湯炙草乾薑附子治脈沉腹脹自利不渴者膈上有寒飲乾嘔者外熱內寒內拘急四肢痛厥利者第三通脈四逆湯炙草乾薑附子治下利清穀厥逆脈欲絶者下利清穀外熱內寒汗出而厥者第四四逆散炙草枳實柴胡白芍末服治泄利下重四逆或咳或悸或癃或腹中痛者第五甘草乾薑湯炙草乾薑治煩躁吐逆厥冷第六甘草附子湯炙草白朮附子治骨節煩痛汗出短氣小便不利惡風不欲去衣或身微腫者第七甘草麻黃湯甘草麻黃治皮水一身面目黃腫小水不利者第八調胃承氣湯炙草大黃芒硝治發汗不解蒸蒸發熱者第九甘草湯生甘草治少陰咽痛第十甘草蜜粉湯甘草官粉蜜水煎後入粉治蛔蟲為病吐涎心痛發作有時十一甘麥大棗湯甘草二錢大棗七個小麥一把治臟躁悲哭十二奔豚湯甘草半夏生薑白芍當歸川芎黃芩葛根李根白皮治奔豚上衝胸腹往來寒熱十三黃耆第二蜜炙補中生用透表茯苓為使惡龜甲白鮮皮畏防風然黃耆得防風其功益大乃相畏更相使也味甘氣平入足陽明胃足太陰脾補虛弱排瘡膿益元氣壯脾胃祛肌熱斂汗泄助當歸以生血佐防風以驅風生用微涼實表斂汗者宜之生蜀郡山谷隴西洮陽等處山西綿上者良緊實如箭桿者佳葉似槐又似蒺藜開黃紫花結小尖角內有熱者勿用凡使勿用苜蓿根俗名土黃耆味苦而堅脆服之令人瘦又與木耆草相似用者慎之腸風下血同黃連丸服驗方第一尿血痛甚同人參末用蜜炙萊蔔如指厚四五片不令焦蘸末食之鹽湯下第二汗渴脈虛不洪同當歸煎服第三風病不語同防風煎水蒸之第四小便不通水煎服第五氣虛白濁同茯苓末服第六嗽膿血咽乾同甘草末服第七一切癰疽初起同當歸淨花甘草酒服汗之第八胎動腹痛下黃汁同川芎糯米煎服第九代刀散生耆四錢穿山甲一錢川芎三錢當歸二錢角刺一錢五分瘡在上先飲酒一杯諸方第一黃耆湯黃耆白芍桂枝苦酒治黃汗身腫發熱汗出而渴脈自沉者第二桂枝黃耆湯治黃汗兩脛自冷腰腿弛痛如有物在皮中身痛重煩躁腰以上汗出小便不利者第三五物湯黃耆桂枝白芍生薑大棗治血痹身體不仁狀如風痹脈微尺緊小者第四黃耆建中湯桂枝白芍炙草生薑大棗膠飴黃耆治虛勞裡急諸不足者第五防風黃耆湯防風三錢黃耆一兩水煎服治中風不遂脈遲弱者第六玉屏風散防風黃耆白朮為末酒下治風邪久留不去或自汗不已者第七黃耆五物湯黃耆白芍桂枝生薑大棗水煎服治風癱身無痛半身不遂手足無力不能動履者久久服之自見其效第八竹葉黃耆湯竹葉黃耆生地白芍麥冬臺參當歸川芎半夏黃芩甘草石膏水煎服治消渴氣血虛胃盛者第九保元湯黃耆臺參肉桂甘草治男婦氣虛嬰兒驚怯痘家虛寒第十聖愈湯臺參黃耆當歸川芎白芍熟地治一切失血過多煩熱作渴睡臥不安十一當歸六黃湯當歸黃耆地黃黃芩黃連黃柏治陰虛有火盜汗發熱十二黃耆建中湯方見上治虛勞裡急悸衄腹痛夜夢失精四肢痠痛手足煩熱咽乾口燥諸不足者十三黃耆當歸白芍桂枝防風姜棗治手足一身麻木十四黃耆蒼朮獨活防風升麻葛根炙草白芷川椒姜棗蔥忌冷物治鼻不聞香臭十五人參第三忌鐵茯苓為使畏靈脂惡皂角黑豆紫石英人尿滷鹼反藜蘆按交泰丸參皂同用是惡而不惡也療月閉參靈並劑是畏而不畏也味甘微苦無毒入脾胃二經續氣通脈止渴生津汗後膚熱痢久身涼非此莫療脈微欲絶血脫欲死非此罔救回陽於氣幾息益氣於熱所傷面赤黑氣壯肺熱脈長實滑數有力者無用面白黃氣微肺寒脈虛大細弱無力者宜用也生上黨山谷及遼東遼東即高麗參也二八月採勿令見風根如人形者良上黨即潞州也民以人參為地方害不復採取今所用者皆是遼參亦可收子於十月下種如種菜法秋冬採者堅實春夏採者虛軟非地産有虛實也遼參連皮者黃潤色如防風去皮者堅白如粉僞者皆以沙參薺苨桔梗造作亂之體虛無心味淡者沙參也體虛無心者薺苨也體堅有心味苦者桔梗也體實有心味甘微苦者人參也産後喘經閉者為末煎蘇木沖服驗方第一喘急欲絶水煎服或末服第二産後不語同菖蒲蓮肉煎服第三産後祕塞同麻仁枳殼蜜丸服第四聞雷即昏同當歸麥冬五味煎膏服第五厥逆煩躁脈微欲絶同膽星煎服第六産後感寒厥逆腹痛脈伏同薑附煎第七小兒風癇瘛瘲同蛤粉辰砂豬心血丸服第八小兒驚後瞳斜同阿膠煎服第九小兒多困同冬瓜仁南星服第十酒毒目盲為末蘇木煎沖服十一嗜酒生疽同酒軍為末姜水下十二狗咬腫痛用桑火燒末敷之十三蜈咬蜂螫嚼敷之十四下痢噤口同黃連蓮肉煎細細呷之一日盡劑十五厥痢脈細同附子生薑丁香煎服十六牙縫出血同赤苓麥冬煎服十七消渴為末雞子清調服十八吐下血湧為末同柏葉芥穗飛面新水含服十九吐血後困倦同棗煎服二十咳嗽吐血同黃耆飛面百合丸服茅根湯下二十一喘咳嗽血脈無力為末雞子清合服去枕仰臥二十二痰咳為末同白礬以醋熬成膏再煉蜜和收每含豆許二十三肺熱聲啞同訶子為末噙咽二十四心下硬按之無常覺脹膨噫厄不除同陳皮蜜丸服二十五目珠陷塌參乾薑雲苓桂枝首烏煎服二十六歸脾湯人參元肉黃耆白朮雲苓同二錢當歸一錢棗仁一錢炒遠志一錢甘草五分木香三分姜水煎服治大便下秫米水心旁脅間痛甚者九死一生之候諸方第一又方單用元肉一味有生者上大方可不必用第二理中湯人參白朮乾薑炙草治胸痹心痞胸滿脅逆搶心第三理中丸方同上治霍亂吐利頭身疼痛寒多不用水者第四四逆加參湯甘草乾薑附子人參治霍亂利止脈微者第五新加湯桂枝白芍炙草生薑大棗人參治汗後身痛脈沉遲者第六通脈四逆湯甘草乾薑附子治下利清穀內寒外熱厥冷脈微或利止脈不出者第七人參白虎湯石膏知母炙草粳米人參治汗後心煩口渴舌燥欲飲水數升脈洪汗出者亦治消渴又治中熱汗出惡風身熱而渴者第八小柴胡湯柴胡黃芩半夏人參炙草生薑大棗治少陽往來寒熱胸痛脅滿第九獨參湯人參治氣虛昏厥脈微欲絶婦人崩産脫血血暈第十參附湯人參附子治氣血暴脫十一生脈散人參五味麥冬治熱傷元氣氣短倦怠口渴出汗十二四君子湯人參白朮茯苓炙草治面白氣微四肢乏力脈虛弱或虛熱或飲食難化十三四時瘟疫熱毒以及風痰嗽咳身熱鼻塞脈洪而盛柴胡桔梗羌活獨活茯苓川芎前胡枳殼人參甘草薄荷治四時瘟疫一般者加葛根兼治痢疾發熱者十四異功散臺參白朮雲苓炙草陳皮治一切脾胃不和吐瀉霍亂虛損等及小兒一切十五人參白虎湯又治三陽合病腹滿身重譫語遺尿不能轉側引飲有汗似風濕癱瘓者方見上第八十六沙參第四惡防己反藜蘆甘苦微寒入肝脾肺三經清肺火養肝氣治久嗽之肺痿療猝痛之疝氣處處山原有之葉如枸杞而小有細齒開紫白花結實如冬青生沙地者長尺余大一虎口生土地者短而小根莖皆有白汁秋月採者白而實春月採者黃而虛貨者往往系蒸壓實以亂人參但體輕鬆味淡而短耳肺寒者忌用肺熱咳嗽水煎服驗方第一猝得疝氣痛引陰中如絞為末酒沖服第二白帶每米飲下二錢末第三皮膚風癢疥癬惡瘡內服外洗第四桔梗第五泔浸炒用畏膽草白芨忌豬肉苦辛微溫入手太陰肺足少陰腎療咽喉之疼痛開胸膈之壅塞排膿血化凝郁散結滯消腫硬治肺癰已潰止胸痛如刺行下氣衝最除鼻塞口舌瘡瘍悉療目赤腫痛亦醫性輕飄上走能引諸藥至胸中至高之分如鐵石入江非舟輯不載諸藥有此一味不能下沉也在處有之莖葉如小杏樹與薺苨相似但其根有心若無心者為薺苨也八月採生耆一錢淨花三錢桔梗三錢苡仁五錢貝母一錢五分甘草甜葶藶各一錢治肺癰未成即消已成即潰已潰即愈又方元參三錢天冬二錢桔梗二錢甘草一錢公英二錢淨花二錢效同上肺癰已潰吐膿血同甘草煎服驗方第一咽痛同甘草煎服第二口舌生瘡同上第三牙根腫痛為末棗肉為丸綿包咬之荊芥湯漱第四牙疳臭爛同茴香燒末敷之第五目睛痛為末少加黑醜蜜丸服第六鼻衄末服之第七吐血下血同上第八痰嗽喘急童便煎服第九胸滿不痛同枳實煎服第十腹脹同半夏生薑陳皮煎服十一妊婦卒中心腹疼痛同生姜煎服十二一切咽腫痛甘草一兩桔梗二錢元參二錢有表加羌防出汗十三聲啞同烏梅肉甘草五味子烏藥煎服十四桔梗湯與上驗方第一同治肺癰咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久而吐膿血者諸方第一肺癰之症宜細詳審有似胸痹者有痿癰同疴者有厥陰上衝胃癰潰後均吐膿血者毫釐之差千里之謬此處一誤生死立判非藥方之不靈審症之不清也白散桔梗貝母巴豆為散白飲和服治寒實結胸第二排膿湯桔梗甘草生薑大棗治癰疽腫硬第三排膿散桔梗白芍枳實共為末雞子黃一個滾湯沖服治癰疽膿成者第四中和湯桔梗白芷人參黃耆藿香肉桂甘草白朮川芎當歸白芍麥冬姜棗水酒煎服治骨槽風初起又托一切半陰半陽之瘡癰第五五苓散茯苓白朮豬苓澤瀉桂枝治霍亂渴者第六葳蕤第六蜜水浸蒸焙用畏鹼即玉竹一名女萎味甘氣平性緩無毒療虛勞寒熱治風溫熱汗風淫四肢眥爛淚出久服自效濕注腰痛黑點面䵟淺嘗無功除風濕平劑治虛瘧緩藥去面皺和顏色強筋骨導氣脈兼治中風濕毒用葳蕤根切碎熬取汁渣再焙末丸彈大每湯下一丸驗方第一目赤澀痛同當歸赤芍黃連煎洗第二眼花赤痛少佐薄荷生薑煎服第三發熱口乾小便澀水煎服第四小便猝淋同芭蕉根煎服第五處處山中有之莖葉如竹亦如姜亦可採根種之葳蕤湯葳蕤石膏白薇麻黃獨活杏仁大黃甘草青木香治風溫脈尺寸俱浮沉之澀常自汗身重多睡鼻息鼾語難出諸方第一知母第七酒炙上行鹽炙下潤忌鐵味苦氣寒入手太陰肺足太陽膀胱瀉無根之腎火療有汗之骨蒸止虛勞之熱嗽治久瘧之寒熱止渴潤燥清金泄肺敗脾胃泄大腸大便