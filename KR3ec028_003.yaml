為衣治一切痧氣腹內諸痛嘔瀉感冒急驚風等症慢驚不可服丸如秫粒大每服十粒第五狗脊十一去淨花酒浸焙用萆薢為使惡敗醬熬膏良苦平甘溫無毒強腰腳壯筋骨除風虛利關節病後足腫煎洗最宜老輩腰俯膏服良效療周痹而治膝痛止失溺而補腎虛生常山川穀二八月採今太行淄溫眉州亦有之有二種有黑色如狗脊骨者有金黃毛如狗形者與蓽茇萆薢相似其苗葉恰似貫衆貫衆十二味苦微寒有毒主諸血殺三蟲解熱毒兼愈骨哽止金瘡亦療漆瘡生玄山及冤句少室多生山陰近水處莖葉如鳳尾其根一本而衆枝貫之根同黑狗脊故貫衆一名黑狗脊是也鼻血不止末服立止驗方第一諸下血焙熟醋丸服第二崩血焙末半兩酒下立止第三産後亡血心腹痛醋炙香每米飲下三錢效第四積年赤白帶諸藥不瘳者方同上第五久咳膿血同蘇木生薑煎服第六痘出不快同赤芍升麻甘草竹葉煎服第七漆瘡作癢為末香油合敷第八禿瘡同白芷香油合敷第九禿瘡燒末油合敷第十雞魚骨哽同砂仁甘草為末綿包含咽汁久隨涎出十一血痢不止酒煎服十二便毒腫痛酒服二錢十三解輕粉毒牙縫出血同黃連煎漱十四遠志十三去心用甘草水浸干畏真珠藜蘆得茯苓冬葵龍骨良苦辛微溫無毒足少陰腎經藥也強志益腎補精壯陽除健忘安魂魄長肌肉助筋骨兼療癰疽亦治奔豚聰耳明目良劑通腎安心靈丹生泰山及兗州濟陰狀似麻黃而青四月採苗名小草古方通用今醫但用遠志罕用小草一切癰疽為末酒煎澄服以渣敷之驗方第一吹乳腫痛同上第二腦風頭痛不可忍以末入鼻中第三喉痹作痛以末吹之出涎第四心孔昏塞多忘丁酉日密自至市中買遠志著巾角中末服勿令人知第五赤濁同甘草茯神益智酒丸服第六淫羊藿十四羊脂拌炒得酒良山藥為使甘平無毒入手足陽明三焦命門強健筋骨除關節拘攣之急驅逐風寒療皮膚麻木之痹陽痿不起男宜久服陰絶不産女宜常用生上郡陽山山谷今江東陝西泰山漢中湖湘皆有之一根數莖莖粗如線一莖三丫一丫三葉如杏葉甚薄而細齒有微刺皮膚麻木浸酒常服驗方第一陽痿腰膝冷同上第二病後青盲日近者同豆豉服第三痘瘡入目同靈仙末服第四牙虛痛粗末煎漱大效第五三焦咳腹滿不食氣不順同覆盆五味丸服第六巴戟天十五去心酒浸焙用盆子為使惡雷丸丹參辛甘微溫無毒入足少陰腎諸風悉療五勞並補強筋骨而起陽痿除疝氣而止精泄生蜀川及下邳山谷二八月採今建平宜都江淮河東亦有之但不及蜀川者佳今方家多以紫色者為佳蜀人云並無紫色者採時或用黑豆同煮欲其色紫殊失氣味尤宜辨之又有一種山葎根正似巴戟而色白土人採得以醋煮之乃以雜巴戟莫能辨也但擊破視之中紫而鮮潔者僞也中雖紫又有微白糝有粉色而理少暗者真也肉蓯蓉十六酒洗去咸蒸曬用草蓯蓉功同而劣甘酸咸微溫足少陰藥也強益精髓潤滋臟腑男子痿陰婦女絶陰腰膝冷痛皆療崩帶遺精悉醫最滑大腸便結者宜之生河西山谷及代郡雁門春月採一云乃野馬精所生或曰自有種類爾今人多以金蓮根用鹽盆制而僞之又以草蓯蓉充之用者詳之近時以嫩松梢鹽潤僞之恰相似蓋肉蓯蓉乃罕得之物也勞傷精敗面黑為末同羊肉下五味煮食驗方第一老人虛人便祕有汗同麻仁丸服第二中消易飢同山茱萸五味丸服第三鎖陽十七酒洗用功同肉蓯蓉而功力過之甘溫無毒潤燥養筋治痿弱益精氣與蓯蓉同功大便滑者忌之出肅州乃野馬與蛟龍遺精所生發起如筍上豐下儉鱗甲櫛比筋脈連絡絶類男陽里之淫婦就而合之一得陰氣勃然怒長又曰此自有種類元參十八蒸熟曬乾用忌銅器惡黃耆乾薑大棗山茱萸反藜蘆苦咸微寒入足少陰腎壯水瀉火益精明目通利溲便清潤咽喉同丹皮治溫熱佐升麻除陽斑懊憹不遺煩渴悉效瘰癧結核之毒癰疽鼠瘻之疴大便滑者忌之生河間及兗州山谷今近道處處有之苗葉似芝麻對生七月開花八月結子黑色花有紫白二種根色黑而氣腥鼻中瘡為末敷之或水浸塞之驗方第一三焦積熱同大黃黃連丸服第二急喉痹同大力子末服第三發斑咽痛同升麻甘草煎服第四赤脈貫睛為末以米泔煮豬肝蘸食第五年久瘰癧元參蠣粉貝母等分蜜丸每三錢第六神祟忽睛痛莫忍元參知母黃芩炒梔大黃桔梗元明粉熱甚加生地歸尾湯散均可第七鼠瘻酒漬常服第八小腸疝氣丸服酒下出汗效此方不妥第九燒香治勞元參一斤甘松六兩為末煉蜜一斤和勻入瓶中封閉地中埋窨十日取出更用炭末六兩煉蜜六兩同合入瓶更窨五日取出燒之常令聞香病自愈已又甘松六兩元參一斤每日焚之第十肺癰咳唾膿血胸內痛脈數實元參川貝桔梗甘草葶藶薏米淨花服後更吐繼加白芨阿膠蒲黃十一溫熱症表俱飲水元參麥冬丹皮黃芩酒芍甘草十二地榆十九得發良惡麥冬苦酸微寒性澀而沉下焦藥也療一切失血兼除血中之熱虛寒瀉痢者忌處處有之宿根三月生苗初生布地獨莖直上對分出葉葉似榆葉而稍狹細長似鋸齒七月開花紫黑色根外黑裡紅似柳根吐血醋煮三兩服驗方第一漏下赤白同上第二赤白痢下水煮半斤去渣再熬如餳分服之效血痢加當歸二兩壯人即愈第三下血腹痛同炙草砂仁煎服第四小兒疳痢水煎如飴服第五虎犬咬內服外敷忌酒第六蛇傷外敷內服第七代指腫痛煮汁漬之半日愈第八小兒濕瘡水煎洗第九小兒面瘡赤腫煎洗第十煮石法七月七日取地榆陰乾百日燒灰復取生者與灰合搗萬下灰三分生末一分合之若石一二斗水浸沒過三寸以藥入水攪之煮至石爛可食乃已十一丹參二十畏鹹水反藜蘆微苦氣平而降入手少陰心手厥陰心包絡破宿血生新血安生胎落死胎調經脈除煩熱止腸鳴腹痛理崩帶癥瘕功同四物為女科要藥生桐柏及泰山五月採今處處山中有之一枝五葉葉如野蘇而尖青色皺皮小花成穗如蛾形中有細子其根皮丹而肉紫經調一切一味丹參散每酒下三錢驗方第一寒疝腹痛欲死為末酒下二錢少腹有積第二小兒驚癇發熱同雷丸豬脂煎摩身上第三乳癰同白芷白芍醋淹一宿豬脂煎成膏去渣敷之第四紫參二十一畏辛夷火炙紫黑用味苦微寒無毒入足厥陰手太陰陽明大腸開心腹積聚散腹脅堅脹止唾衄消癰腫調血痢破血瘀通經脈治金瘡利大小便治赤白痢消胸中之痞結止肺家之疼痛生河西及兗州山谷今所在有之莖青而細五月開白花似蔥花亦有紅紫而似水葒者根淡紫黑色肉帶紅白狀如小紫草近時多以此僞蚤休不可不知吐血不已同甘草阿膠為末糯米湯下驗方第一面上酒刺同人參丹參沙參苦參胡桃仁丸服第二紫參湯紫參甘草水煎治下痢腹痛諸方第一紫草二十二蠟水拌蒸去須用甘苦咸寒無毒足厥陰藥也涼血活血發痘提疹利小便通大腸治惡瘡瘑癬除心腹邪氣大便滑者忌之生碭山及楚地春社前後採之今所在皆有人家種之三月逐壟下子九月子熟時刈草春社採根苗似蘭香莖赤節青染燭及染紫者多用之古方惟用茸取其初得陽氣以發痘瘡今人不達此理一概用之非矣小兒頭上癤毒同當歸黃蠟香油熬膏敷驗方第一痘不出赤色便祕用二兩熱湯漬之泡封勿泄溫時取服第二痘赤便祕同陳皮蔥白服第三痘疔為末三錢雄黃末一錢胭脂取汁合銀針挑破點之第四癰疽便毒同栝蔞煎服第五小兒白禿煎汁敷之第六小便猝淋水煎末服第七産後淋瀝便祕方同上第八白頭翁二十三得酒良甘苦辛溫有小毒治溫瘧療金瘡止鼻衄除腹痛散癥瘕積聚消癭瘤瘰癧毒痢血痢要藥偏墜禿瘡靈丹熱毒下痢紫血黑血者最宜處處有之春初作叢生葉生莖頭如杏葉上有細白毛而不滑澤近根有白茸根紫色深如蔓荊其苗有風則靜無風自搖與赤箭獨活同也陰㿗偏腫用根搗敷當作瘡二十日愈驗方第一外痔腫痛以根搗敷第二小兒禿瘡以根搗敷一宿作瘡半月愈第三白頭翁湯白翁黃連黃柏秦皮治熱痢下重諸方第一又治産後痢虛極者加甘草阿膠第二白芨二十四紫石英為使惡理石畏李核杏仁反烏頭苦辛微寒性澀止肺血填肺損治跌打折骨湯火灼傷惡瘡癰腫敗疽死肌除頭面皯皰使皮黑反白垐手足皴裂令澀肌變滑去腐逐瘀甚速生肌止痛良效肺癰膿血未盡者勿用處處有之莖葉如生薑藜蘆但一科只抽一莖開花長寸許紅紫色鼻血不止為末津合敷山根上仍水服一錢立止驗方第一心氣痛同榴皮蜜丸豆大醋湯下三丸第二重舌鵝口乳汁調末敷足心第三疔腫為末水澄攤怗第四打跌骨折酒調末服第五刀斧傷同煅膏為末摻之第六手足皴裂水合末塞之勿犯水第七湯火傷香油合敷第八三七二十五甘苦微溫無毒散血止痛去瘀消腫治一切吐血衄血血痢血崩為金瘡杖瘡要藥生廣西南丹諸州番峒深山中根黃黑色團結者略似白芨長者如老幹地黃有節以末摻豬血中血化為水者真也近傳一種草苗高三四尺葉似菊艾而徑厚有歧尖莖有赤稜夏秋小花如金絲可愛根大如牛蒡與南中來者不類治金瘡與一切血症甚效云是三七未知何物吐衄米湯下驗方第一血痢為末米泔下第二大便血為末白酒下第三血崩同上第四赤眼磨汁塗眼四圍第五産後血多為末米湯下第六無名癰腫醋磨敷即散已潰者乾摻第七虎蛇傷為末米飲下三錢仍嚼敷之第八黃連二十六去淨毛漿水浸焙用生用入心醋炙入肝膽酒炙上行黃芩龍骨理石為使惡菊花元參鮮皮芫花殭蠶畏冬花牛膝勝烏頭解巴豆毒忌豬肉惡冷水大苦大寒無毒手少陰心經藥也清心退熱瀉火除煩鎮肝涼血解渴止汗厚腸胃而止瀉痢開伏梁而瀉痞滿解癰疽瘡疥之毒退目痛及眥傷之火虛寒者勿用舌苔紅者急用之産後忌之生巫陽川穀及蜀郡太山之陽二八月採蘇頌圖經曰今江湖荊夔州郡亦有而以宣城九節堅重相擊有聲者為勝施黔者次之東陽歙州處州者又次之苗高尺許葉似甘菊四月開黃花六月結實似芹子色黃其苗經冬不凋漢末本草惟取蜀郡黃肥而堅者為勝唐時以澧州者為勝今則雅州眉州者為良藥物之興廢不同若此小兒口瘡同乾薑為末摻之驗方第一消渴尿多蜜丸服又同花粉丸服又入豬肚中蒸爛丸服第二白淫脈數有熱同茯苓丸服第三赤痢已久為末雞子清合餅焙紫為末以漿水熬成膏米湯下又只以雞子白丸服第四熱毒血痢水煎一兩露一宿空腹服第五熱毒赤痢同當歸焙末入元香少許米湯下二錢第六赤白痢久並無寒熱同烏梅燒末米湯下第七赤白暴痢如鵝鴨肝痛甚同黃芩各一兩煎熱服第八一切諸痢不問冷熱赤白谷滯休息黃連兩半龍骨一兩真附子八錢乾薑一兩先以水兩盅入銅器中火沸取下著土上沸止又入水兩盅如此九次納諸藥入水內再煎沸輒取下沸止又上火如此九次可得二三盅頓服即止第九下痢腹痛赤白下重酒煎兩服第十小兒久痢赤白有火水煎蜜合服五次十一臟毒下血淨連半斤入豬大腸內砂釜煮爛取連焙末搗腸合丸米湯下十二赤白痢日夜無度同吳茱萸各二兩同炒香各為末以米飯合丸豆大每服三十丸赤痢甘草湯下黃連丸白痢生薑湯下吳茱萸丸各十五丸赤白痢並服米湯下甚效十三腸風同上十四脾積食瀉搗蒜合丸豆大白湯下五十丸十五痢痔腸脫為末冷水合敷之十六雞冠痔疾為末敷之十七痔病祕結同枳殼丸服十八暴赤目痛同乾薑杏仁為末綿包浸湯閉目乘熱洗之十九小兒赤目水合敷足心二十爛弦風眼黃連十文槐花輕粉少許為末男兒乳合之飯上蒸過帛包之尉目三四次二十一目猝癢痛乳汁浸點諸目悉治二十二淚出不止水浸濃汁漬拭之二十三口舌生瘡酒煎時含二十四小兒鼻䘌鼻下兩道赤色有疳以米泔洗之黃連末敷之二十五小兒月蝕生耳後為末敷之二十六小兒食土取好黃土煎黃連漬之曬乾與食二十七腹中兒哭煎濃汁呷之婦科胎哭是也二十八子煩口乾不臥為末粥下一錢二十九癰疽腫毒已潰未潰皆可同檳榔末雞子清合敷三十中巴豆毒利不止同乾薑末水下三十一心火實熱水煎服三十二心猝熱痛水煎服三十三陽毒狂奔同石膏末甘草水下三十四骨節積熱黃瘦童尿浸水煎服三十五小兒疳熱流注通身瘡蝕或潮熱肚脹作渴以黃連五兩入豬肚中鋪糯米上蒸爛搗千杵丸服三十六嘔煩心熱黃連五分乾薑三分三十七中熱邪毒同巴豆吐之三十八香連丸黃連木香蜜丸豆大每白湯下三十治赤白諸痢裡急腹痛諸方第一赴筵散黃連乾薑為末摻之治口瘡第二黃連湯黃連桂枝炙草人參半夏姜棗治腹痛欲嘔心熱甚者第三黃連阿膠湯黃連阿膠黃芩白芍雞子黃治心煩不眠第四黃連粉黃連為末水合敷治浸淫瘡第五下痢赤白黃苔便赤脈數黃連五分白芍一錢五分苦參一錢當歸一錢五分枳殼一錢五分甘草一錢第六胡連二十七苦寒無毒補肝膽厚腸胃除骨蒸退心熱三消五痔悉療瀉痢溫瘧亦治平小兒驚疳解婦人胎熱出波斯國苗若夏枯草今南海及秦隴亦有之初生似蘆干則似楊柳枯枝心黑外黃不拘時採折之塵出如煙者真也小兒潮熱往來盜汗同柴胡蜜丸服驗方第一小兒腹脹疳熱發焦同靈脂末豬膽丸服第二五心煩熱米湯下末第三小兒疳疾瀉同乾薑末甘草湯下第四小兒自汗盜汗潮熱往來同柴胡蜜丸服第五小兒黃疸同黃連各一兩將黃瓜去瓤入藥在內麵包煨熟去面搗丸緑豆大白湯下第六小兒目赤茶合敷足心第七吐衄血同生地豬膽合丸茅根湯下第八血痢不已同烏梅灶心土末服第九熱痢腹痛丸服第十癰毒已潰未潰同穿山甲茶合敷之十一傷寒勞復身熱二便如血同蜜炙山梔豬膽丸服十二黃芩二十八得酒上行得膽汁入肝膽得柴胡退寒熱得白芍治痢得桑皮瀉肺火得白朮安胎山茱萸龍骨為使惡蔥實畏丹砂藜蘆苦寒無毒除一切熱解諸般淋血痢腹痛火嗽喉腥瀉中焦實火退脾家濕熱清火安胎逐水解渴利胸氣消膈痰療黃疸治血閉兼清肌表鬱熱最除往來寒熱平癰疽瘡瘍退目赤腫痛腹痛因寒者忌之脈遲者忌之生建平兗州川穀今出宜州鄜州涇州者佳苗長尺余莖幹粗如箸葉從地四面作叢類紫草亦有獨莖者葉細長青色兩兩相對六月開紫花中枯而飄者名枯芩即今所謂片芩也瀉肺利氣除風熱清肌表宜之細實而堅者名子芩即今所謂條芩也瀉大腸火養陰退陽補膀胱寒水滋其化源宜之身如火燎燥渴晝盛水煎兩服驗方第一老小火丹為末水合敷之第二灸瘡出血一人灸瘡血出不止肢冷欲絶酒服黃芩末二錢立愈第三産後渴同麥冬煎服第四常服安胎同白朮丸服第五崩血為末每一錢霹靂酒下稱錘燒赤淬酒是也第六老婦止經米醋浸焙乾再浸如此七次醋丸服第七血淋熱痛水煎一兩分服第八吐衄下血水煎三兩分服第九婦人漏血同上第十吐衄血末服三錢十一眉眶痛同白芷為末茶下十二少陽頭痛亦治太陽為末酒下一錢十三小兒驚啼同參末服十四肺中有火丸服十五黃芩湯黃芩白芍甘草大棗各三錢治太少合病自下痢熱痢臭黏者此症身熱脈數夏秋間受則膿血交迫成暑熱痢也諸方第一秦艽二十九去淨毛湯泡曬乾用菖蒲為使畏牛乳苦辛無毒入手足陽明肝膽諸經攻風逐水通利二便止肢節之疼痛療身體之攣急手足不遂齒牙莫開牙痛口瘡之症腸風瀉血之疴治黃疸而解酒毒去頭風而治骨蒸養血榮筋最益肝膽之氣驅寒御濕不留麻木之邪大便滑者禁用生飛鳥山谷二八月採今出涇州鄜州岐州者良又河陝州郡多有之葉婆娑連莖梗俱青色六月開紫花似葛花當月結子根長大黃白者佳中多銜土用宜破去左文者良急勞煩熱身體痠痛同柴胡甘草為末每白湯下三錢驗方第一小兒骨蒸潮熱減食瘦弱同炙草煎服第二黃疸心煩口乾小便赤牛乳煎三兩服第三暴瀉引飲同炙草煎服第四小便難水煎一兩服第五瘡口不合為末摻之第六發背初起牛乳煎服快利三次為度第七柴胡三十去須及頭忌犯火半夏為使惡皂角畏紫菀藜蘆苦平微寒性升入足少陽膽經清膽經之火邪退肝家之煩熱開胸脅之硬滿止頭目眩昏行經於表裡陰陽之間奏效於寒熱往來之會口苦咽乾最靈目赤耳聾良效血室鬱熱男婦皆驗心胃痞痛左右莫違驅逐諸瘧之寒熱消散衆邪之結聚舌苔白者宜之産後忌之生弘農川穀及兗州今關陝江湖近道皆有之以銀州者為勝銀州即今延安府所産柴胡長尺余而白且軟北地所産如前胡而軟今人謂之北柴胡是也入藥亦良南土所産者如蒿根強硬不堪用其苗有如韭菜者竹葉者以竹葉者為勝近有一種根似桔梗沙參白色而大市人以僞銀柴胡並無氣味不可不知虛勞發熱同人參煎服驗方第一小柴胡湯柴胡黃芩半夏人參炙草生薑大棗治少陽傷寒往來寒熱胸脅滿痛心煩喜嘔又治腹中急痛偏左右者又治婦人中風經水適斷熱入血室寒熱如瘧發作有時諸方第一大柴胡湯柴胡黃芩半夏白芍枳實大黃姜棗治少陽傷寒寒熱心中痞結脈沉或嘔吐下利第二清肝湯托一切兩鬢兩脅兩腋諸癰疽耳衄耳疳及兩耳後鋭夭諸癰疽第三柴胡黃芩半夏臺參桂枝甘草白芍姜棗治瘧疾初作表症猶在者第四嘔而發熱小柴胡湯第五前胡三十一去淨皮髭竹瀝浸曬乾半夏為使畏皂角惡藜蘆辛苦甘寒無毒性降手足太陰陽明藥也下氣開結清肺化痰平喘嗽嘔逆之症療痞滿霍亂之疴除內外痰熱消諸般氣滯兼安婦人生胎亦治小兒諸疳無外感症者忌用今陝西梁漢江淮荊襄及相州孟州皆有之吳興者勝時珍曰前胡有數種惟以色似斜蒿葉如野菊而細瘦嫩時可食秋月開白花其根皮黑肉白有香氣者為真生北地者良小兒夜啼蜜丸服驗方第一防風三十二得蔥白行周身得藁本澤瀉療風得當歸白芍陽起石禹糧療婦人子臟風畏萆薢殺附子毒惡藜蘆白蘞乾薑芫花甘辛微溫無毒性升手足太陽藥也又行足陽明太陰經療諸般風治一切勞除骨蒸之疼痛解肌體之攣急青盲赤目頭痛脅痛除盜汗而驅煩滿止冷淚而起癱瘓為治風去濕之要藥乃脊痛項強之靈丹生沙苑川澤及邯鄲琅琊二月十月採今出齊州龍山兗州淄州青州汴東浙淮皆有之莖葉俱青緑似青蒿而短五月開細白花似蒔蘿花有數種以根黃而潤者為佳白者不堪用自汗不已為末浮麥湯下驗方第一盜汗同川芎人參末服第二老人大便祕澀同枳實甘草末服第三偏正頭風同白芷蜜丸彈大服第四破傷中風牙關急同南星末服第五小兒解顱同白芷柏仁為末乳合敷之第六崩中酒合服之第七解烏頭附子天雄芫花毒水煎服第八解諸藥毒或已死為末冷水服第九風犬咬傷同南星末敷之永不再發第十兼敷金瘡打傷如破傷兼可內服酒下一錢十一獨活三十三焙用此草得風不搖無風自動故名獨搖草苦辛微溫無毒性升入足少陰經佐細辛療頭暈目眩君地黃治風熱齒痛痙癇濕痹皆醫奔豚疝瘕悉療搜諸風兼腎家伏風去諸濕並治足間濕痹獨活羌活乃一類二種中國或蜀漢出者為獨活西羌出者為羌活春生苗葉如青麻六月開花作叢或黃或紫今人以根紫色而節密者為羌活黃色而作塊者為獨活近時江淮山中出一種土當歸白肉黑皮氣亦芬香人以之充獨活不可不知古方惟用獨活蓋一物二種正如川芎撫芎蒼朮白朮之義後人以為二物則非矣中風口噤身冷酒煎四兩分服驗方第一歷節風痛同羌活松節酒煎服第二風牙腫痛酒煎漱之第三中風不語獨活一兩酒煎黑豆一兩炒有聲以藥酒熱投蓋之良久久服不瘥更服第四羌活三十四味苦辛溫無毒性升入足太陽少陰厥陰經搜風解表勝濕去痹頭旋目赤要劑脊痛項強良藥手足不遂口目不正失音不語之風奔豚癇痙之疴散肌表諸風之邪利周身百節之痛血虛頭痛二活並忌四時傳染腫赤痛淚防風連翹牛蒡子赤芍大黃羌活炒梔薄荷歸尾川芎甘草水煎産後腹痛産後諸藥不效酒煎二兩服驗方第一産腸脫出同上第二妊娠浮腫與萊蔔子同炒去萊蔔末服酒下第三風水浮腫同上第四喉閉口噤同牛蒡子水煎入白礬少許服第五目睛垂出至鼻名肝脹急煎服之第六時時大便血痛同上第七太陽頭痛同防風末吹入鼻第八春夏秋感冒頭痛發熱身痛脈浮緩有汗羌活白朮川芎白芷黃耆少許細辛少許當歸防風黃芩甘草薑棗任其自汗第九九味羌活湯羌活防風蒼朮川芎細辛白芷當歸黃芩甘草姜蔥治春夏秋感冒頭痛發熱脊強無汗脈浮緊諸方第一時眼暴發赤痛羌活蒼朮防風川連川芎白芷各八分甘草三分細辛五分姜引外以白礬緑礬熏之閉目以手洗之第二時睛昏蒙草決明防風菊花荊子荊芥羌活歸尾川芎白芷薄荷生地黃芩各八分燈心草姜五七服為度第三升麻三十五去須及頭蘆用甘苦辛平微寒手足陽明太陰藥也表散風邪升發火鬱利咽喉而止疼痛消腫毒而排膿血解斑疹瘡痘之毒升脫瀉崩帶之陷兼闢瘟疫瘴氣最解蠱精藥毒陰虛火動者忌之蜀漢陝西淮南皆有之以蜀川出者為勝葉似麻葉而青四五月開花似粟穗白色六七月開實黑色根如蒿根紫黑色多須二八月採天行斑毒晉元帝時此症自西流起名虜瘡身面發斑須臾周匝狀如火熮皆戴白漿隨決隨生不治數日必死瘥後斑點彌歲方減此惡毒之氣所致也蜜煎升麻時時食之並用水煎升麻綿拭洗之驗方第一腫毒猝起醋磨敷之第二喉痹作痛含咽汁第三胃火牙痛煎漱咽之第四口舌瘡一兩黃連三分末綿包含咽第五熱痱瘙癢內服外洗第六小兒尿血水煎服第七惡露不盡或經月或半年酒煎三兩服當吐下惡物極良第八解莨菪毒水煎多服第九射工溪毒同射干煎服第十升麻鱉甲湯升麻鱉甲甘草當歸雄黃蜀椒水煎服治面赤發斑如錦紋咽喉痛吐膿血陽毒也諸方第一又升麻鱉甲甘草當歸治面青身痛如被杖咽痛陰毒也第二苦參三十六糯米泔浸蒸曬用元參為使惡貝母菟絲漏蘆反藜蘆野槐根也苦寒無毒性沉足厥陰太陽少陰藥也補陰益精明目止淚治濕熱血痢住腸風血瀉兼療大風疥癩最除癰腫陰蝕溺赤疸黃之疾積聚癥瘕之疴清乙木而殺蟲利壬水而泄熱肝腎虛無熱者勿用近道處處有之葉與槐相似赤白帶同蠣粉各兩豬肚煮爛搗丸豆大每酒下百丸驗方第一湯火傷香油合末敷之第二瘰癧結核四兩末牛膝湯丸豆大每三十丸第三下部漏瘡水煎日日洗之第四熱病狂奔蜜丸服薄荷湯下水煎亦可第五傷寒結胸天行疾胸滿壯熱醋煎一兩服取吐且取汗第六谷疸食勞頭旋心怫鬱不安由失飢大食胃氣衝熏所致用二兩膽草一合牛膽丸服十丸第七小兒身熱煎洗之第八熱毒足腫作痛欲脫酒煎漬之第九夢遺食減苦參三兩白朮五兩蠣粉四兩豬肚一個沙釜煮爛搗丸服第十中惡心痛苦酒煎服十一飲食中毒上方吐之十二血痢不止炒焦丸服十三脫肛同五倍子陳壁土煎洗之以木賊末敷之十四齒縫血苦參一兩枯礬一錢為末揩之十五鼻瘡膿臭有蟲也苦參枯礬生地煎汁滴之十六遍身生瘡肺熱也米湯丸服十七遍身風疹癢痛為末一兩皂角二兩取汁熬膏丸服十八大風癩疾酒漬五兩十日常服十九熱毒風瘡疥癬一斤枳殼六兩丸服酒下二十疥癩痛癢黃水及大風手足爛苦參二斤芥穗一斤丸服二十一鼠瘻惡瘡苦參二斤露蜂房二兩曲二斤水三斗漬之去渣入黍米釀熟飲之二十二白鮮皮三十七惡桑螵蛸桔梗茯苓萆薢苦寒微咸無毒性燥足太陰陽明藥也兼入手太陰陽明除一切風痹治諸般黃疸女子陰腫小兒驚癇兩足肌死四肢筋弱頭痛目痛之時疾風瘡疥癩之舊疴鼠瘻已破出膿血煎服當吐若鼠子也驗方第一産後中風人虛不可服他藥一味白鮮皮新水煎服第二生上谷及兗州等處二月採今河中江寧滁州潤州皆有之以蜀中者為良苗高尺余莖青葉稍白如槐亦似茱萸四月開花淡紫色根似小蔓荊皮黃白而心實元胡三十八炒用本名玄胡索宋時避真宗諱改玄為延今後避廟諱改玄為元也辛溫甘苦無毒性浮入手足太陰厥陰四經兼療氣痛最治血凝腹中塊結臍疝痛調婦人月經經瘀經滯除産後血積血運血沖驅風治氣兼止腰膝之猝痛活血止痛兼利便溺之猝閉操行血利氣之權兼通經墜胎之能血熱氣虛者勿用生奚國根如半夏色黃今二茅山西上龍洞種之寒露後栽之立春後生苗葉如竹葉根叢生如芋卵立夏掘起心痛欲死每酒下三錢末驗方第一下痢腹痛垂危諸方不止米飲下三錢末第二偏身痛莫忍同當歸桂心末每酒下三錢婦科宜之第三鼻衄不止為末綿包塞耳左右右左第四尿血末服第五小便不通同苦楝子末白湯入香油少許下第六膜外氣痛及氣塊為末熟豬胰蘸食之第七熱厥心痛時發止同金鈴子末酒下第八經不調腹刺痛同當歸陳皮酒丸服第九産後諸病惡露未盡一切為末酒下第十小兒盤腸氣痛同小茴末下十一疝氣危急同全蠍末下少腹積痛十二冷氣腰痛同上第三十三墜車落馬筋骨痛為末豆淋酒下十四貝母三十九去心拌糯米炒用白微為使畏秦艽莽草反烏頭苦辛微寒無毒散結瀉熱潤肺清心治痰嗽熱嗽止吐血咯血乳閉産難最良喉痹目眩亦效散心下鬱滿之氣療腹中結實之疴平癭瘤而斂瘡口除淋瀝而點目赤為消痰止嗽之神劑乃清熱除痰之良藥虛嗽無火者勿用生晉地葉似大蒜四月蒜熟時採出潤州荊州襄州者最良江南諸州亦有之今河中江陵府郢壽隨鄭蔡潤滁州皆有之以川産者為良貝母中有獨顆團不作兩片無皺者號丹龍精不可入藥妊娠尿難飲食如故同苦參當歸蜜丸服驗方第一乳不下同知母蠣粉末豬蹄湯下第二目生胬肉同丁香末乳點之第三吐血不已炮研漿水下第四小兒鵝口為末蜜水煎抹之第五吹奶作痛為末吹鼻大效第六乳癰初起為末酒下令人吮之第七便毒腫痛同白芷末煎服以渣敷之第八紫白癜風同南星為末姜帶汁拭之第九蜘蛛咬傷縛定咬處酒服貝母末五錢至醉酒化為水自瘡口出第十蛇蠍傷同上十一山慈姑四十去毛殼甘微辛有小毒消癰腫瘡瘻疔毒兼療瘰癧結核解諸毒蠱毒蛇毒亦治狂狗咬傷擅剝人面皮之能操退除面䵟之權處處有之冬月生葉如水仙而狹二月中抽一莖如箭桿莖端開花有白紅黃三色黃色者上有黑點其花乃衆花簇成一朵三月結子三稜四月初苗枯即掘取其根狀如小蒜有毛殼包裹粉滓面䵟杵粉夜塗旦洗驗方第一牙根腫痛煎漱吐之第二風痰癇疾以清茶研如泥日中時以茶調下即臥日中良久吐出不吐以熱茶投之第三紫金錠淨慈姑二兩焙淨五倍子二兩焙千金子去油一兩麝香一錢端午七夕或重陽或天德月德黃道吉辰齊戒盛服焚香拜禱以糯米濃飲合之木臼杵千下一丸一錢病甚者連服取利用溫粥補之一切飲食藥毒蠱毒瘴氣河豚土菌死牛馬等毒並用涼水磨服一錠或吐或利即愈癰疽發背疔腫楊梅一切惡瘡風疹赤遊痔瘡並用涼水磨塗日數次即愈陰陽二毒傷寒狂亂瘟疫喉痹並用涼水入薄荷汁化下心氣痛並諸氣淡酒下泄利霍亂絞腸薄荷湯下中風中氣口噤目斜五癇鬼邪鬼胎筋攣骨痛並酒下自縊水溺鬼迷心頭溫者冷水磨灌之傳尸癆瘵涼水化下取下惡物蟲積為妙久近瘧疾發時東流水煎桃枝湯下經閉紅花湯下小兒五疳五痢薄荷湯下風蟲牙痛酒磨塗之打撲損傷松節煎酒下湯火傷毒蛇惡犬傷並冷水磨塗仍服之茅根四十一甘寒無毒止吐衄諸血除淋瀝客熱黃疸水腫皆療噦嘔喘急悉醫利小便而止消渴調月經而治崩中處處有之春生芽布地如針夏生白花至秋而枯其根潔白六月採之詩云露彼菅茅是也竹木入肉燒末豬油合塗腫者亦效驗方第一鼻衄為末米泔下第二吐血不已水煎服第三勞傷溺血同乾薑蜜水煎第四小便出血水煎服第五小便熱淋水煎常服第六解中酒毒水煎服第七諸般黃疸同豬肉一斤作羹食第八虛後水腫小便不利同赤小豆水煎乾去茅根食豆小便利則愈也第九入山辟穀取淨茅石上曬乾為末水下終日不飢第十溫病熱噦胸滿氣逆同葛根煎服十一食入即吐同蘆根煎服十二肺熱氣喘水煎服十三瘡毒畏針用茅針酒煎服一針一孔即初生苗也十四龍膽草四十二甘草湯浸曬乾用貫衆小豆為使惡地黃防葵空腹服之令人溺大苦寒無毒性沉足厥陰少陽藥也退二木之火燥除二水之濕熱解天行之熱黃療時氣之溫熱骨間寒熱之郁肝家驚癇之邪赤睛赤肉之突熱痢熱狂之火消癰瘍而治瘡疥兼治腳氣腫痛止咽痛而除盜汗且除胃中煩熱過服損胃生齊朐山谷及兗州二月八月十一月十二月採今出近道以吳興者為勝抽根十餘條類牛膝而短四月生葉如嫩蒜細莖如小竹枝七月開花如牽牛青碧色冬後結子苗枯猝下血水煎服驗方第一蛔攻心刺痛吐水水煎服第二目中漏膿同當歸末服第三暑天目澀合黃連汁點之第四咽熱痛水煎服第五小兒盜汗身熱同防風末服第六一切盜汗為末同膽汁酒服第七谷疸勞疸一兩苦參三兩牛膽丸服勞疸加山梔第八傷寒發狂為末雞子清蜜水服第九細辛四十三去頭子雙葉水浸乾用惡黃耆狼毒山茱萸忌生菜貍肉畏硝石滑石反藜蘆辛溫無毒性升入足厥陰少陰去頭風而止嗽療齒痛而通氣驅寒濕而蕩濁消水飲而破痰除癲癇之風疾解痹痛之風濕調百節之拘攣且潤大便之燥結息風目淚淋兼治睫倒通齆鼻氣塞亦解耳聾不可過用凡使勿用杜衡柔莖細根直而色紫味極辛者細辛也莖微粗根曲而黃白色味亦辛者杜衡也根同細辛色如杜衡味辛微苦者鬼督郵也處處有之以華陰高麗者為真其根細而極辛今多以杜衡僞之細辛葉如葵赤黑色非此則杜衡也諸般耳聾為末蠟丸綿包塞之戒怒氣驗方第一鼻中息肉為末常吹第二暗風猝倒為末吹鼻第三虛寒嘔噦稍佐丁香每柿蒂湯下末二錢第四小兒客忤不語同桂心末少納口中第五小兒口瘡為末醋合敷臍上第六口舌生瘡細辛黃連等分為末摻之漱涎甚效第七口臭䘌齒腫痛煎漱吐之第八白薇四十四酒洗用惡黃耆大黃大戟乾薑大棗乾漆山茱萸苦咸而寒無毒入手太陰肺足太陽膀胱治驚邪狂惑療寒熱痠痛利水瀉熱清金除煩退熱淋而通鼻塞解溫瘧而止遺溺泯自汗灼熱多睡之風溫療身熱肢滿昏迷之暴風生平原川穀今處處有之二八月採莖葉頗類柳葉六七月開紅花八月結實根黃白色類牛膝而短婦人遺溺同芍藥末酒服驗方第一血淋熱淋同上第二婦人血厥如風平居無苦疾忽如死人目閉口噤移時方省亦名鬱冒白薇當歸各一兩人參五錢甘草二錢每五錢水煎服第三金瘡出血為末帖之第四鼻不知香臭同貝母冬花百部末每米湯下一錢第五白前四十五甘草水浸去頭須焙用甘平無毒入手太陰肺降沖逆而止咳破壅塞而消痰肺氣壅實有痰者宜之虛而長哽氣者勿用生州渚沙磧之上其葉似柳二八月採取根似白薇牛膝不可不知似牛膝粗長堅直易斷者白前也似牛膝短小柔軟能彎者白薇也近道俱有形色頗同以此別之不致差誤久咳唾血同桔梗雙皮炙草煎服忌豬肉驗方第一久嗽上氣體腫短氣滿脹不臥作水雞聲同紫菀半夏大戟先漬後煎忌羊肉第二當歸四十六酒洗用李杲曰頭止血而上行身養血而中守尾破血而下流全活血而不走甘苦辛溫無毒足厥陰肝手少陰心藥也養血滋肝潤燥滑腸補一切婦女虛損止諸般臟腑疼痛溫瘧癖痢之苦痿痹癥瘕之邪排膿止痛養血生肌諸風諸氣諸勞悉醫凡經凡産凡胎皆療起細脈之極細四肢節之逆冷暖裡急而平逆氣溫中焦而除寒疝大腸滑者禁用生隴西川穀二八月採取今蜀川陝西江寧滁州皆有之以蜀中者為勝春生苗緑葉三瓣七八月開花似蒔蘿淺紫色根黑黃以肉厚不枯者為勝時珍曰今蜀陝秦州汶州諸處人多栽蒔為貨以秦歸頭圓尾多色紫氣香肥潤者名馬尾歸最勝他處頭大尾粗色白堅枯者為鑱頭歸只宜入發散藥爾溫瘧不止水煎一兩服驗方第一大便不通同白芷末服第二婦人一切當歸四兩地黃二兩蜜丸服第三一切失血眩暈同芎煎服第四鼻衄不已末服第五小便出血酒煎四兩服第六頭痛如破酒煎二兩第七目暗六兩附子一兩蜜丸用第八心下刺痛為末酒下第九手臂痛酒浸三兩服第十月經上行先服香墨止之次用歸尾紅花水煎服十一室女閉經歸尾沒藥紅花酒浸面北服之日一十二經脈不調臍下氣脹上攻同乾漆蜜丸酒下十三墜胎下血同蔥白酒煎下十四胎動或死同川芎數兩服生安死落十五催生一切同上十六倒生子死為末酒下十七産後血脹腹痛引脅稍佐炮薑末服十八産後自汗壯熱氣短腰腳痛同黃耆白芍生薑服十九産後中風不省吐沫瘛瘲同芥穗末酒下二十小兒哭成癇乳汁服末日數服二十一小兒臍濕或腫赤出水為末敷之二十二湯火傷爛當歸黃蠟香油熬膏帖之二十三吐血後困倦同臺參服二十四黃白色枯舌縮恍惚同白朮稍佐生地蜜水煎二十五閃挫腰痛當歸三錢杜仲三錢酒煎出汗二十六打頭腫如卵當歸香油熬焦去渣入乳香沒藥再入黃蠟成膏敷之二十七産後腹痛為末蜜水煎二十八産後經閉少腹痛當歸川芎元胡紅花薑炭丹皮甘草酒煎尿引二十九當歸四逆湯當歸白芍桂枝各三錢細辛通草甘草各二錢大棗治厥逆脈細欲絶諸方第一當歸生薑羊肉湯當歸三兩生薑五兩羊肉一斤治寒疝腹痛脅痛裡急第二當歸芍藥湯當歸三白芍斤川芎三白朮四茯苓四澤瀉半斤治妊娠雜病第三當歸貝母苦參丸當歸貝母苦參等分治妊娠尿難食如故第四當歸散當歸白芍川芎黃芩白朮等分為散治胎前産後諸病第五當歸白芍棗仁炒茯神麥冬辰砂生地甘草為丸或湯治內傷驚悸有痰火加半夏枳實黃連第六鎮心丸辰砂五錢琥珀五錢天竺黃五錢膽星一兩牛黃三錢雄黃二錢珍珠二錢麝香心經有熱者加炒連一兩當歸一兩生地一兩炙草五錢臺參一兩去雄黃膽星麝香蜜丸豆大金箔為衣薄荷湯下每一丸治一切驚悸第七芎藭四十七白芷為使畏黃連狀如雀腦者謂雀腦芎出關中者呼為西芎出蜀中者為川芎出天台山者為臺芎出江南者為撫芎辛溫無毒入足厥陰經去風除濕補血清頭開鬱潤燥止痛散瘀濕瀉血痢之疾寒痹筋攣之疴淚淋涕出之症風攻氣鬱之邪調經脈而破經結療諸瘡而止諸血平息頭痛之妙劑驅除面風之良藥虛火上炎嘔吐咳逆者勿用生武功斜谷西嶺九月十月採取以蜀川者為勝四五月生葉如水芹胡荽蛇床輩作叢而莖細其葉倍香名蘼蕪是也七八月間開碎白花時珍曰蜀地少寒人多栽蒔深秋莖葉亦不萎也一切心痛酒下末驗方第一諸般頭痛和末煎丸俱可第二頭風旋暈佐天麻丸之第三驗胎是否為末艾湯下腹微動者胎也又醋煎艾葉腹大動者胎也不動者非胎第四胎損子死為末酒下立出第五血崩不止酒煎第六酒癖脅脹時嘔腹有聲同三稜末蔥湯下第七小兒腦熱好閉目或太陽痛或目赤腫同薄荷芒硝吹鼻第八齒敗口臭水煎含之第九兩乳忽脹疼痛或過小腹名乳懸當歸川芎各一斤以半斤煎服以半斤燒煙令口鼻吸之未愈再作仍以萆麻子帖頂心第十當歸一錢川芎一錢酒芍一錢生地一錢香附一錢丹皮八分柴胡八分黃柏八分知母八分黃芩八分牛膝八分焦術桃仁紅花治虛人閉經或兼咳嗽發熱室女去知柏膝桃紅有虛冷者不用或加乾薑亦可宜用十服諸方第一見風淚出不赤不痛當歸二錢白芍一錢防風一錢蒺藜一錢川芎五分熟地二錢木賊一錢水煎第二一切頭痛川芎乳香沒藥雄黃白芷火硝為細末吹鼻並治牙痛赤眼耳鳴鼻塞腦瀉及蜈蚣所傷口含涼水以藥吹鼻第三蛇床子四十八服食炒用作湯浴生用惡牡丹貝母巴豆伏硫黃苦平微溫無毒入脾肝腎三經暖補命門溫養子宮起丈夫玉莖痿弱兼洗濕癢除女子玉門寒冷並治腫痛腰膝痛酸肢節頑痹撲損瘀血赤白帶漏洗疥癬痂癩之毒熏痔漏頑惡之瘡一身盡癢非此莫浴小便自遺用之立收大益男子之陽事尤治小兒之癇病最漱牙痛亦斂陰汗生臨淄川穀及田野五月採實近田野墟落甚多三月生苗高二三尺葉青碎作叢似蒿枝每枝上花頭百餘結同一窠蓋其花實與當歸芎藭水芹藁本蒔蘿胡蘿蔔等也在處有之以揚州襄州者為良陽事不起同五味菟絲蜜丸服酒下煎浴之尤佳驗方第一赤白帶同枯礬醋丸彈大綿包納陰中熱極再換甚效第二子宮冷同上第三婦人陰癢稍佐白礬煎洗第四産後陰脫蒸熱絹包尉之稍少佐烏梅煎洗第五婦人陰痛同上第六男子陰腫痛為末雞子黃合敷第七脫肛為末敷之又同甘草服第八痔瘡腫痛煎熏洗之第九小兒癬為末豬油合敷第十耳內濕瘡同黃連輕粉末吹之十一風蟲牙痛煎漱十二冬月喉痹藥不下燒煙瓶中熏之涎自出十三藁本四十九惡䕡茹畏青葙子辛苦微溫無毒療婦人疝瘕兼療陰寒痛腫除太陽風寒併除巔頂牽痛諸般惡風一切風濕粉刺酒皶之疾癰疽疥癬之毒君木香除霧露之襲沿同白芷去頭面之垢屑頭痛內熱陰虛頭痛春夏傷寒皆忌之生崇山山谷正二月採根今西川河東兗州杭州江南皆有之葉似白芷又似芎藭五月開白花七八月結實根紫色小兒疥癬煎浴之驗方第一頭上垢屑同白芷末夜搽旦梳垢自去也第二白芷五十微焙用當歸為使惡旋覆花制雄黃硫黃辛溫無毒手足陽明手太陰藥也解三經風熱之燥癢除陽明頭目之昏痛調血崩血閉之大症住鼻衄鼻淵之細疴痔漏瘡癰最宜瘰癧疥癬亦醫目癢淚出面皯瘢生活血排膿止痛生肌療心腹之血刺兼療腸風腸祕除眉稜之骨痛併除牙痛目胬刀斧金瘡之傷砒毒蛇咬之災性升散氣芬芳血熱有虛火忌之生河東山谷二八月採今所在有之吳地尤多春生葉相對婆娑紫色闊三指許花白微黃伏後結子秋後苗枯以黃澤者為佳四條一處生者名喪公藤勿用小便出血同當歸末服驗方第一腸風下血末服第二痔漏出血同上又煎洗第三衄不已為末以所出血合敷山根第四腫毒熱痛為末醋合敷之第五乳癰初起同貝母末酒下第六疔瘡初起同生姜服發汗第七癰疽赤腫同大黃末服第八刀斧傷瘡嚼敷之第九解信石毒井水下末第十諸骨哽咽同半夏末水下嘔出十一毒蛇傷一人被蛇傷昏死一臂如股遍身皮脹黃黑色一道人以新水合白芷末一斤灌之覺臍中搰搰然黃水自口出腥氣逆人良久而消一人為蛇傷一腳潰爛百藥不效一僧以新水洗淨敗肉內見白筋挹干以白芷末入膽礬元香少許摻之惡水湧出日日如此一月而平十二一切傷寒不論陰陽輕重老少男女妊娠皆可用之白芷一兩甘草半兩蔥薑棗水煎取汗不汗更服更可卜人之好惡也如煎黑色或誤打翻即難愈如煎藥黃色無不愈者忌婦人雞犬見之十三風寒流涕同芥穗末茶下十四小兒身熱煎水浴之取汗忌風十五頭面諸痛以萊蔔汁浸透曬乾為末白湯下或吹鼻十六偏正頭風百藥不效一服更好天下第一方也白芷兩半川芎甘草烏頭各一錢俱炒末細茶薄荷湯下之十七眉稜骨痛同羌活香附十八風熱牙痛同硃砂蜜丸搽牙十九一切目疾同雄黃蜜丸彈大硃砂為衣茶下一丸還睛丸二十口臭為末每水下一錢二十一盜汗一兩辰砂五分每酒下二錢末二十二血風反胃為末豬血七片沸湯泡七次蘸末食之二十三腳氣腫痛同芥子末薑汁合敷二十四白帶四兩石灰淹三宿去灰為末每酒下二錢二十五難産末下五錢二十六胎前産後虛損經不調與橫生逆産同百草霜末芎歸湯下二十七大便風祕蜜水下末二十八小便結澀醋炙末酒煎木通甘草湯下二十九沖和膏紫荊皮五獨活三白芷三赤芍二菖蒲二為末蔥水熱酒均可調敷諸方第一牙根痛連腮頰腫痛口難張骨槽風也白芷桔梗臺參黃耆少用藿香肉桂少用甘草白朮川芎當歸白芍麥冬姜棗第二白芍五十一生用治痢酒炒闢寒醋炙入婦科血分惡石斛芒硝畏硝石鱉甲小薊反藜蘆酸寒苦平無毒性斂澀入肝膽肺脾諸經補血瀉肝安脾寧肺散瘀利水除煩退熱固腠理而斂汗和血脈而收氣解腹痛而平肝除後重而止痢心痞脅痛之疾鼻衄目澀之疴癰腫疝瘕之凝痔漏瘡疥之科平肺脹之喘逆伸足攣之拘急婦科一切悉療産後諸症宜忌按仲景産後諸症不遺白芍是産後不忌芍也脈緩有汗者宜之生中嶽山谷二八月採今處處有之以淮南者為勝春生紅芽作叢三枝五葉夏初開花有紅白紫淡數種目珠突出白芍杏仁柴胡丹皮首烏甘草驗方第一赤芍苦寒無毒瀉肝火散瘀血療腹痛除積結去腸風癰腫調血痹疝瘕利水有力行經差強腹中虛痛佐炙草服脈緩者驗方第一腳氣腫痛佐炙草末服第二消渴他藥不效同上第三五淋同檳榔末服宜赤芍第四鼻衄赤芍末服第五崩中小腹痛佐柏葉煎服第六經水不止同香附艾葉煎服第七赤帶赤芍香附末服第八赤白帶久炒末酒下第九金瘡出血熬黃為末酒下常服以渣敷之第十痘瘡脹痛為末酒下十一木舌腫滿赤芍同甘草服十二魚骨哽細嚼咽之十三因氣火內熱發驚白芍陳皮米殼甘草水煎十四桂枝加芍湯桂枝原方倍白芍治下後腹滿時痛屬太陰者諸方第一芍藥甘草湯白芍甘草治傷寒脈浮有汗心煩惡寒小便數腳攣急第二芍藥甘草附子湯治傷寒發汗不解反惡寒者第三桂枝去芍湯桂枝原方去白芍治傷寒下後胸滿脈促者第四老人目赤暴痛當歸川芎白芍生地羌活防風膽草水酒煎服第五丹皮五十二酒蒸畏貝母大黃菟絲忌蒜胡荽伏砒苦辛微寒無毒手足少陰厥陰藥也涼血退熱去瘀消症中風五勞悉醫驚癇瘛瘲皆療破積血而通經脈療癰瘡而下胞胎治撲傷而續筋骨止吐衄而斷淋瀝能退無汗之骨蒸最泄諸血之火伏生巴郡及漢中二八月採今丹延青越滁和州山中皆有以合州和州宣州者為勝取紅白色單瓣者入藥白者補赤者利㿗疝偏墜氣脹不能動者同防風末酒下驗方第一損傷瘀血二兩虻蟲三七枚熬過為末每旦酒下血化水下第二下部生瘡已決洞者煎服第三木香五十三生用理氣煨熟實腸磨汁用辛苦微溫無毒性沉手少陽三焦藥也療一切氣滯止諸般氣逆九種心痛積年冷氣調後重之痢泄除反胃之嘔逆痃癖症塊之結癃淋脹痛之疴治霍亂而療溫瘧除毒物而殺鬼物青木香生永昌山谷永昌不復貢今皆從外國舶上來者一株五根一莖五枝一枝五葉葉間五節故又名五香燒之能上通九天也古方治癰疽有五香連翹湯今所謂青木香則馬兜鈴根也蘇頌曰今惟廣州舶上來他無所出時珍曰木香南方諸地皆有即今胡廣木香是也形如枯骨味苦黏牙者良一切走注氣痛磨汁酒下驗方第一中氣不省為末冬瓜湯下第二霍亂轉筋腹痛為末酒煎木瓜汁下第三腸風下血同黃連為末入豬大腸內煮爛去藥食腸第四小便渾濁如精同沒藥當歸為末荊棘心取汁丸服第五小兒陰莖腫或痛同枳殼炙草服第六乳中結核久久不愈輕則乳勞重成乳岩均宜木香五錢生地一兩搗合餅帖之或尉斗間日尉之諸方第一甘松香五十四甘溫無毒性芳香開脾氣之鬱結洗腳氣之浮腫止心腹卒中之痛病除皮膚黑黯之䵟𪒟最治風疳兼療齒䘌生川西松州廣志云甘松出姑臧涼州諸山細葉引蔓叢生今黔蜀及遼州亦有之八月採之作湯浴令人身香腎虛牙痛同硫黃末泡湯漱之驗方第一風疳蟲牙蝕肉至盡同輕粉倍蘆薈豬腎一對炙末煎漱第二山奈五十五辛溫無毒暖中焦而辟惡止霍亂而除寒治心腹之冷痛止風蟲之牙痛生廣中人家栽之根葉皆如生薑一切牙痛麵包煨熟入元香少許為末隨左右㗜鼻口含溫水漱去神效驗方第一面上雀斑同鷹屎密陀僧萆麻子研勻乳合夜敷旦洗第二心腹冷痛同丁香當歸甘草醋丸服常患疼痛則發冷第三良薑五十六炒用子名紅豆蔻辛苦大溫無毒性浮入足太陰陽明經消食醒酒下氣健脾解心腹之冷痛降胃脘之嘔惡治霍亂而療瀉痢兼治轉筋破冷癖而除瘴瘧並寬噎膈出高良郡春月採今嶺南黔蜀皆有之莖葉如姜苗而大高一二尺紅紫花紅豆蔻炒用辛溫無毒主治略同忽然噁心含咽之驗方第一霍亂腹痛煎汁煮大米食之第二霍亂嘔甚水煎棗引第三頭痛生研吹鼻第四心腹痛冷同甘草水煎服第五
